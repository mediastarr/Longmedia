<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewTube</title>
<style>
:root {
  --bg: rgba(0,0,0,0.75);
  --card: rgba(10,10,10,0.8);
  --text: #fff;
  --blur: 22px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: var(--text);
}

/* Top bar + tabs */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  margin: 8px;
  z-index: 10;
}

.app-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.youtube-logo {
  width: 28px;
  height: 20px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.youtube-logo::after {
  content: "";
  position: absolute;
  left: 10px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-style: solid;
  border-width: 6px 0 6px 12px;
  border-color: transparent transparent transparent white;
}

.app-title {
  font-weight: 600;
  letter-spacing: 0.5px;
}

.btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.tabs {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  margin: 8px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  z-index: 9;
}

.tab-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  opacity: 0.7;
}

.tab-btn.active {
  background: rgba(255,255,255,0.12);
  opacity: 1;
}

/* Search bar + suggestions + keyboard */

.search-wrapper {
  position: relative;
  margin: 0 8px 8px;
}

.search-bar {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 18px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  font-size: 13px;
}

.search-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.suggestions {
  position: absolute;
  top: 40px;
  left: 0;
  right: 0;
  background: rgba(10,10,10,0.95);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  padding: 4px 0;
  display: none;
  z-index: 15;
}

.suggestion-item {
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: rgba(255,255,255,0.08);
}

.keyboard {
  position: absolute;
  top: 70px;
  left: 0;
  right: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 8px;
  display: none;
  z-index: 14;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);
}

.keyboard-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  min-width: 32px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(40,40,40,0.9);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
}

/* Player */

.player {
  margin: 8px;
  padding: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, width 0.25s ease-out, height 0.25s ease-out, top 0.25s ease-out, left 0.25s ease-out;
  z-index: 20;
  position: relative;
  display: none;
}

.player iframe {
  width: 100%;
  height: 220px;
  border-radius: 18px;
  border: none;
}

.player-controls {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  margin-top: 6px;
}

.ctrl-btn {
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* Fullscreen */

.player-fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  margin: 0;
  border-radius: 0;
  z-index: 50;
  display: block;
}

.player-fullscreen iframe {
  width: 100%;
  height: calc(100vh - 40px);
  border-radius: 0;
}

/* Mini-player */

.player-mini {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  height: 150px;
  border-radius: 18px;
  overflow: hidden;
  z-index: 30;
  box-shadow: 0 8px 24px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.6);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  display: block;
}

/* Feed */

.feed {
  margin: 8px;
}

.video-card {
  position: relative;
  background: var(--card);
  border-radius: 22px;
  padding: 12px;
  margin-bottom: 8px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 5;
  display: flex;
  gap: 8px;
  cursor: pointer;
}

.video-thumb img {
  width: 120px;
  height: 68px;
  border-radius: 12px;
  object-fit: cover;
}

.video-info {
  flex: 1;
}

.video-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text);
}

.video-channel {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 2px;
  color: var(--text);
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
  color: var(--text);
}

/* HUD */

.hud {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: 999px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 11px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease-out;
}

/* Channel page */

.channel-page {
  padding: 12px;
  margin: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
}

/* Banner */

.channel-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 11;
}

.banner-logo {
  width: 42px;
  height: 28px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.banner-logo::after {
  content: "";
  position: absolute;
  left: 14px;
  top: 7px;
  width: 14px;
  height: 14px;
  border-style: solid;
  border-width: 7px 0 7px 14px;
  border-color: transparent transparent transparent white;
}

.banner-text {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

/* Channel header */

.channel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  z-index: 10;
}

.channel-pic {
  width: 40px;
  height: 40px;
  border-radius: 999px;
}

.channel-meta {
  display: flex;
  flex-direction: column;
}

.channel-name {
  font-size: 15px;
  font-weight: 600;
}

.channel-subs {
  font-size: 12px;
  opacity: 0.7;
}

/* Parallax */

.parallax {
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out;
}
</style>
</head>
<body>

<div id="topbar" class="topbar parallax">
  <div class="app-title-wrap">
    <div class="youtube-logo"></div>
    <div class="app-title">ViewTube</div>
  </div>
  <button id="themeToggle" class="btn">Mode</button>
</div>

<div id="tabs" class="tabs parallax">
  <button id="homeTab" class="tab-btn active">Home</button>
  <button id="shortsTab" class="tab-btn">Shorts</button>
  <button id="relatedTab" class="tab-btn">Related</button>
  <button id="historyTab" class="tab-btn">History</button>
  <button id="trendingTab" class="tab-btn">Trending</button>
  <button id="channelTab" class="tab-btn">Channel</button>
</div>

<div class="search-wrapper parallax" id="searchWrapper">
  <div class="search-bar">
    <input id="searchInput" class="search-input" placeholder="Search YouTube..." />
    <button id="searchGo" class="search-btn">Go</button>
  </div>
  <div id="suggestions" class="suggestions"></div>
  <div id="keyboard" class="keyboard">
    <div class="keyboard-row">
      <button class="key-btn">A</button>
      <button class="key-btn">B</button>
      <button class="key-btn">C</button>
      <button class="key-btn">D</button>
      <button class="key-btn">E</button>
      <button class="key-btn">F</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">G</button>
      <button class="key-btn">H</button>
      <button class="key-btn">I</button>
      <button class="key-btn">J</button>
      <button class="key-btn">K</button>
      <button class="key-btn">L</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">M</button>
      <button class="key-btn">N</button>
      <button class="key-btn">O</button>
      <button class="key-btn">P</button>
      <button class="key-btn">Q</button>
      <button class="key-btn">R</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">S</button>
      <button class="key-btn">T</button>
      <button class="key-btn">U</button>
      <button class="key-btn">V</button>
      <button class="key-btn">W</button>
      <button class="key-btn">X</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">Y</button>
      <button class="key-btn">Z</button>
      <button class="key-btn" data-key="SPACE">SPACE</button>
      <button class="key-btn" data-key="DELETE">DELETE</button>
      <button class="key-btn" data-key="ENTER">ENTER</button>
    </div>
  </div>
</div>

<div class="player parallax" id="playerSection">
  <iframe id="playerFrame" src="" allowfullscreen></iframe>
  <div class="player-controls">
    <button id="backBtn" class="ctrl-btn">Back</button>
    <div>
      <button id="rewindBtn" class="ctrl-btn">⏪ 10s</button>
      <button id="playPauseBtn" class="ctrl-btn">Pause</button>
      <button id="forwardBtn" class="ctrl-btn">⏩ 10s</button>
    </div>
  </div>
</div>

<div id="feed" class="feed"></div>

<div id="channelPage" class="channel-page" style="display:none;"></div>

<div id="hud" class="hud"></div>

<script>
// API keys (replace with your real keys locally)
const API_KEYS = [

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) {
      url.searchParams.append(k, v);
    }
  });

  try {
    const res = await fetch(url);
    if (!res.ok) {
      console.warn("Key failed, switching to next key:", key);
      return fetchYouTube(endpoint, params);
    }
    return await res.json();
  } catch (err) {
    console.error("Network error, retrying with next key:", err);
    return fetchYouTube(endpoint, params);
  }
}

// State
let currentTab = "home";
let currentVideoId = null;
let miniActive = false;
let isLight = false;
let currentChannelId = "UCoLDGQ7a81ep9SJqPlDs2sg";
let channelNextPageToken = null;
let historyList = [];
let playerReady = false;
let player;

// Elements
const feedEl = document.getElementById("feed");
const playerFrame = document.getElementById("playerFrame");
const playerSection = document.getElementById("playerSection");
const hudEl = document.getElementById("hud");
const channelPageEl = document.getElementById("channelPage");

const topbarEl = document.getElementById("topbar");
const tabsEl = document.getElementById("tabs");
const searchWrapperEl = document.getElementById("searchWrapper");

const homeTab = document.getElementById("homeTab");
const shortsTab = document.getElementById("shortsTab");
const relatedTab = document.getElementById("relatedTab");
const historyTab = document.getElementById("historyTab");
const trendingTab = document.getElementById("trendingTab");
const channelTab = document.getElementById("channelTab");
const themeToggle = document.getElementById("themeToggle");
const backBtn = document.getElementById("backBtn");
const playPauseBtn = document.getElementById("playPauseBtn");
const forwardBtn = document.getElementById("forwardBtn");
const rewindBtn = document.getElementById("rewindBtn");
const searchInput = document.getElementById("searchInput");
const searchGo = document.getElementById("searchGo");
const keyboardEl = document.getElementById("keyboard");
const suggestionsEl = document.getElementById("suggestions");

// Suggestions
const suggestionPool = [
  "music",
  "gaming",
  "news",
  "sports",
  "movies",
  "trailers",
  "technology",
  "podcasts",
  "shorts",
  "funny videos",
  "tutorials",
  "live streams"
];

function updateSuggestions(query) {
  const q = query.toLowerCase();
  const matches = suggestionPool.filter(s => s.toLowerCase().includes(q)).slice(0, 6);
  if (!q || matches.length === 0) {
    suggestionsEl.style.display = "none";
    suggestionsEl.innerHTML = "";
    return;
  }
  suggestionsEl.innerHTML = "";
  matches.forEach(m => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = m;
    item.onclick = () => {
      searchInput.value = m;
      suggestionsEl.style.display = "none";
      triggerSearch(m);
    };
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.style.display = "block";
}

// HUD
function showHUD(text) {
  hudEl.textContent = text;
  hudEl.style.opacity = 1;
  setTimeout(() => {
    hudEl.style.opacity = 0;
  }, 1200);
}

// Player setup (YouTube IFrame API)
function loadPlayer(videoId) {
  const src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
  playerFrame.src = src;
}

// UI hide/show
function hideUIForVideo() {
  topbarEl.style.display = "none";
  tabsEl.style.display = "none";
  searchWrapperEl.style.display = "none";
  feedEl.style.display = "none";
  channelPageEl.style.display = "none";
  keyboardEl.style.display = "none";
  suggestionsEl.style.display = "none";
}

function showUIWithMiniPlayer() {
  topbarEl.style.display = "flex";
  tabsEl.style.display = "flex";
  searchWrapperEl.style.display = "block";
  if (currentTab === "channel") {
    channelPageEl.style.display = "block";
    feedEl.style.display = "none";
  } else {
    feedEl.style.display = "block";
    channelPageEl.style.display = "none";
  }
}

// Player
function setPlayerVideo(videoId, snippet) {
  currentVideoId = videoId;
  playerSection.style.display = "block";
  playerSection.classList.remove("player-mini", "player-fullscreen");
  loadPlayer(videoId);
  historyList.unshift({ id: videoId, snippet });
  if (historyList.length > 50) historyList.pop();
  hideUIForVideo();
}

// Tabs
function setActiveTab(tab) {
  currentTab = tab;
  [homeTab, shortsTab, relatedTab, historyTab, trendingTab, channelTab]
    .forEach(btn => btn.classList.remove("active"));
  if (tab === "home") homeTab.classList.add("active");
  if (tab === "shorts") shortsTab.classList.add("active");
  if (tab === "related") relatedTab.classList.add("active");
  if (tab === "history") historyTab.classList.add("active");
  if (tab === "trending") trendingTab.classList.add("active");
  if (tab === "channel") channelTab.classList.add("active");

  if (tab === "channel") {
    feedEl.style.display = "none";
    channelPageEl.style.display = "block";
  } else {
    feedEl.style.display = "block";
    channelPageEl.style.display = "none";
  }
}

// Feed renderer
function renderFeed(items) {
  feedEl.innerHTML = "";

  items.forEach((item, i) => {
    const snippet = item.snippet || {};
    const stats = item.statistics || {};
    const videoId = item.id?.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.medium?.url || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = snippet.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = snippet.channelTitle || "Unknown channel";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = `${stats.viewCount || 0} views`;

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    img.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    title.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channel.onclick = (e) => {
      e.stopPropagation();
      const channelId = snippet.channelId || currentChannelId;
      loadChannelPage(channelId);
    };

    feedEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// 3D stacking
function apply3DStacking() {
  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = i * -40;
    card.style.transform = `translateZ(${depth}px)`;
  });
}

// Micro-parallax
document.addEventListener("pointermove", (e) => {
  const tiltX = e.movementX * 0.06;
  const tiltY = e.movementY * 0.04;

  document.querySelectorAll('.parallax').forEach(el => {
    el.style.transform = `
      perspective(900px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = i * -40;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });
});

// Theme toggle
themeToggle.addEventListener("click", () => {
  isLight = !isLight;
  document.body.classList.toggle("light", isLight);
  showHUD(isLight ? "Light Mode" : "Dark Mode");
});

// Back → mini bottom-right + show UI
backBtn.addEventListener("click", () => {
  if (!playerSection.style.display || playerSection.style.display === "none") return;
  playerSection.classList.remove("player-fullscreen");
  playerSection.classList.add("player-mini");
  miniActive = true;
  showUIWithMiniPlayer();
  keyboardEl.style.display = "none";
  suggestionsEl.style.display = "none";
  showHUD("Mini-player");
});

// Simple play/pause/seek using postMessage (best-effort)
function postToPlayer(command) {
  if (!playerFrame.contentWindow) return;
  playerFrame.contentWindow.postMessage(JSON.stringify(command), "*");
}

playPauseBtn.addEventListener("click", () => {
  // Toggle text only; actual pause/play requires YouTube JS API
  if (playPauseBtn.textContent === "Pause") {
    playPauseBtn.textContent = "Play";
    postToPlayer({ event: "command", func: "pauseVideo", args: [] });
  } else {
    playPauseBtn.textContent = "Pause";
    postToPlayer({ event: "command", func: "playVideo", args: [] });
  }
});

forwardBtn.addEventListener("click", () => {
  postToPlayer({ event: "command", func: "seekBy", args: [10] });
});

rewindBtn.addEventListener("click", () => {
  postToPlayer({ event: "command", func: "seekBy", args: [-10] });
});

// Channel page

async function loadChannelPage(channelId) {
  currentChannelId = channelId;
  setActiveTab("channel");

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) {
    showHUD("Channel not found");
    return;
  }

  renderChannelHeader(channelInfo);

  const uploads = await fetchYouTube("search", {
    part: "snippet",
    channelId,
    type: "video",
    order: "date",
    maxResults: 20
  });

  channelNextPageToken = uploads.nextPageToken || null;
  renderChannelFeed(uploads.items || []);

  showHUD("Channel: " + channelInfo.snippet.title);
}

function renderChannelHeader(info) {
  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${info.snippet.thumbnails?.default?.url || ""}">
      <div class="channel-meta">
        <div class="channel-name">${info.snippet.title}</div>
        <div class="channel-subs">${info.statistics?.subscriberCount || 0} subscribers</div>
      </div>
    </div>
  `;
}

function renderChannelFeed(items) {
  items.forEach((item, i) => {
    const snippet = item.snippet;
    const videoId = item.id.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channelPageEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// Infinite scroll for channel
window.addEventListener("scroll", async () => {
  if (currentTab === "channel" && channelNextPageToken && window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    const more = await fetchYouTube("search", {
      part: "snippet",
      channelId: currentChannelId,
      type: "video",
      order: "date",
      maxResults: 20,
      pageToken: channelNextPageToken
    });

    channelNextPageToken = more.nextPageToken || null;
    renderChannelFeed(more.items || []);
    showHUD("More channel videos");
  }
});

// Search + keyboard

function openKeyboard() {
  keyboardEl.style.display = "block";
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
}

searchInput.addEventListener("focus", () => {
  openKeyboard();
});

searchInput.addEventListener("click", () => {
  openKeyboard();
});

searchInput.addEventListener("input", (e) => {
  updateSuggestions(e.target.value);
});

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

keyboardEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;
  const key = btn.dataset.key || btn.textContent;

  if (key === "SPACE") {
    searchInput.value += " ";
  } else if (key === "DELETE") {
    searchInput.value = searchInput.value.slice(0, -1);
  } else if (key === "ENTER") {
    const q = searchInput.value.trim() || "music";
    triggerSearch(q);
  } else {
    searchInput.value += key;
  }
  updateSuggestions(searchInput.value);
});

function triggerSearch(q) {
  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 25
    });
    setActiveTab("home");
    renderFeed(data.items || []);
    showHUD("Search: " + q);
    closeKeyboard();
    suggestionsEl.style.display = "none";
  })();
}

})();
