<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* -----------------------------------------------------------
   GLOBAL THEME
----------------------------------------------------------- */
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Prevent medium player cut-off */
html, body {
  overflow: hidden;
}

/* Allow scrolling ONLY when not in medium or fullscreen */
body:not(.medium-active):not(.fullscreen-active) {
  overflow-y: auto;
}

body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}

/* -----------------------------------------------------------
   LAYOUT
----------------------------------------------------------- */
.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

body.medium-active .app-shell {
  display: none !important;
}

/* -----------------------------------------------------------
   TOPBAR
----------------------------------------------------------- */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

/* -----------------------------------------------------------
   SEARCH BAR
----------------------------------------------------------- */
#searchTab {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative;
  z-index: 18;
}

/* -----------------------------------------------------------
   TABS
----------------------------------------------------------- */
#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  position: relative;
  z-index: 16;
}

.tab-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
}

/* -----------------------------------------------------------
   PLAYER
----------------------------------------------------------- */
#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;
}

/* MEDIUM MODE */
#playerSection.player-medium {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 70vw;
  height: 40vh;
  max-width: 960px;
  max-height: 540px;
  z-index: 9990;
}

/* INLINE MEDIUM */
#playerSection.player-medium-inline {
  position: relative !important;
  width: 100% !important;
  height: 260px !important;
  transform: none !important;
  margin-top: 16px !important;
  z-index: 10 !important;
}

/* MINI MODE */
#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 9990;
}

/* FULLSCREEN */
#playerSection.player-fullscreen {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 99999;
}

/* HIDE UI IN MEDIUM MODE */
body.medium-active #feed,
body.medium-active #tabs,
body.medium-active #topbar,
body.medium-active #searchTab,
body.medium-active #channelPage {
  display: none !important;
}

/* HIDE UI IN FULLSCREEN */
body.fullscreen-active .app-shell {
  display: none !important;
}

/* PLAYER CONTROLS */
.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  z-index: 12;
}

/* HUD */
#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(60,242,255,0.22);
  color: #f5f7ff;
  font-size: 11px;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* FEED */
#feed {
  margin-top: 16px;
  display: grid;
  gap: 12px;
  z-index: 10;
}

/* FULLSCREEN BACK BUTTON */
.exit-full-btn {
  position: fixed;
  left: 20px;
  top: 20px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(60,242,255,0.35);
  color: #f5f7ff;
  border: 1px solid rgba(120,130,160,0.7);
  z-index: 999999999;
  display: none;
}

body.fullscreen-active .exit-full-btn {
  display: block;
}

/* STARTUP ANIMATION */
body.startup-hidden {
  opacity: 0;
  transform: scale(1.05);
  filter: blur(18px);
  transition: opacity 1s ease-out, transform 1s ease-out, filter 1s ease-out;
}

body.startup-visible {
  opacity: 1;
  transform: scale(1);
  filter: blur(0px);
}

.startup-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2);
  opacity: 0;
  z-index: 999999999;
  transition: opacity 1s ease-out, transform 1s ease-out;
}

.startup-logo.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.startup-logo.hide {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.85);
}

#cinematic-fade {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 1;
  z-index: 9999999999;
  transition: opacity 1.4s ease-out;
}

#cinematic-fade.hide {
  opacity: 0;
}
</style>
</head>
<body>

<!-- STARTUP ELEMENTS -->
<div id="cinematic-fade"></div>

<div id="startup-logo" class="startup-logo">
  <div class="logo-icon"></div>
  <div class="logo-text">ViewTube</div>
</div>

<div id="particle-burst"></div>
<div id="startup-ripple"></div>

<audio id="startup-sound" src="startup.mp3" preload="auto"></audio>

<!-- FULLSCREEN EXIT BUTTON (ONLY ONE) -->
<button id="exitFullBtn" class="exit-full-btn">Back</button>

<!-- APP SHELL -->
<div class="app-shell">

  <div id="topbar" class="parallax">...</div>
  <div id="searchTab" class="parallax-tab">...</div>
  <div id="tabs">...</div>

  <div id="hud"></div>

  <!-- PLAYER -->
  <div id="playerSection" class="player parallax fx-bloom fx-ambient fx-glass fx-chroma fx-audio">
    <div class="fx-layers"></div>

    <iframe id="playerFrame"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>

    <div class="player-controls">
      <button id="playPauseBtn">Pause</button>
      <button id="rewindBtn">-10s</button>
      <button id="forwardBtn">+10s</button>
      <button id="fullBtn">Full</button>
    </div>

    <button id="closeMini">✕</button>
  </div>

  <div id="feed"></div>
  <div id="channelPage"></div>

</div> <!-- end app-shell -->

/* -----------------------------------------------------------

----------------------------------------------------------- */

let keyIndex = 0;

async function fetchYouTube(endpoint, params) {
  const key = API_KEYS[keyIndex];
  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set("key", key);

  const res = await fetch(url.toString());
  if (!res.ok) {
    keyIndex = (keyIndex + 1) % API_KEYS.length;
    throw new Error("YouTube API error");
  }
  return res.json();
}

/* -----------------------------------------------------------
   4. HUD
----------------------------------------------------------- */
function showHUD(text) {
  hudEl.textContent = text;
  hudEl.style.opacity = "1";
  setTimeout(() => hudEl.style.opacity = "0", 1200);
}

/* -----------------------------------------------------------
   5. FEED RENDERING
----------------------------------------------------------- */
function createVideoCard(item) {
  const snippet = item.snippet;
  const videoId = item.id?.videoId || item.id || snippet.resourceId?.videoId;

  const card = document.createElement("div");
  card.className = "video-card parallax";

  const thumb =
    snippet.thumbnails?.medium?.url ||
    snippet.thumbnails?.high?.url ||
    snippet.thumbnails?.default?.url ||
    "";

  card.innerHTML = `
    <div class="video-thumb">
      <img src="${thumb}">
    </div>
    <div class="video-info">
      <div class="video-title">${snippet.title}</div>
      <div class="video-channel">${snippet.channelTitle || ""}</div>
      <div class="video-meta">${item.statistics?.viewCount || ""}</div>
    </div>
  `;

  card.onclick = () => {
    setPlayerVideo(videoId, snippet);
    historyList.unshift({ id: videoId, snippet });
  };

  return card;
}

function renderFeed(items) {
  channelPageEl.style.display = "none";
  feedEl.style.display = "grid";
  feedEl.innerHTML = "";

  items.forEach(item => feedEl.appendChild(createVideoCard(item)));
}

function appendFeed(items) {
  items.forEach(item => feedEl.appendChild(createVideoCard(item)));
}

/* -----------------------------------------------------------
   6. PLAYER CONTROL
----------------------------------------------------------- */
function setPlayerVideo(videoId, snippet) {
  currentVideoId = videoId;
  currentChannelId = snippet.channelId || currentChannelId;

  playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

  playerSection.style.display = "block";
  playerSection.className = "player parallax fx-bloom fx-ambient fx-glass fx-chroma fx-audio player-medium";

  document.body.classList.add("medium-active");
  document.body.classList.remove("fullscreen-active", "cinema-mode");
}

function goMini() {
  playerSection.style.display = "block";
  playerSection.className = "player parallax fx-bloom fx-ambient fx-glass fx-chroma fx-audio player-mini";

  document.body.classList.remove("medium-active", "fullscreen-active", "cinema-mode");
}

function closeMini() {
  playerSection.style.display = "none";
  playerFrame.src = "";
  miniActive = false;
  document.body.classList.remove("fullscreen-active", "cinema-mode", "player-active");
}

fullBtn.addEventListener("click", () => {
  if (!currentVideoId) return;

  playerSection.className =
    "player parallax fx-bloom fx-ambient fx-glass fx-chroma fx-audio player-fullscreen cinema";

  document.body.classList.add("fullscreen-active", "cinema-mode", "player-active");
});

function restoreInlineMedium() {
  playerSection.style.display = "block";
  playerSection.className =
    "player parallax fx-bloom fx-ambient fx-glass fx-chroma fx-audio player-medium-inline";

  document.body.classList.remove("fullscreen-active", "cinema-mode", "medium-active");
}

exitFullBtn.addEventListener("click", restoreInlineMedium);
backBtn?.addEventListener("click", () => currentVideoId && goMini());
closeMiniBtn.addEventListener("click", closeMini);

playPauseBtn.addEventListener("click", () => {
  const src = playerFrame.src;
  if (!src) return;

  if (src.includes("autoplay=1")) {
    playerFrame.src = src.replace("autoplay=1", "autoplay=0");
    playPauseBtn.textContent = "Play";
  } else {
    playerFrame.src = src.replace("autoplay=0", "autoplay=1");
    playPauseBtn.textContent = "Pause";
  }
});

/* -----------------------------------------------------------
   7. TABS
----------------------------------------------------------- */
function setActiveTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.classList.toggle("active", btn.id === tab + "Tab")
  );
}

homeTab.addEventListener("click", async () => {
  setActiveTab("home");
  const data = await fetchYouTube("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50,
    _: Date.now()
  });
  nextPageToken = data.nextPageToken || null;
  renderFeed(data.items || []);
  showHUD("Home");
});

shortsTab.addEventListener("click", async () => {
  setActiveTab("shorts");
  const data = await fetchYouTube("search", {
    part: "snippet",
    q: "shorts",
    type: "video",
    videoDuration: "short",
    videoEmbeddable: "true",
    maxResults: 50,
    _: Date.now()
  });
  nextPageToken = data.nextPageToken || null;
  renderFeed(data.items || []);
  showHUD("Shorts");
});

moviesTab.addEventListener("click", async () => {
  setActiveTab("movies");
  const data = await fetchYouTube("search", {
    part: "snippet",
    q: "full movie",
    type: "video",
    videoDuration: "long",
    videoEmbeddable: "true",
    maxResults: 50,
    _: Date.now()
  });
  nextPageToken = data.nextPageToken || null;
  renderFeed(data.items || []);
  showHUD("Movies");
});

historyTab.addEventListener("click", () => {
  setActiveTab("history");

  const items = historyList.slice(0, 50).map(h => ({
    id: h.id,
    snippet: h.snippet,
    statistics: { viewCount: "watched" }
  }));

  nextPageToken = null;
  renderFeed(items);
  showHUD("History");
});

trendingTab.addEventListener("click", async () => {
  setActiveTab("trending");
  const data = await fetchYouTube("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50,
    _: Date.now()
  });
  nextPageToken = data.nextPageToken || null;
  renderFeed(data.items || []);
  showHUD("Trending");
});

channelTab.addEventListener("click", () => {
  if (!currentChannelId) return showHUD("Open a video first");
  loadChannelPage(currentChannelId);
});

/* -----------------------------------------------------------
   8. INFINITE SCROLL
----------------------------------------------------------- */
async function loadMoreVideos() {
  if (!nextPageToken || isLoadingMore) return;
  isLoadingMore = true;

  let data;

  if (currentTab === "home" || currentTab === "trending") {
    data = await fetchYouTube("videos", {
      part: "snippet,statistics,contentDetails",
      chart: "mostPopular",
      regionCode: "US",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "shorts") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: "shorts",
      type: "video",
      videoDuration: "short",
      videoEmbeddable: "true",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "movies") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: "full movie",
      type: "video",
      videoDuration: "long",
      videoEmbeddable: "true",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "search") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: lastSearchQuery,
      type: "video",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "channel") {
    data = await fetchYouTube("playlistItems", {
      part: "snippet",
      playlistId: channelUploadsId,
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  }

  nextPageToken = data?.nextPageToken || null;
  appendFeed(data?.items || []);
  isLoadingMore = false;
}

window.addEventListener("scroll", async () => {
  if (isLoadingMore || !nextPageToken) return;

  const scrollPos = window.innerHeight + window.scrollY;
  const bottom = document.body.offsetHeight - 200;

  if (scrollPos >= bottom) {
    isLoadingMore = true;
    await loadMoreVideos();
    isLoadingMore = false;
  }
});

/* -----------------------------------------------------------
   9. CHANNEL PAGE
----------------------------------------------------------- */
async function loadChannelPage(channelId) {
  setActiveTab("channel");
  currentChannelId = channelId;

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics,contentDetails",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) return;

  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${channelInfo.snippet.thumbnails?.default?.url}">
      <div class="channel-meta">
        <div class="channel-name">${channelInfo.snippet.title}</div>
        <div class="channel-subs">${channelInfo.statistics?.subscriberCount} subscribers</div>
      </div>
    </div>
  `;

  channelUploadsId = channelInfo.contentDetails.relatedPlaylists.uploads;

  const uploads = await fetchYouTube("playlistItems", {
    part: "snippet",
    playlistId: channelUploadsId,
    maxResults: 50,
    _: Date.now()
  });

  nextPageToken = uploads.nextPageToken || null;

  channelPageEl.style.display = "block";
  feedEl.style.display = "none";

  uploads.items.forEach(item => {
    const snippet = item.snippet;
    const videoId = snippet.resourceId.videoId;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      historyList.unshift({ id: videoId, snippet });
    };

    channelPageEl.appendChild(card);
  });

  showHUD("Channel Loaded");
}

/* -----------------------------------------------------------
   10. SEARCH + KEYBOARD
----------------------------------------------------------- */
function buildKeyboard() {
  keyboardEl.innerHTML = "";

  const rows = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["Z","X","C","V","B","N","M"],
    ["SPACE","DELETE","ENTER"]
  ];

  rows.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "keyboard-row";

    row.forEach(key => {
      const btn = document.createElement("div");
      btn.className = "key-btn";
      btn.dataset.key = key;
      btn.textContent = key === "SPACE" ? "␣" : key;
      rowEl.appendChild(btn);
    });

    keyboardEl.appendChild(rowEl);
  });
}

async function fetchSuggestions(q) {
  if (!q.trim()) return [];
  const data = await fetchYouTube("search", {
    part: "snippet",
    q,
    type: "video",
    maxResults: 20
  });
  return data.items?.map(v => v.snippet.title) || [];
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (!list.length) {
    suggestionsEl.style.display = "none";
    return;
  }

  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => {
      searchInput.value = text;
      triggerSearch(text);
    };
    suggestionsEl.appendChild(item);
  });

  suggestionsEl.style.display = "block";
}

function openKeyboard() {
  playerSection.style.display = "none";
  document.body.classList.remove("player-active", "fullscreen-active", "cinema-mode");

  searchPanelEl.style.display = "block";
  keyboardEl.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex";

  feedEl.style.display = "none";
  channelPageEl.style.display = "none";
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none";
  feedEl.style.display = "grid";
}

searchTabEl.addEventListener("click", openKeyboard);
document.querySelector(".search-open-btn")?.addEventListener("click", openKeyboard);
searchBack?.addEventListener("click", closeKeyboard);

searchGo?.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

searchInput?.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  const key = btn.dataset.key;

  if (key === "SPACE") searchInput.value += " ";
  else if (key === "DELETE") searchInput.value = searchInput.value.slice(0, -1);
  else if (key === "ENTER") {
    triggerSearch(searchInput.value.trim());
    return
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  lastSearchQuery = q;

  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 50,
      _: Date.now()
    });

    nextPageToken = data.nextPageToken || null;

    renderFeed(data.items || []);
    closeKeyboard();
    setActiveTab("search");
    showHUD("Search: " + q);
  })();
}

/* -----------------------------------------------------------
   11. HOLOGRAPHIC / PARALLAX / GLOW ENGINE
----------------------------------------------------------- */
function applyChroma(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  const blur = 4 + intensity * 12;
  const opacity = 0.25 + intensity * 0.45;

  playerSection.style.setProperty("--chroma-blur", `${blur}px`);
  playerSection.style.setProperty("--chroma-opacity", opacity);
}

function applyDepthGlow(x, y, isFullscreen) {
  const strength = isFullscreen ? 0.75 : 0.35;
  const blur = isFullscreen ? 55 : 22;

  playerSection.style.setProperty("--glow-strength", strength);
  playerSection.style.setProperty("--glow-blur", `${blur}px`);
  playerSection.style.setProperty("--glow-shift-x", `${x * 12}px`);
  playerSection.style.setProperty("--glow-shift-y", `${y * 12}px`);
}

function applyBloom(x, y, isFullscreen) {
  const intensity = isFullscreen ? 0.85 : 0.35;
  const radius = isFullscreen ? 65 : 32;

  playerSection.style.setProperty("--bloom-intensity", intensity);
  playerSection.style.setProperty("--bloom-radius", `${radius}px`);
}

function applyVolumetricShadow(x, y, isFullscreen) {
  const blur = isFullscreen ? 85 : 55;
  const opacity = isFullscreen ? 0.55 : 0.35;

  playerSection.style.setProperty("--shadow-blur", `${blur}px`);
  playerSection.style.setProperty("--shadow-opacity", opacity);
}

function applyDepthFog(x, y, isFullscreen) {
  const fog = Math.min(1, Math.abs(x) + Math.abs(y));
  const opacity = isFullscreen ? fog * 0.55 : fog * 0.25;
  const blur = 85 + fog * 45;

  playerSection.style.setProperty("--fog-opacity", opacity);
  playerSection.style.setProperty("--fog-blur", `${blur}px`);
}

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;

  document.querySelectorAll(".parallax").forEach((el) => {
    const depth = 8;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  document.querySelectorAll(".parallax-tab").forEach((el) => {
    const depth = 4;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  const isFullscreen = playerSection.classList.contains("player-fullscreen");
  applyDepthGlow(x, y, isFullscreen);
  applyBloom(x, y, isFullscreen);
  applyVolumetricShadow(x, y, isFullscreen);
  applyDepthFog(x, y, isFullscreen);

  document.querySelectorAll(".video-card").forEach((card) => {
    const tiltX = y * -8;
    const tiltY = x * 8;
    const shiftX = x * 12;
    const shiftY = y * 12;

    const isHover = card.matches(":hover");
    const boost = isHover ? 1.6 : 1;
    const lift = isHover ? 18 : 0;

    card.style.transform = `
      perspective(1100px)
      rotateX(${tiltX * boost}deg)
      rotateY(${tiltY * boost}deg)
      translateX(${shiftX}px)
      translateY(${shiftY}px)
      translateZ(${lift}px)
    `;
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const shadowX = x * 14;
    const shadowY = y * 14;
    const isHover = card.matches(":hover");
    const blur = isHover ? 28 : 18;
    const opacity = isHover ? 0.75 : 0.55;

    card.style.setProperty("--shadow-x", `${shadowX}px`);
    card.style.setProperty("--shadow-y", `${shadowY}px`);
    card.style.setProperty("--shadow-blur", `${blur}px`);
    card.style.setProperty("--shadow-opacity", opacity);
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const isHover = card.matches(":hover");
    const aoOpacity = isHover ? 0.22 : 0.35;
    const aoBlur = isHover ? 32 : 22;

    card.style.setProperty("--ao-opacity", aoOpacity);
    card.style.setProperty("--ao-blur", `${aoBlur}px`);
  });

  applyChroma(x, y);
});

/* -----------------------------------------------------------
   12. THEME TOGGLE
----------------------------------------------------------- */
themeToggle.addEventListener("click", () => {
  isLight = !isLight;
  document.body.classList.toggle("light", isLight);
  showHUD(isLight ? "Light Mode" : "Dark Mode");
});

/* -----------------------------------------------------------
   13. STARTUP ENGINES
----------------------------------------------------------- */
function runStartupAnimation() {
  document.body.classList.add("startup-hidden");
  feedEl.classList.add("startup-slide");
  topbarEl.classList.add("startup-fade");
  tabsEl.classList.add("startup-fade");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.body.classList.remove("startup-hidden");
      document.body.classList.add("startup-visible");

      feedEl.classList.add("show");
      topbarEl.classList.add("show");
      tabsEl.classList.add("show");
    });
  });
}

function initPlayerLighting() {
  const isFullscreen = false;
  applyDepthGlow(0, 0, isFullscreen);
  applyBloom(0, 0, isFullscreen);
  applyVolumetricShadow(0, 0, isFullscreen);
  applyDepthFog(0, 0, isFullscreen);
  applyChroma(0, 0);
}

function initParallaxState() {
  const event = new MouseEvent("mousemove", {
    clientX: window.innerWidth / 2,
    clientY: window.innerHeight / 2
  });
  document.dispatchEvent(event);
}

function runStartupLogo() {
  const logo = document.getElementById("startup-logo");
  logo.classList.add("show");

  setTimeout(() => {
    logo.classList.add("hide");
  }, 2200);

  setTimeout(() => {
    logo.remove();
  }, 3200);
}

function playStartupSound() {
  const audio = document.getElementById("startup-sound");
  if (!audio) return;

  audio.volume = 0.65;
  audio.currentTime = 0;
  audio.play();

  let t = 0;
  const pulse = () => {
    t += 0.05;
    const glow = 0.25 + Math.sin(t * 6) * 0.35;
    const blur = 20 + Math.sin(t * 6) * 25;

    playerSection.style.setProperty("--audio-glow-opacity", glow);
    playerSection.style.setProperty("--audio-glow-blur", `${blur}px`);

    if (t < 1.2) requestAnimationFrame(pulse);
  };

  pulse();
}

function runParticleBurst() {
  const container = document.getElementById("particle-burst");
  if (!container) return;

  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = (Math.PI * 2 * i) / 18;
    const dist = 40 + Math.random() * 40;

    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;

    container.appendChild(p);

    requestAnimationFrame(() => {
      p.style.opacity = 1;
      p.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    });

    setTimeout(() => {
      p.style.opacity = 0;
      p.style.transform = `translate(${x}px, ${y}px) scale(0.6)`;
    }, 900);

    setTimeout(() => p.remove(), 1600);
  }
}

function runStartupRipple() {
  const ripple = document.getElementById("startup-ripple");
  if (!ripple) return;

  ripple.classList.add("show");
  setTimeout(() => ripple.classList.add("hide"), 900);
  setTimeout(() => ripple.remove(), 1600);
}

function runCinematicFade() {
  const fade = document.getElementById("cinematic-fade");
  if (!fade) return;

  setTimeout(() => fade.classList.add("hide"), 200);
  setTimeout(() => fade.remove(), 1800);
}

/* -----------------------------------------------------------
   14. INITIAL LOAD (INIT MUST BE LAST)
----------------------------------------------------------- */
(async function init() {
  // cinematic fade + logo + sound
  runCinematicFade();
  runStartupLogo();
  playStartupSound();
  runParticleBurst();
  runStartupRipple();
  runStartupAnimation();
  buildKeyboard();


  // start in Home, no player visible
  setActiveTab("home");
  playerSection.style.display = "none";
  document.body.classList.remove("player-active", "fullscreen-active", "cinema-mode");

  const data = await fetchYouTube("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50,
    _: Date.now()
  });

  nextPageToken = data.nextPageToken || null;

  renderFeed(data.items || []);
  showHUD("Home");

  initPlayerLighting();
  initParallaxState();
})();
</script>
