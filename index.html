<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}

/* Layout */

.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

/* Topbar */

#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

body.light #topbar {
  background: linear-gradient(135deg, rgba(240,242,255,0.95), rgba(220,224,255,0.95));
  color: #05060a;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-orb {
  width: 26px;
  height: 26px;
  border-radius: 999px;
  background: radial-gradient(circle, var(--accent-strong), transparent 70%);
  box-shadow: 0 0 24px rgba(60,242,255,0.9);
}

.topbar-title {
  font-weight: 600;
  letter-spacing: 0.04em;
  font-size: 14px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-btn {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

body.light .topbar-btn {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95));
  color: #05060a;
}

/* Search bar */

#searchTab {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative;
  z-index: 18;
}

body.light #searchTab {
  background: linear-gradient(135deg, rgba(238,240,255,0.95), rgba(224,228,255,0.95));
}

.search-label {
  font-size: 12px;
  opacity: 0.8;
}

.search-open-btn {
  margin-left: auto;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

body.light .search-open-btn {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95));
  color: #05060a;
}

/* Tabs */

#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 4px;
  position: relative;
  z-index: 16;
}

.tab-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  position: relative;
}

body.light .tab-btn {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(240,242,255,0.95));
  color: #05060a;
}

.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
}

/* Player */

#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;
}

#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 40;
}

#playerSection.player-fullscreen {
  position: fixed;
  inset: 0;
  margin: 0;
  border-radius: 0;
  z-index: 50;
}

/* Player iframe */

#playerFrame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Player controls */

.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.player-controls button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

body.light .player-controls button {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95));
  color: #05060a;
}

/* Close mini button */

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 4px 8px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(255,80,80,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 12;
}

/* HUD */

#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.22), rgba(10,12,20,0.95));
  color: #f5f7ff;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* Feed */

#feed {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  position: relative;
  z-index: 10;
}

/* Video cards */

.video-card {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer;
  position: relative;
}

body.light .video-card {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.06), rgba(238,240,255,0.98));
}

.video-thumb {
  flex: 0 0 140px;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  background: #11131c;
}

.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.video-title {
  font-size: 13px;
  font-weight: 500;
}

.video-channel {
  font-size: 11px;
  opacity: 0.8;
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
}

/* Channel page */

#channelPage {
  margin-top: 16px;
  display: none;
  position: relative;
  z-index: 10;
}

.channel-banner {
  height: 90px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.25), rgba(8,10,16,0.96));
  display: flex;
  align-items: center;
  padding: 14px;
  gap: 10px;
}

.banner-logo {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.9), transparent 70%);
  box-shadow: 0 0 26px rgba(60,242,255,0.9);
}

.banner-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.channel-header {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.channel-pic {
  width: 46px;
  height: 46px;
  border-radius: 999px;
  object-fit: cover;
}

.channel-meta {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.channel-name {
  font-size: 14px;
  font-weight: 600;
}

.channel-subs {
  font-size: 11px;
  opacity: 0.8;
}

/* Search panel + keyboard */

#searchPanel {
  margin-top: 12px;
  display: none;
  position: relative;
  z-index: 30;
}

.search-input-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
}

.search-input-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: #f5f7ff;
  font-size: 13px;
}

.search-input-bar button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

#keyboard {
  margin-top: 10px;
  display: none;
  padding: 10px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
}

.keyboard-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  flex: 1;
  padding: 7px 0;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  text-align: center;
  cursor: pointer;
}

/* Suggestions */

#suggestions {
  margin-top: 8px;
  display: none;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  padding: 6px 8px;
}

.suggestion-item {
  padding: 5px 6px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 10px;
}

.suggestion-item:hover {
  background: rgba(60,242,255,0.16);
}

/* Depth + parallax helpers */

.parallax {
  will-change: transform;
}

.parallax-tab {
  will-change: transform;
}

/* Depth shadows */

.fx-shadow-strong {
  box-shadow: var(--shadow-strong);
}

.fx-shadow-soft {
  box-shadow: var(--shadow-soft);
}

/* Holographic FX: Bloom, Ambient, Glass, Chroma, Audio Glow */

/* Bloom glow around player */
#playerSection.fx-bloom {
  box-shadow: 0 0 40px rgba(60,242,255,0.65), 0 26px 70px rgba(0,0,0,0.85);
}

/* Ambient halo behind player */
#playerSection.fx-ambient {
  background:
    radial-gradient(circle at 50% 0%, rgba(60,242,255,0.25), transparent 60%),
    radial-gradient(circle at 0% 100%, rgba(120,80,255,0.18), transparent 70%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.18), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.98), rgba(2,3,8,1));
}

/* Glass refraction */
#playerSection.fx-glass {
  backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(120,130,160,0.7);
}

/* Chromatic aberration glow */
#playerSection.fx-chroma::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: var(--chroma-opacity, 0.25);
  filter: blur(var(--chroma-blur, 4px));
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,80,0.35), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,200,255,0.35), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(0,255,180,0.35), transparent 60%);
  transition: opacity 0.15s ease-out, filter 0.15s ease-out;
  z-index: -2;
}

/* Audio-reactive glow */
#playerSection.fx-audio::after {
  content: "";
  position: absolute;
  inset: -40px;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  mix-blend-mode: screen;
  opacity: var(--audio-glow-opacity, 0.25);
  filter: blur(var(--audio-glow-blur, 20px));
  transition: opacity 0.12s ease-out, filter 0.12s ease-out;
  z-index: -3;
}

/* Search depth mode */

body.search-depth-mode #feed,
body.search-depth-mode #channelPage {
  filter: blur(4px) brightness(0.7);
  pointer-events: none;
}

/* Scrollbar */

#tabs::-webkit-scrollbar,
body::-webkit-scrollbar {
  height: 4px;
  width: 4px;
}

#tabs::-webkit-scrollbar-thumb,
body::-webkit-scrollbar-thumb {
  background: rgba(120,130,160,0.7);
  border-radius: 999px;
}
</style>
</head>

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) {
      url.searchParams.append(k, v);
    }
  });

  url.searchParams.append("_", Date.now());

  try {
    const res = await fetch(url.toString(), { cache: "no-store" });
    if (!res.ok) {
      console.warn("Key failed, switching to next key:", key);
      return fetchYouTube(endpoint, params);
    }
    return await res.json();
  } catch (err) {
    console.error("Network error, retrying with next key:", err);
    return fetchYouTube(endpoint, params);
  }
}

// Depth shadow helper
function setDepthShadow(el, depth) {
  if (!el) return;
  if (depth >= 40) {
    el.style.boxShadow = "var(--shadow-strong), var(--shadow-glow)";
  } else if (depth >= 10) {
    el.style.boxShadow = "var(--shadow-strong)";
  } else if (depth >= -10) {
    el.style.boxShadow = "var(--shadow-soft)";
  } else {
    el.style.boxShadow = "0 4px 12px rgba(0,0,0,0.4)";
  }
}

// Feed renderer
function renderFeed(items) {
  feedEl.innerHTML = "";

  items.forEach((item, i) => {
    const snippet = item.snippet || {};
    const stats = item.statistics || {};
    const videoId = item.id?.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.high?.url
           || snippet.thumbnails?.medium?.url
           || snippet.thumbnails?.default?.url
           || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = snippet.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = snippet.channelTitle || "Unknown channel";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = `${stats.viewCount || 0} views`;

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    img.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    title.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channel.onclick = (e) => {
      e.stopPropagation();
      const channelId = snippet.channelId || currentChannelId;
      loadChannelPage(channelId);
    };

    feedEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

  const cards = document.querySelectorAll('.video-card');

    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
    `;
    setDepthShadow(card, depth);
  });
}

// Chromatic aberration driver
function applyChromaticAberration(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  const blur = 4 + intensity * 12;
  const opacity = 0.25 + intensity * 0.45;
  playerSection.style.setProperty("--chroma-blur", `${blur}px`);
  playerSection.style.setProperty("--chroma-opacity", opacity);
}

// Audio-reactive glow (simulated pulse)
let audioGlowInitialized = false;

function initAudioReactiveGlow() {
  if (audioGlowInitialized) return;
  audioGlowInitialized = true;
  animateAudioGlow();
}

function animateAudioGlow() {
  const t = Date.now() / 600;
  const level = (Math.sin(t) + 1) / 2; // 0 → 1
  const blur = 20 + level * 60;
  const opacity = 0.25 + level * 0.55;
  playerSection.style.setProperty("--audio-glow-blur", `${blur}px`);
  playerSection.style.setProperty("--audio-glow-opacity", opacity);
  requestAnimationFrame(animateAudioGlow);
}

// Micro-parallax + depth system
document.addEventListener("pointermove", (e) => {

  // Prevent fullscreen from being overridden
  if (playerSection.classList.contains("player-fullscreen")) return;

  const tiltX = e.movementX * 0.06;
  const tiltY = e.movementY * 0.04;

  // Apply tilt to all parallax elements
  document.querySelectorAll('.parallax').forEach(el => {
    el.style.transform = `
      perspective(900px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  // Apply tilt + depth to feed cards
  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = -40 * i + Math.sin(i * 0.6) * 12;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
    setDepthShadow(card, depth);
  });

  // Apply tilt + depth to tabs
  const tabs = document.querySelectorAll('.parallax-tab');
  tabs.forEach((tab, index) => {
    const baseDepth = -20;
    const step = -12;
    const depth = baseDepth + step * index;
    tab.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
    setDepthShadow(tab, depth);
  });

  // Depth updates (only when NOT fullscreen)
  applyPlayerDepth();
  applyChannelBannerDepth();
  applyChannelHeaderDepth();
  applySearchBarDepthFull();
  applySearchInputDepthFull();
  applyKeyboardPanelDepthFull();
  applyKeyboardKeyDepthFull();
  applyHUDDepthFull();
  applyTopbarDepth();
  applyMiniControlsDepth();
  applyKeyboardDepth();
  applyTabHighlightDepth();

  // Chromatic aberration
  applyChromaticAberration(tiltX, tiltY);
});

// Channel page
async function loadChannelPage(channelId) {
  currentChannelId = channelId;
  setActiveTab("channel");

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics,contentDetails",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) {
    showHUD("Channel not found");
    return;
  }

  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${channelInfo.snippet.thumbnails?.default?.url || ""}">
      <div class="channel-meta">
        <div class="channel-name">${channelInfo.snippet.title}</div>
        <div class="channel-subs">${channelInfo.statistics?.subscriberCount || 0} subscribers</div>
      </div>
    </div>
  `;
  applyChannelBannerDepth();
  applyChannelHeaderDepth();

  channelUploadsId = channelInfo.contentDetails.relatedPlaylists.uploads;

  const uploads = await fetchYouTube("playlistItems", {
    part: "snippet",
    playlistId: channelUploadsId,
    maxResults: 20
  });

  channelNextPageToken = uploads.nextPageToken || null;

  uploads.items.forEach(item => {
    const snippet = item.snippet;
    const videoId = snippet.resourceId.videoId;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channelPageEl.appendChild(card);
  });

  showHUD("Channel: " + channelInfo.snippet.title);
}

// Infinite scroll for channel
window.addEventListener("scroll", async () => {
  if (currentTab !== "channel") return;
  if (!channelNextPageToken) return;
  if (!channelUploadsId) return;

  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    const more = await fetchYouTube("playlistItems", {
      part: "snippet",
      playlistId: channelUploadsId,
      maxResults: 20,
      pageToken: channelNextPageToken
    });

    channelNextPageToken = more.nextPageToken || null;

    more.items.forEach(item => {
      const snippet = item.snippet;
      const videoId = snippet.resourceId.videoId;

      const card = document.createElement("div");

      card.innerHTML = `

moviesTab.addEventListener("click", async () => {
  clearFeed();
  setActiveTab("movies");

  const data = await fetchYouTube("search", {
    part: "snippet",
    q: "short film award winning",
    type: "video",
    videoEmbeddable: "true",
    regionCode: "US",
    maxResults: 25,
    order: "relevance"
  });

  if (!data.items || data.items.length === 0) {
    showHUD("No short films found");
    return;
  }

  const items = data.items.map(v => ({
    id: v.id.videoId,
    snippet: v.snippet
  }));

  renderFeed(items);
  showHUD("US Short Films");
});

historyTab.addEventListener("click", async () => {
  clearFeed();
  setActiveTab("history");
  const items = historyList.map(h => ({
    id: h.id,
    snippet: h.snippet,
    statistics: { viewCount: "watched" }
  }));
  renderFeed(items);
  showHUD("History");
});

channelTab.addEventListener("click", async () => {
  clearFeed();
  loadChannelPage(currentChannelId);
});

// Suggestions
async function fetchSuggestions(query) {
  if (!query.trim()) return [];
  const data = await fetchYouTube("search", {
    part: "snippet",
    q: query,
    type: "video",
    maxResults: 8
  });
  if (!data.items) return [];
  return data.items.map(v => v.snippet.title);
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (list.length === 0) {
    suggestionsEl.style.display = "none";
    return;
  }
  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => {
      searchInput.value = text;
      triggerSearch(text);
      suggestionsEl.style.display = "none";
    };
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.style.display = "block";
}

// Search tab + keyboard
function openKeyboard() {
  searchPanelEl.style.display = "block";
  keyboardEl.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex";

  feedEl.style.display = "none";

  tabsEl.style.pointerEvents = "none";
  feedEl.style.pointerEvents = "none";
  playerSection.style.pointerEvents = "none";

  applyKeyboardDepth();
  applyKeyboardPanelDepthFull();
  enterSearchDepthMode();
  applySearchBarDepthFull();
  applyHUDDepthFull();
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none";

  feedEl.style.display = "block";

  tabsEl.style.pointerEvents = "auto";
  feedEl.style.pointerEvents = "auto";
  playerSection.style.pointerEvents = "auto";

  exitSearchDepthMode();
}

searchTabEl.addEventListener("click", () => {
  openKeyboard();
});

searchBack.addEventListener("click", () => {
  searchInput.value = "";
  closeKeyboard();
});

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  document.querySelector(".search-input-bar").style.display = "flex";
  applySearchInputDepthFull();

  const key = btn.dataset.key || btn.textContent;

  if (key === "SPACE") {
    searchInput.value += " ";
  } else if (key === "DELETE") {
    searchInput.value = searchInput.value.slice(0, -1);
  } else if (key === "ENTER") {
    const q = searchInput.value.trim() || "music";
    triggerSearch(q);
    suggestionsEl.style.display = "none";
    return;
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 25
    });
    clearFeed();
    setActiveTab("home");
    renderFeed(data.items || []);
    showHUD("Search: " + q);
    closeKeyboard();
  })();
}

// Shorts swipe navigation
let touchStartY = null;
let pointerStartY = null;

function playShortAt(index) {
  if (!shortsItems[index]) return;
  const item = shortsItems[index];
  const snippet = item.snippet || {};
  const videoId = item.id;
  setPlayerVideo(videoId, snippet);
  showHUD("Short " + (index + 1));
}

function nextShort() {
  if (shortsIndex < shortsItems.length - 1) {
    shortsIndex++;
    playShortAt(shortsIndex);
  }
}

function prevShort() {
  if (shortsIndex > 0) {
    shortsIndex--;
    playShortAt(shortsIndex);
  }
}

document.addEventListener("touchstart", (e) => {
  if (currentTab !== "shorts") return;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener("touchend", (e) => {
  if (currentTab !== "shorts" || touchStartY === null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  touchStartY = null;
});

document.addEventListener("pointerdown", (e) => {
  if (currentTab !== "shorts") return;
  pointerStartY = e.clientY;
});

document.addEventListener("pointerup", (e) => {
  if (currentTab !== "shorts" || pointerStartY === null) return;
  const dy = e.clientY - pointerStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  pointerStartY = null;
});

// Direction-aware pointer routing for mini-player
let scrollStartX = null;
let scrollStartY = null;

document.addEventListener("pointerdown", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  scrollStartX = e.clientX;
  scrollStartY = e.clientY;
});

document.addEventListener("pointermove", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  if (scrollStartX === null || scrollStartY === null) return;

  const dx = e.clientX - scrollStartX;
  const dy = e.clientY - scrollStartY;

  if (Math.abs(dx) > Math.abs(dy)) {
    feedEl.style.pointerEvents = "auto";
    tabsEl.style.pointerEvents = "auto";
    playerSection.style.pointerEvents = "none";
  } else {
    feedEl.style.pointerEvents = "none";
    tabsEl.style.pointerEvents = "none";
    playerSection.style.pointerEvents = "auto";
  }
});

document.addEventListener("pointerup", () => {
  scrollStartX = null;
  scrollStartY = null;
});

// Initial depth setup
applyTopbarDepth();
applySearchBarDepth();
applyTabDepthStacking();
applyHUDDepthFull();

// Initial load
(async () => {
  const data = await fetchYouTube("videos", {
    part: "snippet,statistics",
    chart: "mostPopular",
    maxResults: 25
  });
  renderFeed(data.items || []);
})();
</script>
