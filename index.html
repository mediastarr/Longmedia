<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

/* TOPBAR */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-orb {
  width: 26px;
  height: 26px;
  border-radius: 999px;
  background: radial-gradient(circle, var(--accent-strong), transparent 70%);
  box-shadow: 0 0 24px rgba(60,242,255,0.9);
}

.topbar-title {
  font-weight: 600;
  letter-spacing: 0.04em;
  font-size: 14px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-btn {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

/* SEARCH BAR (floating) */
#searchTab {
  position: absolute;
  top: 72px;
  left: 18px;
  right: 18px;
  width: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  z-index: 30;
}

.search-label {
  font-size: 12px;
  opacity: 0.8;
}

.search-open-btn {
  margin-left: auto;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

/* TABS BELOW SEARCH */
#tabs {
  margin-top: 120px;
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding: 8px 10px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.85), rgba(20,24,40,0.85));
  position: relative;
  z-index: 50;
}

.tab-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
}

/* PLAYER SHELL */
#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;
}

#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 40;
}

#playerSection.player-fullscreen {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  max-height: 100vh;
  background: black;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  transform:
    perspective(1200px)
    translateZ(45px)
    scale(1.08)
    rotateX(4deg);
  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    filter 0.55s ease,
    box-shadow 0.55s ease;
}

#playerSection.player-fullscreen.settled {
  transform:
    perspective(1200px)
    translateZ(0px)
    scale(1)
    rotateX(0deg);
}

#playerFrame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  position: relative;
  z-index: 1;
}

.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.player-controls button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 4px 8px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(255,80,80,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 12;
}
/* HUD */
#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.22), rgba(10,12,20,0.95));
  color: #f5f7ff;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* FEED */
#feed {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  position: relative;
  z-index: 10;
}

.video-card {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  perspective: 1100px;
  transition: transform 0.15s ease-out;
}

.video-card:hover {
  transform: translateZ(22px) scale(1.03);
  box-shadow: 0 0 28px rgba(60,242,255,0.35),
              0 0 55px rgba(60,242,255,0.18);
}

.video-thumb {
  flex: 0 0 140px;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  background: #11131c;
}

.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.video-title {
  font-size: 13px;
  font-weight: 500;
}

.video-channel {
  font-size: 11px;
  opacity: 0.8;
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
}

.feed-disabled {
  pointer-events: none;
}

/* CHANNEL PAGE */
#channelPage {
  margin-top: 16px;
  display: none;
  position: relative;
  z-index: 10;
}

/* SEARCH PANEL + KEYBOARD */
#searchPanel {
  margin-top: 12px;
  display: none;
  position: relative;
  z-index: 30;
}

.search-input-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  overflow: hidden;
}

.search-input-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: #f5f7ff;
  font-size: 13px;
  padding-left: 6px;
  width: 100%;
  overflow-x: auto;
}

.search-input-bar button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

#keyboard {
  margin-top: 10px;
  display: none;
  padding: 10px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  width: 100%;
}

.keyboard-row {
  display: flex;
  width: 100%;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(120,130,160,0.7);
  font-size: 14px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  text-align: center;
  cursor: pointer;
  user-select: none;
}

.key-btn[data-key="SPACE"] {
  flex: 4;
}

.key-btn[data-key="DELETE"],
.key-btn[data-key="ENTER"] {
  flex: 2;
}

#suggestions {
  margin-top: 8px;
  display: none;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  padding: 6px 8px;
}

.suggestion-item {
  padding: 5px 6px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 10px;
}

.suggestion-item:hover {
  background: rgba(60,242,255,0.16);
}

body.search-depth-mode #feed,
body.search-depth-mode #channelPage {
  filter: blur(4px) brightness(0.7);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-left">
      <div class="logo-orb"></div>
      <div class="topbar-title">VIEWTUBE AR OS</div>
    </div>
    <div class="topbar-right">
      <button id="themeToggle" class="topbar-btn">Theme</button>
      <button id="backBtn" class="topbar-btn">Mini</button>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div id="searchTab">
    <div class="search-label">Search holographic feed</div>

  </div>

  <!-- TABS -->
  <div id="tabs">

        <div class="key-btn" data-key="I">I</div>
        <div class="key-btn" data-key="O">O</div>
        <div class="key-btn" data-key="P">P</div>
      </div>
      <div class="keyboard-row">
        <div class="key-btn" data-key="A">A</div>
        <div class="key-btn" data-key="S">S</div>
        <div class="key-btn" data-key="D">D</div>
        <div class="key-btn" data-key="F">F</div>
        <div class="key-btn" data-key="G">G</div>
        <div class="key-btn" data-key="H">H</div>
        <div class="key-btn" data-key="J">J</div>
        <div class="key-btn" data-key="K">K</div>
        <div class="key-btn" data-key="L">L</div>
      </div>
      <div class="keyboard-row">
        <div class="key-btn" data-key="Z">Z</div>
        <div class="key-btn" data-key="X">X</div>
        <div class="key-btn" data-key="C">C</div>

        <div class="key-btn" data-key="M">M</div>
      </div>
      <div class="keyboard-row">
        <div class="key-btn" data-key="SPACE">SPACE</div>

  <!-- FEED -->

    <button id="startLoginBtn" class="topbar-btn" style="margin-top:6px;">Login to YouTube</button>
  </div>

</div>
<script>
/* SAMPLE DATA */
const sampleVideos = [
  {
    id: "ckan_toma_todo",
    title: "C-Kan - Toma Todo",
    channel: "ckan98",
    views: "10,447,681 views",
    thumb: "https://i.ytimg.com/vi/VIDEO_ID1/hqdefault.jpg",
    url: "https://www.youtube.com/embed/VIDEO_ID1"
  },
  {
    id: "cyclops_marvel_rivals",
    title: "Cyclops: The Fearless Leader | Character Reveal Trailer | Marvel Rivals",
    channel: "Marvel Rivals",
    views: "844,747 views",
    thumb: "https://i.ytimg.com/vi/VIDEO_ID2/hqdefault.jpg",
    url: "https://www.youtube.com/embed/VIDEO_ID2"
  }
];

const feedEl = document.getElementById("feed");
const playerSection = document.getElementById("playerSection");
const playerFrame = document.getElementById("playerFrame");
const hudEl = document.getElementById("hud");
const searchPanel = document.getElementById("searchPanel");
const keyboardEl = document.getElementById("keyboard");
const searchInput = document.getElementById("searchInput");
const tabsEl = document.getElementById("tabs");
const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));

function renderFeed(videos) {
  feedEl.innerHTML = "";
  videos.forEach(video => {
    const card = document.createElement("div");
    card.className = "video-card";
    card.dataset.videoId = video.id;
    card.innerHTML = `
      <div class="video-thumb">
        <img src="${video.thumb}" alt="${video.title}" />
      </div>
      <div class="video-info">
        <div class="video-title">${video.title}</div>
        <div class="video-channel">${video.channel}</div>
        <div class="video-meta">${video.views}</div>
      </div>
    `;
    card.addEventListener("click", () => openPlayer(video));
    feedEl.appendChild(card);
  });
}

function openPlayer(video) {
  playerFrame.src = video.url + "?autoplay=1";
  playerSection.style.display = "block";
  showHUD("Playing: " + video.title);
}

function closePlayerMini() {
  playerSection.classList.remove("player-mini");
  playerSection.style.display = "none";
  playerFrame.src = "";
}

document.getElementById("closeMini").addEventListener("click", closePlayerMini);

document.getElementById("fullBtn").addEventListener("click", () => {
  playerSection.classList.add("player-fullscreen");
  showHUD("Fullscreen");
  setTimeout(() => {
    playerSection.classList.add("settled");
  }, 400);
});

function showHUD(message) {
  hudEl.textContent = message;
  hudEl.style.opacity = "1";
  setTimeout(() => {
    hudEl.style.opacity = "0";
  }, 1200);
}

/* TABS */
tabsEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  tabButtons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const id = btn.id;
  if (id === "homeTab") {
    renderFeed(sampleVideos);
    showHUD("Home");
  } else if (id === "shortsTab") {
    showHUD("Shorts");
  } else if (id === "moviesTab") {
    showHUD("Movies");
  } else if (id === "historyTab") {
    showHUD("History");
  } else if (id === "trendingTab") {
    showHUD("Trending");
  } else if (id === "channelTab") {
    showHUD("Channel");
  } else if (id === "subsTab") {
    showHUD("Subscriptions");
  } else if (id === "accountTab") {
    showHUD("Account");
  }
});

/* KEYBOARD + SEARCH */
const openKeyboardBtn = document.getElementById("openKeyboardBtn");
const searchBackBtn = document.getElementById("searchBack");
const searchGoBtn = document.getElementById("searchGo");

openKeyboardBtn.addEventListener("click", () => {
  searchPanel.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex";
  keyboardEl.style.display = "block";
  feedEl.classList.add("feed-disabled");
  showHUD("Keyboard Open");
});

searchBackBtn.addEventListener("click", () => {
  searchPanel.style.display = "none";
  document.querySelector(".search-input-bar").style.display = "none";
  keyboardEl.style.display = "none";
  feedEl.classList.remove("feed-disabled");
  showHUD("Keyboard Closed");
});

searchGoBtn.addEventListener("click", () => {
  const q = searchInput.value.trim();
  if (!q) return;
  showHUD("Search: " + q);
});

keyboardEl.addEventListener("click", (e) => {
  const keyBtn = e.target.closest(".key-btn");
  if (!keyBtn) return;
  const key = keyBtn.dataset.key;
  if (key === "SPACE") {
    searchInput.value += " ";
  } else if (key === "DELETE") {
    searchInput.value = searchInput.value.slice(0, -1);
  } else if (key === "ENTER") {
    searchGoBtn.click();
  } else {
    searchInput.value += key;
  }
});

/* SIMPLE LAYER FLOW */
let currentLayer = "feed";

function goLayerUp() {
  if (currentLayer === "feed") {
    tabsEl.scrollIntoView({ behavior: "smooth", block: "center" });
    showHUD("Tabs");
    currentLayer = "tabs";
  } else if (currentLayer === "tabs") {
    openKeyboardBtn.click();
    currentLayer = "keyboard";
  }
}

function goLayerDown() {
  if (currentLayer === "keyboard") {
    searchBackBtn.click();
    tabsEl.scrollIntoView({ behavior: "smooth", block: "center" });
    showHUD("Tabs");
    currentLayer = "tabs";
  } else if (currentLayer === "tabs") {
    feedEl.scrollIntoView({ behavior: "smooth", block: "start" });
    showHUD("Feed");
    currentLayer = "feed";
  }
}

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") goLayerUp();
  else if (e.key === "ArrowDown") goLayerDown();
});

/* INIT */
renderFeed(sampleVideos);
showHUD("ViewTube AR OS Ready");
/* API KEY ROTATION ARRAY (MASKED EXAMPLE — PASTE YOUR REAL KEYS HERE) */
const API_KEYS = [
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  // 👉 continue adding the rest of your 59+ keys here, one per line
];

let currentKeyIndex = 0;

function getCurrentApiKey() {
  return API_KEYS[currentKeyIndex];
}

function rotateApiKey() {
  currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
}

/* YOUTUBE FETCH USING ROTATION */
async function ytFetch(endpoint, params = {}) {
  const url = new URL("https://www.googleapis.com/youtube/v3/" + endpoint);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set("key", getCurrentApiKey());

  let res = await fetch(url.toString());
  if (res.status === 403 || res.status === 429) {
    rotateApiKey();
    url.searchParams.set("key", getCurrentApiKey());
    res = await fetch(url.toString());
  }
  return res.json();
}

/* OAUTH 2.0 DEVICE LOGIN */
async function startDeviceLogin() {
  showHUD("Requesting login code…");

  const res = await fetch("https://oauth2.googleapis.com/device/code", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: "YOUR_CLIENT_ID_HERE",
      scope: "https://www.googleapis.com/auth/youtube.readonly"
    })
  });

  const data = await res.json();

  document.getElementById("deviceUserCode").textContent =
    "Code: " + data.user_code;
  document.getElementById("deviceLoginStatus").textContent =
    "Go to: " + data.verification_url;

  pollForToken(data.device_code);
}

async function pollForToken(deviceCode) {
  let authorized = false;

  while (!authorized) {
    await new Promise(r => setTimeout(r, 5000));

    const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: "433136699735-guoa9ppvn132n8qecaukvoh336id7eg4.apps.googleusercontent.com",
        client_secret: "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",
        device_code: deviceCode,
        grant_type: "urn:ietf:params:oauth:grant-type:device_code"
      })
    });

    const tokenData = await tokenRes.json();

    if (tokenData.access_token) {
      localStorage.setItem("yt_access_token", tokenData.access_token);
      showHUD("Login Successful");
      authorized = true;
      break;
    }

    if (tokenData.error !== "authorization_pending") {
      showHUD("Login Failed");
      break;
    }
  }
}

document.getElementById("startLoginBtn").addEventListener("click", startDeviceLogin);
</script>
