<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* -----------------------------------------------------------
   GLOBAL THEME
----------------------------------------------------------- */
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}

/* -----------------------------------------------------------
   LAYOUT
----------------------------------------------------------- */
.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

/* -----------------------------------------------------------
   TOPBAR
----------------------------------------------------------- */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

body.light #topbar {
  background: linear-gradient(135deg, rgba(240,242,255,0.95), rgba(220,224,255,0.95));
  color: #05060a;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-orb {
  width: 26px;
  height: 26px;
  border-radius: 999px;
  background: radial-gradient(circle, var(--accent-strong), transparent 70%);
  box-shadow: 0 0 24px rgba(60,242,255,0.9);
}

.topbar-title {
  font-weight: 600;
  letter-spacing: 0.04em;
  font-size: 14px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-btn {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

body.light .topbar-btn {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95));
  color: #05060a;
}



body.light #searchTab {
  background: linear-gradient(135deg, rgba(238,240,255,0.95), rgba(224,228,255,0.95));
}

.search-label {
  font-size: 12px;
  opacity: 0.8;
}

.search-open-btn {
  margin-left: auto;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  pointer-events: auto !important;
}


/* -----------------------------------------------------------
   TABS
----------------------------------------------------------- */
#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  white-space: nowrap;
  padding-bottom: 4px;
  position: relative;
  z-index: 99999 !important;
  pointer-events: auto !important;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  scroll-snap-type: x mandatory;
}

#tabs:focus {
  outline: none;
}
   

/* ⭐ Make parallax-tab focusable for swipe navigation */
.parallax-tab {
  pointer-events: auto !important;
  
}

/* Hidden focus anchor for swipe navigation */
.tabs-focus-anchor {
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}

/* -----------------------------------------------------------
   SEARCH BAR
----------------------------------------------------------- */
#searchTab {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative;
  z-index: 0 !important;
  pointer-events: none; /* ⭐ THIS IS THE CORRECT SETTING */
}

/* Restore interactivity to children */
#searchTab * {
  pointer-events: auto !important;
}

   /* -----------------------------------------------------------
   FIX — Prevent hidden panels from blocking tab clicks
----------------------------------------------------------- */
#searchPanel,
#keyboard,
#suggestions {
  pointer-events: none;
}

#searchPanel.active,
#keyboard.active,
#suggestions.active {
  pointer-events: auto;
}
  

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  text-align: center;
  pointer-events: auto !important;
}

/* ⭐ Glow Pulse */
.tab-btn.active {
  position: relative;
  z-index: 20;
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
  animation: tabPulse 2.2s ease-in-out infinite;
}

@keyframes tabPulse {
  0% { box-shadow: 0 0 10px rgba(60,242,255,0.4); }
  50% { box-shadow: 0 0 22px rgba(60,242,255,0.9); }
  100% { box-shadow: 0 0 10px rgba(60,242,255,0.4); }
}


/* -----------------------------------------------------------
   TAB FADE ANIMATION
----------------------------------------------------------- */
.tab-fade {
  opacity: 0;
  transition: opacity 0.35s ease;
}

.tab-fade.show {
  opacity: 1;
}


/* -----------------------------------------------------------
   PLAYER
----------------------------------------------------------- */
#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;
}

#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 40;
}

/* -----------------------------------------------------------
   FULLSCREEN PLAYER FIX
----------------------------------------------------------- */
#playerSection.player-fullscreen {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  max-height: 100vh;
  background: black;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;

  /* VisionOS transform */
  transform:
    perspective(1200px)
    translateZ(45px)
    scale(1.08)
    rotateX(4deg);

  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    filter 0.55s ease,
    box-shadow 0.55s ease;
}


#playerSection.player-fullscreen iframe {
  width: 100%;
  height: 100%;
  object-fit: contain; /* ⭐ makes video FIT instead of crop */
  background: black;
}

#playerSection.player-fullscreen #playerFrame {
  width: 100%;
  height: 100%;
}

/* -----------------------------------------------------------
   DEPTH‑REACTIVE HOLOGRAPHIC GLOW
----------------------------------------------------------- */
#playerSection {
  --glow-strength: 0.35;
  --glow-blur: 22px;
  --glow-shift-x: 0px;
  --glow-shift-y: 0px;
}

#playerSection::after {
  content: "";
  position: absolute;
  inset: -20px;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(circle, rgba(60,242,255,0.55), transparent 70%);
  filter: blur(var(--glow-blur));
  opacity: var(--glow-strength);
  transform: translate(var(--glow-shift-x), var(--glow-shift-y));
  transition:
    opacity 0.25s ease,
    filter 0.25s ease,
    transform 0.25s ease;
  z-index: -1;
}



#playerSection.player-fullscreen.settled {
  transform:
    perspective(1200px)
    translateZ(0px)
    scale(1)
    rotateX(0deg);
}


   
#playerFrame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;

  /* ⭐ Add this line ⭐ */
  position: relative;
  z-index: 1;
}

   
/* -----------------------------------------------------------
   PLAYER CONTROLS
----------------------------------------------------------- */
.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.player-controls button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 4px 8px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(255,80,80,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 12;
}

/* -----------------------------------------------------------
   HUD
----------------------------------------------------------- */
#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.22), rgba(10,12,20,0.95));
  color: #f5f7ff;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* -----------------------------------------------------------
   FEED
----------------------------------------------------------- */
#feed {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  position: relative;
  z-index: 1 !important;
  pointer-events: auto;
}


.video-card {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer;
  position: relative;
}

.video-card {
  transform-style: preserve-3d;
  perspective: 1100px;
  transition: transform 0.15s ease-out;
}

/* ⭐ Hover Intensity Boost */
.video-card:hover {
  transform: translateZ(22px) scale(1.03);
  box-shadow: 0 0 28px rgba(60,242,255,0.35),
              0 0 55px rgba(60,242,255,0.18);
  transition: transform 0.15s ease-out, box-shadow 0.2s ease-out;
}
   

/* ⭐ Depth‑Layered Holographic Shadow */
.video-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  z-index: -1;

  transform: translate(
    var(--shadow-x, 0px),
    var(--shadow-y, 0px)
  );

  filter: blur(var(--shadow-blur, 18px));
  opacity: var(--shadow-opacity, 0.55);

  box-shadow:
    0 12px 28px rgba(0,0,0,0.45),
    0 0 22px rgba(60,242,255,0.12),
    0 0 40px rgba(120,60,255,0.10);

  transition:
    transform 0.15s ease-out,
    opacity 0.15s ease-out,
    filter 0.15s ease-out;
}

/* ⭐ Ambient Occlusion Layer */
.video-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  z-index: -2;

  background: radial-gradient(
    circle at 50% 60%,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.0) 70%
  );

  opacity: var(--ao-opacity, 0.35);
  filter: blur(var(--ao-blur, 22px));

  transition:
    opacity 0.2s ease-out,
    filter 0.2s ease-out;
}

   
.video-thumb {
  flex: 0 0 140px;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  background: #11131c;
}

.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.video-title {
  font-size: 13px;
  font-weight: 500;
}

.video-channel {
  font-size: 11px;
  opacity: 0.8;
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
}

/* -----------------------------------------------------------
   CHANNEL PAGE
----------------------------------------------------------- */
#channelPage {
  margin-top: 16px;
  display: none;
  position: relative;
  z-index: 10;
}

.channel-banner {
  height: 90px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.25), rgba(8,10,16,0.96));
  display: flex;
  align-items: center;
  padding: 14px;
  gap: 10px;
}

.banner-logo {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.9), transparent 70%);
  box-shadow: 0 0 26px rgba(60,242,255,0.9);
}

.banner-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.channel-header {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.channel-pic {
  width: 46px;
  height: 46px;
  border-radius: 999px;
  object-fit: cover;
}

.channel-meta {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.channel-name {
  font-size: 14px;
  font-weight: 600;
}

.channel-subs {
  font-size: 11px;
  opacity: 0.8;
}

/* -----------------------------------------------------------
   SEARCH PANEL + KEYBOARD
----------------------------------------------------------- */
#searchPanel {
  margin-top: 12px;
  display: none;
  position: relative;
  z-index: 30;
}

.search-input-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  overflow: hidden;
}

.search-input-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: #f5f7ff;
  font-size: 13px;
  padding-left: 6px;
  width: 100%;
  overflow-x: auto;
}

.search-input-bar button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

/* -----------------------------------------------------------
   FULL-WIDTH QWERTY KEYBOARD (AUTO-FLEX)
----------------------------------------------------------- */
#keyboard {
  margin-top: 10px;
  display: none;
  padding: 10px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  width: 100%;
}

.keyboard-row {
  display: flex;
  width: 100%;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(120,130,160,0.7);
  font-size: 14px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  text-align: center;
  cursor: pointer;
  user-select: none;
}

.key-btn[data-key="SPACE"] {
  flex: 4;
}

.key-btn[data-key="DELETE"],
.key-btn[data-key="ENTER"] {
  flex: 2;
}

/* -----------------------------------------------------------
   SUGGESTIONS
----------------------------------------------------------- */
#suggestions {
  margin-top: 8px;
  display: none;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  padding: 6px 8px;
}

.suggestion-item {
  padding: 5px 6px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 10px;
}

.suggestion-item:hover {
  background: rgba(60,242,255,0.16);
}

/* -----------------------------------------------------------
   HOLOGRAPHIC EFFECTS (PLAYER ONLY)
----------------------------------------------------------- */
#playerSection.fx-bloom {
  box-shadow: 0 0 40px rgba(60,242,255,0.65), 0 26px 70px rgba(0,0,0,0.85);
}

#playerSection.fx-ambient {
  background:
    radial-gradient(circle at 50% 0%, rgba(60,242,255,0.25), transparent 60%),
    radial-gradient(circle at 0% 100%, rgba(120,80,255,0.18), transparent 70%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.18), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.98), rgba(2,3,8,1));
}

#playerSection.fx-glass {
  backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(120,130,160,0.7);
}

#playerSection.fx-chroma::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: var(--chroma-opacity, 0.25);
  filter: blur(var(--chroma-blur, 4px));
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,80,0.35), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,200,255,0.35), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(0,255,180,0.35), transparent 60%);
  transition: opacity 0.15s ease-out, filter 0.15s ease-out;
  z-index: -2;
}

#playerSection.fx-audio::after {
  content: "";
  position: absolute;
  inset: -40px;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  mix-blend-mode: screen;
  opacity: var(--audio-glow-opacity, 0.25);
  filter: blur(var(--audio-glow-blur, 20px));
  transition: opacity 0.12s ease-out, filter 0.12s ease-out;
  z-index: -3;
}

/* -----------------------------------------------------------
   DEPTH MODE
----------------------------------------------------------- */
body.search-depth-mode #feed,
body.search-depth-mode #channelPage {
  filter: blur(4px) brightness(0.7);
  pointer-events: none;
}

   /* -----------------------------------------------------------
   CINEMA MODE (Curved Screen + Darkened Environment)
----------------------------------------------------------- */
/* CINEMA MODE */
body.cinema-mode::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  z-index: 9998;
  pointer-events: none;
}

#playerSection.player-fullscreen.cinema {
  border-radius: 40px;
  overflow: hidden;
  transform: perspective(900px) rotateX(6deg); /* ⭐ REMOVE translate(-50%, -50%) */
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
}


/* -----------------------------------------------------------
   CINEMA MODE — AMBIENT GLOW BOOST
----------------------------------------------------------- */
body.cinema-mode #playerSection {
  --audio-glow-opacity: 0.55 !important;
  --audio-glow-blur: 55px !important;

  --chroma-opacity: 0.45 !important;
  --chroma-blur: 18px !important;

  box-shadow:
    0 0 120px rgba(60,242,255,0.55),
    0 0 180px rgba(0,200,255,0.45),
    0 0 260px rgba(0,255,180,0.35);
  transition: box-shadow 0.35s ease, filter 0.35s ease;
}

/* -----------------------------------------------------------
   CINEMA MODE — TRANSITIONS
----------------------------------------------------------- */
#playerSection {
  transition:
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.45s ease,
    filter 0.45s ease;
}

body.cinema-mode::before {
  transition:
    background 0.45s ease,
    backdrop-filter 0.45s ease;
}

body.cinema-mode #playerSection {
  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    border-radius 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.55s ease,
    filter 0.55s ease;
}
   
/* -----------------------------------------------------------
   CINEMA MODE — ZOOM INTRO ANIMATION
----------------------------------------------------------- */
@keyframes cinemaZoomIntro {
  0% {
    transform:
      scale(0.88)
      perspective(900px)
      rotateX(0deg);
    opacity: 0.6;
    filter: brightness(0.7);
  }

  60% {
    transform:
      scale(1.03)
      perspective(900px)
      rotateX(4deg);
    opacity: 1;
    filter: brightness(1);
  }

  100% {
    transform:
      scale(1)
      perspective(900px)
      rotateX(6deg);
    opacity: 1;
    filter: brightness(1);
  }
}


/* Apply animation ONLY when Cinema Mode activates */
#playerSection.player-fullscreen.cinema.zoom-intro {
  animation: cinemaZoomIntro 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

   
/* BACK BUTTON VISIBILITY */
body.fullscreen-active .exit-full-btn {
  display: block;
}



/* -----------------------------------------------------------
   FULLSCREEN BACK BUTTON
----------------------------------------------------------- */
.exit-full-btn {
  position: fixed;
  left: 20px;
  top: 20px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 8px 14px;
  font-size: 14px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 999999999 !important;
  pointer-events: auto;
  display: none;

  /* ⭐ Add this line if not already present */
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}

/* ⭐ HOVER GLOW — AR Visibility Boost */
.exit-full-btn:hover {
  box-shadow: 0 0 18px rgba(60,242,255,0.9),
              0 0 30px rgba(60,242,255,0.5);
  transform: scale(1.08);
}


body.fullscreen-active .exit-full-btn {
  display: block;
}

  
</style>
</head>
<body>
<div class="app-shell">

  <!-- TOPBAR -->
  <div id="topbar" class="parallax">
    <div class="topbar-left">
      <div class="logo-orb"></div>
      <div class="topbar-title">VIEWTUBE AR OS</div>

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) url.searchParams.append(k, v);
  });

  url.searchParams.append("_", Date.now());

  try {
    const res = await fetch(url.toString(), { cache: "no-store" });
    if (!res.ok) return fetchYouTube(endpoint, params);
    return await res.json();
  } catch (err) {
    return fetchYouTube(endpoint, params);
  }
}

/* -----------------------------------------------------------

----------------------------------------------------------- */
setInterval(() => {
  const isFullscreen = playerSection.classList.contains("player-fullscreen");
  const isCinema = document.body.classList.contains("cinema-mode");
  const isFSBody = document.body.classList.contains("fullscreen-active");
  const isHidden = playerSection.style.display === "none";
  const isBlank = !playerFrame.src || playerFrame.src === "about:blank";

  // ❌ Case 1: Player closed but fullscreen still active
  if (isHidden && (isFullscreen || isCinema || isFSBody)) {
    playerSection.classList.remove("player-fullscreen");
    document.body.classList.remove("fullscreen-active");
    disableCinemaMode();
    return;
  }

  // ❌ Case 2: Cinema mode active without fullscreen
  if (!isFullscreen && isCinema) {
    disableCinemaMode();
  }

  // ❌ Case 3: Body fullscreen flag stuck
  if (!isFullscreen && isFSBody) {
    document.body.classList.remove("fullscreen-active");
  }

  // ❌ Case 4: Blank iframe but fullscreen active
  if (isFullscreen && isBlank) {
    playerSection.classList.remove("player-fullscreen");
    document.body.classList.remove("fullscreen-active");
    disableCinemaMode();
  }
}, 150);

  channelPageEl.classList.remove("show");
  subsPageEl.classList.remove("show");
  playlistsPageEl.classList.remove("show");

  if (tab === "channel") channelPageEl.classList.add("show");
  if (tab === "subs") subsPageEl.classList.add("show");

  subsPageEl.style.display = (tab === "subs") ? "block" : "none";

}

async function startDeviceLogin() {
  showHUD("Requesting login code…");

  const res = await fetch("https://oauth2.googleapis.com/device/code", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: OAUTH_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/youtube.readonly"
    })
  });

  const data = await res.json();

  deviceUserCodeEl.textContent = "Code: " + data.user_code;
  deviceLoginStatusEl.textContent = "Go to: " + data.verification_url;

  pollForToken(data.device_code, data.interval || 5);
}

async function pollForToken(deviceCode, intervalSeconds) {
  let authorized = false;

  while (!authorized) {
    await new Promise(r => setTimeout(r, intervalSeconds * 1000));

    const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: OAUTH_CLIENT_ID,
        client_secret: OAUTH_CLIENT_SECRET,
        device_code: deviceCode,
        grant_type: "urn:ietf:params:oauth:grant-type:device_code"
      })
    });

    const tokenData = await tokenRes.json();

    if (tokenData.error) {
      if (tokenData.error === "authorization_pending") {
        deviceLoginStatusEl.textContent = "Waiting for authorization…";
        continue;
      } else {
        deviceLoginStatusEl.textContent = "Error: " + tokenData.error;
        showHUD("Login error");
        break;
      }
    }

    authorized = true;
    localStorage.setItem("yt_access_token", tokenData.access_token);
    deviceLoginStatusEl.textContent = "Logged in. Loading subscriptions…";
    showHUD("YouTube logged in");

    loadSubscriptions();
  }
}

async function loadSubscriptions() {

  }

  subsFeedEl.innerHTML = "";

async function fetchSuggestions(q) {
  if (!q.trim()) return [];
  const data = await fetchYouTube("search", {
    part: "snippet",
    q,
    type: "video",
    maxResults: 50
  });
  return data.items?.map(v => v.snippet.title) || [];
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (!list.length) {
    suggestionsEl.style.display = "none";
    return;
  }

  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => {
      searchInput.value = text;
      triggerSearch(text);
    };
    suggestionsEl.appendChild(item);
  });

  suggestionsEl.style.display = "block";
}

function openKeyboard() {
  searchPanelEl.style.display = "block";
  keyboardEl.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex";

  // ⭐ Enable pointer events so keyboard/search panel can be clicked
  searchPanelEl.classList.add("active");
  keyboardEl.classList.add("active");

  // ⭐ Hide all other pages so nothing shows behind the keyboard
  feedEl.style.display = "none";
  subsPageEl.style.display = "none";
  playlistsPageEl.style.display = "none";
  channelPageEl.style.display = "none";
}



function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none";

  // ⭐ Disable pointer events so tabs become clickable again
  searchPanelEl.classList.remove("active");
  keyboardEl.classList.remove("active");

  // ⭐ Restore the correct page based on currentTab
  if (currentTab === "home") feedEl.style.display = "block";
  if (currentTab === "subs") subsPageEl.style.display = "block";
  if (currentTab === "playlists") playlistsPageEl.style.display = "block";
  if (currentTab === "channel") channelPageEl.style.display = "block";
}



searchTabEl.addEventListener("click", openKeyboard);

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  const key = btn.dataset.key;

  if (key === "SPACE") searchInput.value += " ";
  else if (key === "DELETE") searchInput.value = searchInput.value.slice(0, -1);
  else if (key === "ENTER") {
    triggerSearch(searchInput.value.trim());
    return;
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  lastSearchQuery = q;   // ⭐ STORE THE QUERY FOR INFINITE SCROLL

  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 50,
      _: Date.now()
    });

    nextPageToken = data.nextPageToken || null;

    renderFeed(data.items || []);
    closeKeyboard();
    showHUD("Search: " + q);
  })();
}

/* -----------------------------------------------------------
   HOLOGRAPHIC EFFECTS
----------------------------------------------------------- */
function applyChroma(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  const blur = 4 + intensity * 12;
  const opacity = 0.25 + intensity * 0.45;

  playerSection.style.setProperty("--chroma-blur", `${blur}px`);
  playerSection.style.setProperty("--chroma-opacity", opacity);
}

/* -----------------------------------------------------------
   AUDIO GLOW (SIMULATED)
----------------------------------------------------------- */
let audioGlowActive = false;

function initAudioGlow() {
  if (audioGlowActive) return;
  audioGlowActive = true;

  function animateGlow() {
    if (!audioGlowActive) return;

    const pulse = 0.25 + Math.random() * 0.35;
    const blur = 20 + Math.random() * 25;

    playerSection.style.setProperty("--audio-glow-opacity", pulse);
    playerSection.style.setProperty("--audio-glow-blur", `${blur}px`);

    requestAnimationFrame(animateGlow);
  }

  animateGlow();
}

/* -----------------------------------------------------------
   DEPTH‑REACTIVE GLOW ENGINE (defined ONCE)
----------------------------------------------------------- */
function applyDepthGlow(x, y, isFullscreen) {
  const strength = isFullscreen ? 0.75 : 0.35;
  const blur = isFullscreen ? 55 : 22;

  playerSection.style.setProperty("--glow-strength", strength);
  playerSection.style.setProperty("--glow-blur", `${blur}px`);

  playerSection.style.setProperty("--glow-shift-x", `${x * 12}px`);
  playerSection.style.setProperty("--glow-shift-y", `${y * 12}px`);
}


/* -----------------------------------------------------------
   PARALLAX / DEPTH ENGINE
----------------------------------------------------------- */
document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;

  // existing parallax
  document.querySelectorAll(".parallax").forEach((el) => {
    const depth = 8;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  document.querySelectorAll(".parallax-tab").forEach((el) => {
    const depth = 4;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  // ⭐ Depth‑reactive glow (VisionOS)
  const isFullscreen = playerSection.classList.contains("player-fullscreen");
  applyDepthGlow(x, y, isFullscreen);

  // ⭐ IMAX tilt + Hover Intensity Boost
  document.querySelectorAll(".video-card").forEach((card) => {
    const tiltX = y * -8;
    const tiltY = x * 8;
    const shiftX = x * 12;
    const shiftY = y * 12;

    const isHover = card.matches(":hover");
    const boost = isHover ? 1.6 : 1;
    const lift = isHover ? 18 : 0;

    card.style.transform = `
      perspective(1100px)
      rotateX(${tiltX * boost}deg)
      rotateY(${tiltY * boost}deg)
      translateX(${shiftX}px)
      translateY(${shiftY}px)
      translateZ(${lift}px)
    `;
  });

  // ⭐ Depth‑reactive holographic shadow
  document.querySelectorAll(".video-card").forEach((card) => {
    const shadowX = x * 14;
    const shadowY = y * 14;

    const isHover = card.matches(":hover");
    const blur = isHover ? 28 : 18;
    const opacity = isHover ? 0.75 : 0.55;

    card.style.setProperty("--shadow-x", `${shadowX}px`);
    card.style.setProperty("--shadow-y", `${shadowY}px`);
    card.style.setProperty("--shadow-blur", `${blur}px`);
    card.style.setProperty("--shadow-opacity", opacity);
  });

  // ⭐ Ambient Occlusion depth response
  document.querySelectorAll(".video-card").forEach((card) => {
    const isHover = card.matches(":hover");

    const aoOpacity = isHover ? 0.22 : 0.35;
    const aoBlur = isHover ? 32 : 22;

    card.style.setProperty("--ao-opacity", aoOpacity);
    card.style.setProperty("--ao-blur", `${aoBlur}px`);
  });

  applyChroma(x, y);
});
