<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViewTube AR OS - Production Build</title>
    <style>
        :root {
            --bg-dark: #05060a;
            --bg-pure: #000000;
            --accent: #3cf2ff;
            --accent-focus: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #8a99ad;
            --card-height: 88px;
            --glass-blur: blur(8px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- PERFORMANCE & AR ENGINE CORE --- */
        #ar-canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1200px;
        }

        /* Rapid Tab Swapping via Performance-Oriented Engine Rendering */
        .tab-section {
            display: none;
            flex-direction: column;
            width: 100%;
            height: calc(100vh - 120px); /* Account for player + navbar overhead safely */
            overflow-y: auto;
            scrollbar-width: none;
        }

        .tab-section::-webkit-scrollbar {
            display: none;
        }

        /* Critical Speed Optimization: Skips layout/paint cycles completely for background domains */
        .tab-section:not(.active) {
            display: none !important;
            content-visibility: hidden;
        }

        .tab-section.active {
            display: flex;
            content-visibility: auto;
            contain-intrinsic-size: 1000px;
        }

        /* --- UI NAVIGATION COMPONENTS --- */
        #navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(5, 6, 10, 0.85);
            backdrop-filter: var(--glass-blur);
            height: 60px;
            border-bottom: 1px solid rgba(60, 242, 255, 0.2);
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            transition: color 0.15s ease;
        }

        .nav-btn.active, .nav-btn:focus {
            color: var(--accent);
            outline: none;
            text-shadow: 0 0 8px var(--accent);
        }

        /* Strict Meta MRBD Targeting Interface Layout */
        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
        }

        .video-card {
            display: flex;
            height: var(--card-height);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            contain: strict; /* Total DOM sub-tree isolation for lightning-fast scrolling */
            transform: translateZ(0);
        }

        .video-card:focus, .video-card.focusable:focus {
            outline: none;
            border-color: var(--accent-focus);
            background: rgba(60, 242, 255, 0.08);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        .thumb-placeholder {
            width: 130px;
            height: 100%;
            background: #121620;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 11px;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0; /* Prevents text blowout layout breakages */
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* --- HARDWARE ACCELERATED CORE PLAYER ENGINE --- */
        #playerSection {
            width: 100%;
            background: var(--bg-pure);
            z-index: 90;
            aspect-ratio: 16 / 9;
            transform: translateZ(0);
            will-change: transform;
            flex-shrink: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Immersive Expanded View Mechanics */
        .player-fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 1000;
            background: var(--bg-pure);
            transform: translate3d(0,0,0) scale(1) !important;
        }

        /* --- VISUAL FX PRESETS (THROTTLED COMPOSITING EFFECT ENVIRONMENT) --- */
        .fx-bloom { box-shadow: inset 0 0 20px rgba(60,242,255,0.4); }
        .fx-ambient { background: radial-gradient(circle at center, #0a0f1d 0%, var(--bg-pure) 100%); }
        .fx-glass { backdrop-filter: var(--glass-blur); }

        /* --- LOW OVERHEAD VIRTUAL KEYBOARD --- */
        #keyboardContainer {
            margin-top: auto;
            background: rgba(5, 6, 10, 0.98);
            border-top: 1px solid rgba(60, 242, 255, 0.2);
            padding: 8px;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 0;
            text-align: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .key:focus {
            background: var(--accent);
            color: var(--bg-pure);
            outline: none;
        }

        .key-wide { grid-column: span 2; }

        /* --- SHORTS COMPS --- */
        #shortsPage {
            position: relative;
            background: var(--bg-pure);
            width: 100%;
            height: 100%;
        }

        .shorts-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }

        .shorts-container::-webkit-scrollbar {
            display: none;
        }

        .shorts-slide {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(0);
        }

        .shorts-sidebar {
            position: absolute;
            right: 16px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .shorts-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .shorts-btn:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            outline: none;
        }

        #shortsCounter {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--accent);
            z-index: 10;
        }

        /* --- PLAYLIST COMPONENTS --- */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
        }

        .playlist-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transform: translateZ(0);
        }

        .playlist-card:focus {
            outline: none;
            border-color: var(--accent-focus);
            background: rgba(60, 242, 255, 0.08);
        }
    </style>
</head>

    <div id="ar-canvas">
        
        <!-- HIGH ACCELERATION MEDIASCAPING CORE PLAYER -->
        <div id="playerSection" class="fx-ambient">
            <!-- preload="metadata" avoids multi-thread asset bloating overhead immediately -->
            <video id="mainVideo" preload="metadata" playsinline webkit-playsinline controls>
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>
        </div>

        <!-- NAVIGATION CONTROL BAR -->
        <div id="navbar">
            <button class="nav-btn active" data-target="feedView">FEED</button>
            <button class="nav-btn" data-target="searchView">SEARCH</button>
            <button class="nav-btn" data-target="shortsView">SHORTS</button>
            <button class="nav-btn" data-target="channelView">CHANNELS</button>
            <button class="nav-btn" data-target="playlistView">PLAYLISTS</button>
        </div>

        <!-- VIEWPORT ENGINE SECTIONS -->
        <!-- 1. FEED TAB DOM -->

            <div class="video-grid" id="mainFeedGrid">
                <!-- Data layers appended on isolated frame execution cycles -->
            </div>
        </div>

        <!-- 2. SEARCH ENGINE DOM -->
        <div id="searchView" class="tab-section">
            <div style="padding: 12px; flex-shrink:0;">

            </div>
            <div class="video-grid" id="searchResultGrid" style="flex:1; overflow-y:auto;"></div>
            
            <div id="keyboardContainer">
                <div id="keyboard">
                    <div class="key" tabindex="0">Q</div><div class="key" tabindex="0">W</div><div class="key" tabindex="0">E</div><div class="key" tabindex="0">R</div><div class="key" tabindex="0">T</div><div class="key" tabindex="0">Y</div><div class="key" tabindex="0">U</div><div class="key" tabindex="0">I</div><div class="key" tabindex="0">O</div><div class="key" tabindex="0">P</div>

                    <div class="key" tabindex="0">Z</div><div class="key" tabindex="0">X</div><div class="key" tabindex="0">C</div><div class="key" tabindex="0">V</div><div class="key" tabindex="0">B</div><div class="key" tabindex="0">N</div><div class="key" tabindex="0">M</div><div class="key key-wide" data-action="space" tabindex="0">SPACE</div><div class="key key-wide" data-action="enter" tabindex="0">ENTER</div>
                </div>
            </div>
        </div>

        <!-- 3. SHORTS LOOP SYSTEM VIEW -->
        <div id="shortsView" class="tab-section">
            <div id="shortsPage">
                <div id="shortsCounter">Shorts Layer Active</div>
                <div class="shorts-container">
                    <div class="shorts-slide">
                        <div class="thumb-placeholder" style="width:100%; height:100%; font-size: 16px;">Immersive Shorts Stream #1</div>
                        <div class="shorts-sidebar">
                            <button class="shorts-btn" id="shortsHeartBtn">♥</button>
                            <button class="shorts-btn">💬</button>
                            <button class="shorts-btn">↗</button>
                        </div>
                    </div>
                    <div class="shorts-slide">
                        <div class="thumb-placeholder" style="width:100%; height:100%; font-size: 16px;">Immersive Shorts Stream #2</div>
                        <div class="shorts-sidebar">
                            <button class="shorts-btn">♥</button>
                            <button class="shorts-btn">💬</button>
                            <button class="shorts-btn">↗</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. CHANNEL INFRASTRUCTURE COMPONENT VIEW -->
        <div id="channelView" class="tab-section">
            <div style="padding:20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0;">
                <div style="width:64px; height:64px; background:#3cf2ff; border-radius:50%; margin:0 auto 10px; box-shadow: 0 0 10px rgba(60,242,255,0.5);"></div>
                <h3>Developer Channel</h3>
                <p style="color:var(--text-dim); font-size:12px; margin-top:2px;">1.2M Subscribers • 342 Videos</p>
            </div>
            <div class="video-grid" id="channelVideoGrid"></div>
        </div>

        <!-- 5. PLAYLIST INTERFACE MATRIX -->
        <div id="playlistView" class="tab-section">
            <div class="playlist-grid">
                <div class="playlist-card" tabindex="0">
                    <h4 style="color:var(--accent);">Watch Later</h4>
                    <p style="color:var(--text-dim); font-size:12px;">14 Videos</p>
                </div>
                <div class="playlist-card" tabindex="0">
                    <h4 style="color:var(--accent);">AR Dev Mix</h4>
                    <p style="color:var(--text-dim); font-size:12px;">48 Videos</p>
                </div>
                <div class="playlist-card" tabindex="0">
                    <h4 style="color:var(--accent);">Spatial Audio Sets</h4>
                    <p style="color:var(--text-dim); font-size:12px;">9 Videos</p>
                </div>
                <div class="playlist-card" tabindex="0">
                    <h4 style="color:var(--accent);">History Vault</h4>
                    <p style="color:var(--text-dim); font-size:12px;">120 Videos</p>
                </div>
            </div>
        </div>

    </div>

        document.addEventListener("DOMContentLoaded", () => {

            const tabSections = document.querySelectorAll(".tab-section");
            const searchBar = document.getElementById("searchBar");

            // Mock Data Generator for isolated rapid generation
            const generateMockVideos = (count) => {
                return Array.from({ length: count }, (_, i) => ({
                    id: i,
                    title: `Optimized AR Processing Broadcast #${i + 1}`,
                    meta: `Spatial Studio • ${10 + i}K views • 2 hours ago`,

                }));

                    requestAnimationFrame(() => {
                        navButtons.forEach(b => b.classList.remove("active"));
                        tabSections.forEach(tab => tab.classList.remove("active"));

                        activeTab.classList.add("active");
                    });
                });
            });

            // --- DEBOUNCED / ASYNC ENGINE LIST COMPILATION ---
            const compileFeedGrid = (containerId, items) => {
                const container = document.getElementById(containerId);
                if (!container) return;

                items.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "video-card focusable";
                    card.setAttribute("tabindex", "0");
                    card.innerHTML = `
                        <div class="thumb-placeholder">16:9 AR Layer</div>
                        <div class="video-info">
                            <div class="video-title">${item.title}</div>
                            <div class="video-meta">${item.meta}</div>
                        </div>
                    `;
                    
                    // Hardware accelerated initialization pipeline mapping
                    card.addEventListener("click", () => {
                        if (videoPlayer.src !== item.src) {
                            videoPlayer.src = item.src;
                            videoPlayer.load(); // Forces instant media thread update pipeline
                        }
                        videoPlayer.play();
                    });

                    fragment.appendChild(card);
                });

                requestAnimationFrame(() => {
                    container.appendChild(fragment);
                });
            };

            // Non-blocking deferred loading pipeline for structural views
            setTimeout(() => compileFeedGrid("mainFeedGrid", mockDb.slice(0, 10)), 0);
            setTimeout(() => compileFeedGrid("channelVideoGrid", mockDb.slice(10, 20)), 40);
            setTimeout(() => compileFeedGrid("searchResultGrid", mockDb.slice(20, 30)), 80);

            let searchDebounceTimeout;
            searchBar.addEventListener("input", (e) => {
                clearTimeout(searchDebounceTimeout);
                searchDebounceTimeout = setTimeout(() => {
                    const query = e.target.value.toLowerCase();
                    const filtered = mockDb.filter(v => v.title.toLowerCase().includes(query));
                    
                    const grid = document.getElementById("searchResultGrid");

                    compileFeedGrid("searchResultGrid", filtered);

                    const action = key.getAttribute("data-action");
                    const value = key.innerText;

                    if (!action) {
                        searchBar.value += value;
                    } else if (action === "delete") {
                        searchBar.value = searchBar.value.slice(0, -1);
                    } else if (action === "space") {
                        searchBar.value += " ";
                    } else if (action === "enter") {

            // --- FULLSCREEN TRANSFORM TOGGLE FUNCTIONALITY ---
            videoPlayer.addEventListener("dblclick", () => {
                videoPlayer.classList.toggle("player-fullscreen");
            });
        });
    </script>
</body>
</html>
