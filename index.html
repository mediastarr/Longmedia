<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewTube OS</title>
<style>
:root {
  --bg: rgba(0,0,0,0.75);
  --card: rgba(10,10,10,0.8);
  --text: #fff;
  --blur: 22px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: var(--text);
}

/* Top bar */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  margin: 8px;
  z-index: 60;
  transform-style: preserve-3d;
}

.app-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.youtube-logo {
  width: 28px;
  height: 20px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.youtube-logo::after {
  content: "";
  position: absolute;
  left: 10px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-style: solid;
  border-width: 6px 0 6px 12px;
  border-color: transparent transparent transparent white;
}

.app-title {
  font-weight: 600;
  letter-spacing: 0.5px;
}

.btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* Glassy search bar */

.search-tab {
  margin: 0 8px 8px;
  padding: 10px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(26px) saturate(1.3);
  -webkit-backdrop-filter: blur(26px) saturate(1.3);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  z-index: 55;
  transform-style: preserve-3d;
}

.search-icon {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.8);
  position: relative;
}

.search-icon::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 2px;
  background: rgba(255,255,255,0.8);
  border-radius: 999px;
  transform: rotate(45deg);
  right: -6px;
  bottom: -1px;
}

.search-label {
  font-size: 13px;
  opacity: 0.9;
}

/* Search panel + keyboard */

.search-panel {
  position: relative;
  margin: 0 8px 8px;
  display: none;
}

.search-input-bar {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  backdrop-filter: blur(26px) saturate(1.3);
  -webkit-backdrop-filter: blur(26px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.18);
  transform-style: preserve-3d;
  z-index: 350;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  font-size: 13px;
  padding-left: 14px;
}

.search-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.search-back-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.6);
  color: var(--text);
  cursor: pointer;
  margin-left: 6px;
}

/* Keyboard */

.keyboard {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 8px;
  display: none;
  z-index: 340;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);
  transform-style: preserve-3d;
}

.keyboard-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  min-width: 32px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(40,40,40,0.9);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transform-style: preserve-3d;
}

/* Tabs */

.tabs {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  margin: 8px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  z-index: 50;
  transform-style: preserve-3d;
}

.tab-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  opacity: 0.7;
}

.tab-btn.active {
  background: rgba(255,255,255,0.12);
  opacity: 1;
  transform-style: preserve-3d;
  position: relative;
}

.tab-btn.active::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  filter: blur(6px);
  transform-style: preserve-3d;
  pointer-events: none;
}

/* Player */

.player {
  margin: 8px;
  padding: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, width 0.25s ease-out, height 0.25s ease-out, top 0.25s ease-out, left 0.25s ease-out;
  z-index: 30;
  position: relative;
  display: none;
  width: min(600px, 90vw);
  height: min(600px, 90vw);
}

.player iframe {
  width: 100%;
  height: 100%;
  border-radius: 18px;
  border: none;
}

.player-controls {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  justify-content: space-between;
  gap: 6px;
  transform-style: preserve-3d;
}

.ctrl-btn {
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.5);
  color: var(--text);
  cursor: pointer;
  font-size: 11px;
}

/* Fullscreen */

.player-fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(600px, 90vw);
  height: min(600px, 90vw);
  margin: 0;
  border-radius: 22px;
  z-index: 50;
  display: block;
}

/* Mini-player */

.player-mini {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 220px;
  height: 220px;
  border-radius: 18px;
  overflow: hidden;
  z-index: 40;
  box-shadow: 0 8px 24px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.6);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  display: block;
}

/* Feed */

.feed {
  margin: 8px;
}

.video-card {
  position: relative;
  background: var(--card);
  border-radius: 22px;
  padding: 12px;
  margin-bottom: 8px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 5;
  display: flex;
  gap: 8px;
  cursor: pointer;
}

.video-thumb img {
  width: 120px;
  height: 68px;
  border-radius: 12px;
  object-fit: cover;
}

.video-info {
  flex: 1;
}

.video-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text);
}

.video-channel {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 2px;
  color: var(--text);
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
  color: var(--text);
}

/* HUD */

.hud {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: 999px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 11px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease-out;
  transform-style: preserve-3d;
}

/* Channel page */

.channel-page {
  padding: 12px;
  margin: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
}

/* Banner */

.channel-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 11;
}

.banner-logo {
  width: 42px;
  height: 28px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.banner-logo::after {
  content: "";
  position: absolute;
  left: 14px;
  top: 7px;
  width: 14px;
  height: 14px;
  border-style: solid;
  border-width: 7px 0 7px 14px;
  border-color: transparent transparent transparent white;
}

.banner-text {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

/* Channel header */

.channel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  z-index: 10;
  transform-style: preserve-3d;
}

.channel-pic {
  width: 40px;
  height: 40px;
  border-radius: 999px;
}

.channel-meta {
  display: flex;
  flex-direction: column;
  transform-style: preserve-3d;
}

.channel-name {
  font-size: 15px;
  font-weight: 600;
}

.channel-subs {
  font-size: 12px;
  opacity: 0.7;
}

/* Parallax */

.parallax {
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out;
}

/* Search depth mode */

.search-depth-mode .video-card,
.search-depth-mode .tabs,
.search-depth-mode .topbar,
.search-depth-mode .channel-page,
.search-depth-mode .player {
  transform: translateZ(-120px) !important;
  opacity: 0.35;
  transition: transform 0.25s ease-out, opacity 0.25s ease-out;
}
</style>
</head>

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) {
      url.searchParams.append(k, v);
    }
  });

  const timestamp = Date.now();
  url.searchParams.append("_", Date.now());

  try {
    const res = await fetch(url.toString(), { cache: "no-store" });
    if (!res.ok) {
      console.warn("Key failed, switching to next key:", key);
      return fetchYouTube(endpoint, params);
    }
    return await res.json();
  } catch (err) {
    console.error("Network error, retrying with next key:", err);
    return fetchYouTube(endpoint, params);
  }
}

    channelPageEl.style.display = "block";
    feedEl.style.display = "none";
  } else {
    feedEl.style.display = "block";
    channelPageEl.style.display = "none";
  }
}

// Player
function setPlayerVideo(videoId, snippet) {
  currentVideoId = videoId;
  playerSection.style.display = "block";
  playerSection.classList.remove("player-mini", "player-fullscreen");
  playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
  historyList.unshift({ id: videoId, snippet });
  if (historyList.length > 50) historyList.pop();
  hideUIForVideo();
  playPauseBtn.textContent = "Pause";
  applyMiniPlayerFrameDepth();
}

// Tabs
function setActiveTab(tab) {
  currentTab = tab;
  [homeTab, shortsTab, moviesTab, historyTab, trendingTab, channelTab]
    .forEach(btn => btn.classList.remove("active"));
  if (tab === "home") homeTab.classList.add("active");
  if (tab === "shorts") shortsTab.classList.add("active");
  if (tab === "movies") moviesTab.classList.add("active");
  if (tab === "history") historyTab.classList.add("active");
  if (tab === "trending") trendingTab.classList.add("active");
  if (tab === "channel") channelTab.classList.add("active");

  if (tab === "channel") {
    feedEl.style.display = "none";
    channelPageEl.style.display = "block";
  } else {
    feedEl.style.display = "block";
    channelPageEl.style.display = "none";
  }

  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  applyTabHighlightDepth();
}

// Feed renderer
function renderFeed(items) {
  feedEl.innerHTML = "";

  items.forEach((item, i) => {
    const snippet = item.snippet || {};
    const stats = item.statistics || {};
    const videoId = item.id?.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.high?.url
           || snippet.thumbnails?.medium?.url
           || snippet.thumbnails?.default?.url
           || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = snippet.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = snippet.channelTitle || "Unknown channel";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = `${stats.viewCount || 0} views`;

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    img.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    title.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channel.onclick = (e) => {
      e.stopPropagation();
      const channelId = snippet.channelId || currentChannelId;
      loadChannelPage(channelId);
    };

    feedEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// 3D stacking
function apply3DStacking() {
  const cards = document.querySelectorAll('.video-card');

  cards.forEach((card, i) => {
    const depth = -40 * i + Math.sin(i * 0.6) * 12;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
    `;
  });
}

// Depth helpers
function applyPlayerDepth() {
  const player = document.getElementById("playerSection");
  if (!player) return;

  let depth = -60;
  if (player.classList.contains("player-fullscreen")) depth = 40;
  else if (player.classList.contains("player-mini")) depth = -10;

  player.style.transform = `
    perspective(900px)
    translateZ(${depth}px)
  `;
}

function applyMiniPlayerFrameDepth() {
  const player = document.getElementById("playerSection");
  if (!player) return;

  let depth = -30;
  if (player.classList.contains("player-fullscreen")) depth = 40;
  if (!player.classList.contains("player-mini")) depth = -60;

  player.style.transform = `
    perspective(900px)
    translateZ(${depth}px)
  `;
}

function applyChannelBannerDepth() {
  const banner = document.querySelector(".channel-banner");
  if (!banner) return;

  const depth = -20;
  banner.style.transform = `
    perspective(900px)
    translateZ(${depth}px)
  `;
}

function applyChannelHeaderDepth() {
  const header = document.querySelector(".channel-header");
  const meta = document.querySelector(".channel-meta");

  if (header) {
    header.style.transform = `
      perspective(900px)
      translateZ(-15px)
    `;
  }

  if (meta) {
    meta.style.transform = `
      perspective(900px)
      translateZ(5px)

  }
}

function applySearchBarDepthFull() {

  `;
}

function applySearchInputDepthFull() {

  if (bar.style.display !== "none") {
    bar.style.transform = `
      perspective(900px)
      translateZ(110px)

}

function applyKeyboardPanelDepthFull() {

function applyKeyboardKeyDepthFull() {

function applyHUDDepthFull() {

function applyTopbarDepth() {

function applySearchBarDepth() {

function applyMiniControlsDepth() {

function applyTabDepthStacking() {
  const tabs = document.querySelectorAll('.parallax-tab');
  const baseDepth = -20;
  const step = -12;

  tabs.forEach((tab, index) => {
    const depth = baseDepth + step * index;
    tab.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
    `;
  });
}

function applyTabHighlightDepth() {
  const activeTab = document.querySelector(".tab-btn.active");
  if (!activeTab) return;

    perspective(900px)

  `;

// Search depth mode
function enterSearchDepthMode() {
  document.body.classList.add("search-depth-mode");
}

function exitSearchDepthMode() {
  document.body.classList.remove("search-depth-mode");
}

// Micro-parallax
document.addEventListener("pointermove", (e) => {
  const tiltX = e.movementX * 0.06;
  const tiltY = e.movementY * 0.04;

  document.querySelectorAll('.parallax').forEach(el => {
    el.style.transform = `
      perspective(900px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = -40 * i + Math.sin(i * 0.6) * 12;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  const tabs = document.querySelectorAll('.parallax-tab');
  tabs.forEach((tab, index) => {
    const baseDepth = -20;
    const step = -12;
    const depth = baseDepth + step * index;
    tab.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  applyPlayerDepth();
  applyChannelBannerDepth();
  applyChannelHeaderDepth();
  applySearchBarDepthFull();
  applySearchInputDepthFull();
  applyKeyboardPanelDepthFull();
  applyKeyboardKeyDepthFull();
  applyHUDDepthFull();
  applyTopbarDepth();
  applyMiniControlsDepth();
  applyKeyboardDepth();
  applyTabHighlightDepth();
});

// Player commands
function postToPlayer(command) {
  if (!playerFrame.contentWindow) return;
  playerFrame.contentWindow.postMessage(JSON.stringify(command), "*");
}

playPauseBtn.addEventListener("click", () => {
  if (playPauseBtn.textContent === "Pause") {
    playPauseBtn.textContent = "Play";
    postToPlayer({ event: "command", func: "pauseVideo", args: [] });
  } else {
    playPauseBtn.textContent = "Pause";
    postToPlayer({ event: "command", func: "playVideo", args: [] });
  }
});

forwardBtn.addEventListener("click", () => {
  postToPlayer({ event: "command", func: "seekBy", args: [10] });

  // NEW — reset scroll origin so vertical scroll works immediately
  scrollStartX = null;
  scrollStartY = null;

  // NEW — give mini-player pointer priority for 300ms
  playerSection.style.pointerEvents = "auto";
  feedEl.style.pointerEvents = "none";
  tabsEl.style.pointerEvents = "none";

  setTimeout(() => {
    // restore directional logic after 300ms
    feedEl.style.pointerEvents = "auto";
    tabsEl.style.pointerEvents = "auto";
  }, 250);
});


rewindBtn.addEventListener("click", () => {
  postToPlayer({ event: "command", func: "seekBy", args: [-10] });
});

// Channel page

async function loadChannelPage(channelId) {
  currentChannelId = channelId;
  setActiveTab("channel");

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) {
    showHUD("Channel not found");
    return;
  }

  renderChannelHeader(channelInfo);

  const uploads = await fetchYouTube("search", {
    part: "snippet",
    channelId,
    type: "video",
    order: "date",
    maxResults: 20
  });

  channelNextPageToken = uploads.nextPageToken || null;
  renderChannelFeed(uploads.items || []);

  showHUD("Channel: " + channelInfo.snippet.title);
}

function renderChannelHeader(info) {
  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${info.snippet.thumbnails?.default?.url || ""}">
      <div class="channel-meta">
        <div class="channel-name">${info.snippet.title}</div>
        <div class="channel-subs">${info.statistics?.subscriberCount || 0} subscribers</div>
      </div>
    </div>
  `;
  applyChannelBannerDepth();
  applyChannelHeaderDepth();
}

function renderChannelFeed(items) {
  items.forEach((item, i) => {
    const snippet = item.snippet;
    const videoId = item.id.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channelPageEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// Infinite scroll for channel
window.addEventListener("scroll", async () => {
  if (currentTab === "channel" && channelNextPageToken && window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    const more = await fetchYouTube("search", {
      part: "snippet",

      maxResults: 20,
      pageToken: channelNextPageToken
    });

    channelNextPageToken = more.nextPageToken || null;
    renderChannelFeed(more.items || []);
    showHUD("More channel videos");
  }
});

// Shorts: vertical videos only
shortsTab.addEventListener("click", async () => {
  setActiveTab("shorts");

  // Fetch trending videos (bigger pool = more vertical videos)
  const trending = await fetchYouTube("videos", {
    part: "snippet,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50
  });

  const shorts = [];

  for (const item of trending.items || []) {
    const snippet = item.snippet;
    const details = item.contentDetails;
    const thumb = snippet.thumbnails?.high;

    if (!thumb) continue;

    const isVertical = thumb.height > thumb.width;
    const isShort = /^PT([0-5]?[0-9])S$/.test(details.duration);

    if (isVertical && isShort) {
      shorts.push({
        id: item.id,
        snippet
      });
    }
  }

  // If still empty, fallback to ANY vertical videos
  if (shorts.length === 0) {
    const search = await fetchYouTube("search", {
      part: "snippet",
      type: "video",
      maxResults: 50,
      order: "date"
    });

    for (const item of search.items || []) {
      const videoId = item.id.videoId;
      if (!videoId) continue;

      const details = await fetchYouTube("videos", {
        part: "snippet,contentDetails",
        id: videoId
      });

      const info = details.items?.[0];
      if (!info) continue;

      const thumb = info.snippet.thumbnails?.high;
      if (!thumb) continue;

      const isVertical = thumb.height > thumb.width;
      const isShort = /^PT([0-5]?[0-9])S$/.test(info.contentDetails.duration);

      if (isVertical && isShort) {
        shorts.push({
          id: videoId,
          snippet: info.snippet
        });
      }
    }
  }

  shortsItems = shorts;
  shortsIndex = 0;

  renderFeed(shorts);
  showHUD("Shorts");
});

// Search tab + keyboard

function openKeyboard() {

  feedEl.style.display = "none";

  tabsEl.style.pointerEvents = "none";
  feedEl.style.pointerEvents = "none";
  playerSection.style.pointerEvents = "none";

  applyKeyboardDepth();
  applyKeyboardPanelDepthFull();
  enterSearchDepthMode();
  applySearchBarDepthFull();
  applyHUDDepthFull();
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";

  feedEl.style.display = "block";

  tabsEl.style.pointerEvents = "auto";
  feedEl.style.pointerEvents = "auto";
  playerSection.style.pointerEvents = "auto";

}

searchTabEl.addEventListener("click", () => {
  openKeyboard();
});

searchBack.addEventListener("click", () => {
  searchInput.value = "";
  closeKeyboard();
});

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

keyboardEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  document.querySelector(".search-input-bar").style.display = "flex";
  applySearchInputDepthFull();

  const key = btn.dataset.key || btn.textContent;

  if (key === "SPACE") {
    searchInput.value += " ";
  } else if (key === "DELETE") {
    searchInput.value = searchInput.value.slice(0, -1);
  } else if (key === "ENTER") {
    const q = searchInput.value.trim() || "music";
    triggerSearch(q);
  } else {
    searchInput.value += key;
  }
});

function triggerSearch(q) {
  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 25
    });
    setActiveTab("home");
    renderFeed(data.items || []);
    showHUD("Search: " + q);
    closeKeyboard();
  })();
}

// Shorts swipe navigation
let touchStartY = null;
let pointerStartY = null;

function playShortAt(index) {
  if (!shortsItems[index]) return;
  const item = shortsItems[index];
  const snippet = item.snippet || {};
  const videoId = item.id;
  setPlayerVideo(videoId, snippet);
  showHUD("Short " + (index + 1));
}

function nextShort() {
  if (shortsIndex < shortsItems.length - 1) {
    shortsIndex++;
    playShortAt(shortsIndex);
  }
}

function prevShort() {
  if (shortsIndex > 0) {
    shortsIndex--;
    playShortAt(shortsIndex);
  }
}

document.addEventListener("touchstart", (e) => {
  if (currentTab !== "shorts") return;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener("touchend", (e) => {
  if (currentTab !== "shorts" || touchStartY === null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  touchStartY = null;
});

document.addEventListener("pointerdown", (e) => {
  if (currentTab !== "shorts") return;
  pointerStartY = e.clientY;
});

document.addEventListener("pointerup", (e) => {
  if (currentTab !== "shorts" || pointerStartY === null) return;
  const dy = e.clientY - pointerStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  pointerStartY = null;
});

// Direction-aware pointer routing for mini-player
let scrollStartX = null;
let scrollStartY = null;

document.addEventListener("pointerdown", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  scrollStartX = e.clientX;
  scrollStartY = e.clientY;
});

document.addEventListener("pointermove", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  if (scrollStartX === null || scrollStartY === null) return;

  const dx = e.clientX - scrollStartX;
  const dy = e.clientY - scrollStartY;

  if (Math.abs(dx) > Math.abs(dy)) {
    feedEl.style.pointerEvents = "auto";
    tabsEl.style.pointerEvents = "auto";
    playerSection.style.pointerEvents = "none";
  } else {
    feedEl.style.pointerEvents = "none";
    tabsEl.style.pointerEvents = "none";
    playerSection.style.pointerEvents = "auto";
  }
});

document.addEventListener("pointerup", () => {
  scrollStartX = null;
  scrollStartY = null;
});

// Initial depth setup

applySearchBarDepth();
applyTabDepthStacking();
applyHUDDepthFull();

// Initial load
(async () => {
  const data = await fetchYouTube("videos", {
    part: "snippet,statistics",
    chart: "mostPopular",
    maxResults: 25
  });
  renderFeed(data.items || []);
})();
