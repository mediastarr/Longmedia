<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://www.youtube.com">
<link rel="preconnect" href="https://www.youtube-nocookie.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="dns-prefetch" href="https://www.youtube.com">
<link rel="dns-prefetch" href="https://s.ytimg.com">
<style>
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}
body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}
.app-shell { display: flex; flex-direction: column; min-height: 100vh; padding: 16px 18px 24px; }
#topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 14px; border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff; position: relative; z-index: 20;
}
body.light #topbar { background: linear-gradient(135deg, rgba(240,242,255,0.95), rgba(220,224,255,0.95)); color: #05060a; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo-orb { width: 26px; height: 26px; border-radius: 999px; background: radial-gradient(circle, var(--accent-strong), transparent 70%); box-shadow: 0 0 24px rgba(60,242,255,0.9); }
.topbar-title { font-weight: 600; letter-spacing: 0.04em; font-size: 14px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  border-radius: 999px; border: 1px solid rgba(120,130,160,0.6);
  padding: 10px 14px; font-size: 13px;
  min-height: 44px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff; cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(60,242,255,0.25);
}
body.light .topbar-btn { background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95)); color: #05060a; }
#searchTab {
  margin-top: 12px; display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: 18px; background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative; z-index: 18;
}
body.light #searchTab { background: linear-gradient(135deg, rgba(238,240,255,0.95), rgba(224,228,255,0.95)); }
.search-label { font-size: 12px; opacity: 0.8; }
.search-open-btn {
  margin-left: auto; border-radius: 999px; border: 1px solid rgba(120,130,160,0.6);
  padding: 10px 14px; font-size: 13px; min-height: 44px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff; cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(60,242,255,0.25);
}
#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;        /* wrap onto 2 rows — no overflow on Ray-Ban */
  position: relative;
  z-index: 16;
}
.tab-btn {
  flex: 1 1 auto;          /* grow to fill row evenly */
  min-width: 70px;         /* never too small to tap */
  min-height: 44px;        /* Apple/Google minimum tap target */
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 13px;
  font-weight: 500;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: rgba(60,242,255,0.25);
  touch-action: manipulation;  /* no 300ms delay on touch */
  user-select: none;
}
.tab-btn:active {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.35), rgba(10,12,20,0.9));
  transform: scale(0.96);
}
.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.22), rgba(10,12,20,0.9));
}
#playerSection {
  margin-top: 16px; border-radius: 22px; overflow: hidden; position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px; display: none;
}
#playerSection.player-mini { position: fixed; right: 16px; bottom: 16px; width: 260px; height: 150px; z-index: 40; }
#playerSection.player-fullscreen {
  width: 100vw; height: 100vh; max-width: 100vw; max-height: 100vh;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.22), transparent 55%),
    radial-gradient(circle at 0% 100%, rgba(120,80,255,0.18), transparent 65%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.18), transparent 65%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.99), rgba(2,3,8,1));
  position: fixed; top: 0; left: 0; z-index: 9999;
  overflow: visible;
  transform: perspective(1200px) translateZ(45px) scale(1.08) rotateX(4deg);
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), filter 0.55s ease, box-shadow 0.55s ease;
}
#playerSection.player-fullscreen iframe { width: 100%; height: 100%; object-fit: contain; background: transparent; }
#playerSection.player-fullscreen #playerFrame { width: 100%; height: 100%; }
#playerSection { --glow-strength: 0.35; --glow-blur: 22px; --glow-shift-x: 0px; --glow-shift-y: 0px; }
#playerSection::after {
  content: ""; position: absolute; inset: -20px; border-radius: inherit; pointer-events: none;
  background: radial-gradient(circle, rgba(60,242,255,0.55), transparent 70%);
  filter: blur(var(--glow-blur)); opacity: var(--glow-strength);
  transform: translate(var(--glow-shift-x), var(--glow-shift-y));
  transition: opacity 0.25s ease, filter 0.25s ease, transform 0.25s ease; z-index: -1;
}
#playerSection.player-fullscreen.settled { transform: perspective(1200px) translateZ(0px) scale(1) rotateX(0deg); }
#playerFrame { width: 100%; height: 100%; border: none; display: block; position: relative; z-index: 1; }
.player-controls { position: absolute; left: 12px; bottom: 10px; display: flex; gap: 8px; z-index: 10; }
.player-controls button {
  border-radius: 999px; border: 1px solid rgba(120,130,160,0.7);
  padding: 10px 14px; font-size: 13px; min-height: 44px; min-width: 44px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff; cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(60,242,255,0.25);
}
#closeMini {
  position: absolute; right: 10px; top: 10px; border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7); padding: 8px 12px; font-size: 13px;
  min-height: 44px; min-width: 44px;
  background: radial-gradient(circle at 0% 0%, rgba(255,80,80,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff; cursor: pointer; z-index: 12;
  touch-action: manipulation;
}
#hud {
  position: fixed; left: 50%; top: 14px; transform: translateX(-50%); padding: 6px 12px;
  border-radius: 999px; background: radial-gradient(circle, rgba(60,242,255,0.22), rgba(10,12,20,0.95));
  color: #f5f7ff; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
  opacity: 0; pointer-events: none; z-index: 60;
}
#feed { margin-top: 16px; display: grid; grid-template-columns: minmax(0, 1fr); gap: 12px; position: relative; z-index: 10; }
.video-card {
  display: flex; gap: 10px; padding: 14px; border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer; position: relative; transform-style: preserve-3d; perspective: 1100px;
  transition: transform 0.15s ease-out;
  min-height: 52px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(60,242,255,0.2);
}

/* SKELETON LOADING */
.skeleton {
  display: flex; gap: 10px; padding: 14px; border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.04), rgba(8,10,16,0.96));
  min-height: 118px;
}
.skeleton-thumb {
  flex: 0 0 140px; height: 90px; border-radius: 14px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(60,242,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.skeleton-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
.skeleton-line {
  height: 12px; border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(60,242,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.skeleton-line.short { width: 60%; }
.skeleton-line.shorter { width: 40%; }
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.video-card:hover {
  transform: translateZ(22px) scale(1.03);
  box-shadow: 0 0 28px rgba(60,242,255,0.35), 0 0 55px rgba(60,242,255,0.18);
  transition: transform 0.15s ease-out, box-shadow 0.2s ease-out;
}
.video-card::after {
  content: ""; position: absolute; inset: 0; border-radius: 18px; z-index: -1;
  transform: translate(var(--shadow-x, 0px), var(--shadow-y, 0px));
  filter: blur(var(--shadow-blur, 18px)); opacity: var(--shadow-opacity, 0.55);
  box-shadow: 0 12px 28px rgba(0,0,0,0.45), 0 0 22px rgba(60,242,255,0.12), 0 0 40px rgba(120,60,255,0.10);
  transition: transform 0.15s ease-out, opacity 0.15s ease-out, filter 0.15s ease-out;
}
.video-card::before {
  content: ""; position: absolute; inset: 0; border-radius: 18px; z-index: -2;
  background: radial-gradient(circle at 50% 60%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 70%);
  opacity: var(--ao-opacity, 0.35); filter: blur(var(--ao-blur, 22px));
  transition: opacity 0.2s ease-out, filter 0.2s ease-out;
}
.video-thumb { flex: 0 0 140px; height: 90px; border-radius: 14px; overflow: hidden; background: #11131c; }
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
.video-title { font-size: 14px; font-weight: 500; line-height: 1.35; }
.video-channel { font-size: 12px; opacity: 0.8; }
.video-meta { font-size: 12px; opacity: 0.7; }

/* PLAYLIST PAGE */
#playlistPage { margin-top: 16px; display: none; position: relative; z-index: 10; }

.playlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-top: 12px;
}

.playlist-card {
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer;
  position: relative;
  transition: transform 0.15s ease-out, box-shadow 0.2s ease-out;
  border: 1px solid rgba(120,130,160,0.25);
}

.playlist-card:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 0 28px rgba(60,242,255,0.35), 0 0 55px rgba(60,242,255,0.12);
  border-color: rgba(60,242,255,0.45);
}

.playlist-thumb-wrap {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #11131c;
  overflow: hidden;
}

.playlist-thumb-wrap img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

.playlist-count-badge {
  position: absolute;
  bottom: 0; right: 0;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 10px;
  padding: 3px 7px;
  border-top-left-radius: 8px;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  gap: 4px;
}

.playlist-info {
  padding: 8px 10px 10px;
}

.playlist-title {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.playlist-sub {
  font-size: 10px;
  opacity: 0.65;
  margin-top: 4px;
}

/* PLAYLIST ITEMS VIEW */
#playlistItemsView {
  display: none;
  margin-top: 0;
}

.playlist-items-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 14px;
  border-bottom: 1px solid rgba(60,242,255,0.15);
  margin-bottom: 12px;
}

.playlist-back-btn {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 12px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

.playlist-items-title {
  font-size: 13px;
  font-weight: 600;
  opacity: 0.9;
  flex: 1;
}

#playlistItemsList {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
}

/* LOGIN NOTICE IN PLAYLIST PAGE */
#playlistLoginPanel {
  margin-top: 12px;
  padding: 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
}

#channelPage { margin-top: 16px; display: none; position: relative; z-index: 10; }
.channel-banner {
  height: 90px; border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.25), rgba(8,10,16,0.96));
  display: flex; align-items: center; padding: 14px; gap: 10px;
}
.banner-logo { width: 32px; height: 32px; border-radius: 999px; background: radial-gradient(circle, rgba(60,242,255,0.9), transparent 70%); box-shadow: 0 0 26px rgba(60,242,255,0.9); }
.banner-text { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.channel-header { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
.channel-pic { width: 46px; height: 46px; border-radius: 999px; object-fit: cover; }
.channel-meta { display: flex; flex-direction: column; gap: 3px; }
.channel-name { font-size: 14px; font-weight: 600; }
.channel-subs { font-size: 11px; opacity: 0.8; }
#searchPanel { margin-top: 12px; display: none; position: relative; z-index: 30; }
.search-input-bar {
  display: none; align-items: center; gap: 8px; padding: 8px 12px;
  border-radius: 16px; background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95)); overflow: hidden;
}
.search-input-bar input { flex: 1; border: none; outline: none; background: transparent; color: #f5f7ff; font-size: 14px; padding-left: 6px; width: 100%; overflow-x: auto; }
.search-input-bar button {
  border-radius: 999px; border: 1px solid rgba(120,130,160,0.7); padding: 10px 14px; font-size: 13px;
  min-height: 44px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9)); color: #f5f7ff; cursor: pointer;
  touch-action: manipulation;
}
#keyboard {
  margin-top: 10px; display: none; padding: 10px; border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95)); width: 100%;
}
.keyboard-row { display: flex; width: 100%; gap: 6px; margin-bottom: 6px; }
.key-btn {
  flex: 1; padding: 14px 0; border-radius: 12px; border: 1px solid rgba(120,130,160,0.7); font-size: 15px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff; text-align: center; cursor: pointer; user-select: none;
  min-height: 48px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(60,242,255,0.25);
}
.key-btn:active {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.4), rgba(10,12,20,0.9));
}
.key-btn[data-key="SPACE"] { flex: 4; }
.key-btn[data-key="DELETE"], .key-btn[data-key="ENTER"] { flex: 2; }
#suggestions { margin-top: 8px; display: none; border-radius: 14px; background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95)); padding: 6px 8px; }
.suggestion-item { padding: 5px 6px; font-size: 12px; cursor: pointer; border-radius: 10px; }
.suggestion-item:hover { background: rgba(60,242,255,0.16); }
/* Medium player base effects */
#playerSection.fx-bloom { box-shadow: 0 0 40px rgba(60,242,255,0.65), 0 26px 70px rgba(0,0,0,0.85); }

/* ---- FULLSCREEN EFFECT AMPLIFICATION ---- */
#playerSection.player-fullscreen.fx-bloom {
  box-shadow:
    0 0 80px rgba(60,242,255,0.85),
    0 0 160px rgba(60,242,255,0.45),
    0 0 260px rgba(0,200,255,0.3),
    0 0 400px rgba(120,60,255,0.2);
}
#playerSection.player-fullscreen.fx-ambient {
  background:
    radial-gradient(circle at 50% 0%,  rgba(60,242,255,0.35), transparent 55%),
    radial-gradient(circle at 0%  100%, rgba(120,80,255,0.28), transparent 65%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.28), transparent 65%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.97), rgba(2,3,8,1));
}
/* Boost chroma aberration in fullscreen */
#playerSection.player-fullscreen.fx-chroma::before {
  opacity: var(--chroma-opacity, 0.45) !important;
  filter: blur(var(--chroma-blur, 18px)) !important;
  inset: -30px;
}
/* Boost audio glow in fullscreen */
#playerSection.player-fullscreen.fx-audio::after {
  inset: -80px;
  opacity: var(--audio-glow-opacity, 0.5) !important;
  filter: blur(var(--audio-glow-blur, 50px)) !important;
}
/* Boost depth glow halo in fullscreen */
#playerSection.player-fullscreen::after {
  inset: -60px;
  background: radial-gradient(circle, rgba(60,242,255,0.75), rgba(120,60,255,0.35) 40%, transparent 70%);
}
/* Glass effect stronger in fullscreen */
#playerSection.player-fullscreen.fx-glass {
  backdrop-filter: blur(0px) saturate(1.8);
  border: 1px solid rgba(60,242,255,0.5);
}
#playerSection.fx-ambient {
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.25), transparent 60%),
    radial-gradient(circle at 0% 100%, rgba(120,80,255,0.18), transparent 70%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.18), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.98), rgba(2,3,8,1));
}
#playerSection.fx-glass { backdrop-filter: blur(18px) saturate(1.4); border: 1px solid rgba(120,130,160,0.7); }
#playerSection.fx-chroma::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  mix-blend-mode: screen; opacity: var(--chroma-opacity, 0.25); filter: blur(var(--chroma-blur, 4px));
  background: radial-gradient(circle at 20% 20%, rgba(255,0,80,0.35), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,200,255,0.35), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(0,255,180,0.35), transparent 60%);
  transition: opacity 0.15s ease-out, filter 0.15s ease-out; z-index: -2;
}
#playerSection.fx-audio::after {
  content: ""; position: absolute; inset: -40px; border-radius: inherit; pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  mix-blend-mode: screen; opacity: var(--audio-glow-opacity, 0.25); filter: blur(var(--audio-glow-blur, 20px));
  transition: opacity 0.12s ease-out, filter 0.12s ease-out; z-index: -3;
}
body.search-depth-mode #feed, body.search-depth-mode #channelPage { filter: blur(4px) brightness(0.7); pointer-events: none; }
body.cinema-mode::before {
  content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); z-index: 9998; pointer-events: none;
}
#playerSection.player-fullscreen.cinema { border-radius: 40px; overflow: hidden; transform: perspective(900px) rotateX(6deg); box-shadow: 0 0 80px rgba(0,0,0,0.6); }
body.cinema-mode #playerSection {
  --audio-glow-opacity: 0.55 !important; --audio-glow-blur: 55px !important;
  --chroma-opacity: 0.45 !important; --chroma-blur: 18px !important;
  box-shadow: 0 0 120px rgba(60,242,255,0.55), 0 0 180px rgba(0,200,255,0.45), 0 0 260px rgba(0,255,180,0.35);
  transition: box-shadow 0.35s ease, filter 0.35s ease;
}
#playerSection { transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease, filter 0.45s ease; }
body.cinema-mode::before { transition: background 0.45s ease, backdrop-filter 0.45s ease; }
body.cinema-mode #playerSection { transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.55s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.55s ease, filter 0.55s ease; }
@keyframes cinemaZoomIntro {

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}, retries = 2) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;
  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;
  Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== null) url.searchParams.append(k, v); });

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);

  try {
    const res = await fetch(url.toString(), { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok && retries > 0) return fetchYouTube(endpoint, params, retries - 1);
    return await res.json();
  } catch (err) {
    clearTimeout(timeout);
    if (retries > 0) return fetchYouTube(endpoint, params, retries - 1);
    return { items: [] };
  }
}

  });
  shortsItems = data.items.map(v => ({ id: v.id.videoId, snippet: v.snippet }));
  shortsIndex = 0;
  nextPageToken = data.nextPageToken || null;

  function updateCounter() {
    shortsCounter.textContent = `${shortsIndex + 1} / ${shortsItems.length}`;
  }

  function playShort(index) {
    const item = shortsItems[index];
    if (!item) return;
    shortsIframe.src = `https://www.youtube.com/embed/${item.id}?autoplay=1&playsinline=1&rel=0&modestbranding=1&origin=${location.origin}`;
    updateCounter();
    // Auto-load more when near end
    if (index >= shortsItems.length - 4 && nextPageToken) loadMoreShorts();
  }

  async function loadMoreShorts() {
    if (!nextPageToken) return;
    const more = await fetchYouTube("search", {
      part: "snippet", q: "#shorts", type: "video",
      videoDuration: "short", videoEmbeddable: "true",
      maxResults: 20, pageToken: nextPageToken, _: Date.now()
    });
    nextPageToken = more.nextPageToken || null;
    shortsItems = shortsItems.concat(more.items.map(v => ({ id: v.id.videoId, snippet: v.snippet })));
    updateCounter();
  }

  function goNext() {
    if (shortsIndex >= shortsItems.length - 1) return;
    shortsTrans.classList.add("flash");
    setTimeout(() => {
      shortsIndex++;
      playShort(shortsIndex);
      shortsTrans.classList.remove("flash");
    }, 180);
  }

  function goPrev() {
    if (shortsIndex <= 0) return;
    shortsTrans.classList.add("flash");
    setTimeout(() => {
      shortsIndex--;
      playShort(shortsIndex);
      shortsTrans.classList.remove("flash");
    }, 180);
  }

  // Autoplay first
  playShort(0);

  // Show hint briefly
  shortsHint.classList.add("visible");
  setTimeout(() => shortsHint.classList.remove("visible"), 2800);

  // Back button
  backBtn2.addEventListener("click", () => {
    shortsIframe.src = "";
    setActiveTab("home");
    shortsPageEl.style.display = "none";
    homeTab.click();
    showHUD("Home");
  });

  // Swipe detection
  let touchStartY = 0;
  let touchStartX = 0;
  let isSwiping = false;

  shortsPageEl.addEventListener("touchstart", (e) => {
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
    isSwiping = false;
  }, { passive: true });

  shortsPageEl.addEventListener("touchmove", (e) => {
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    const dx = Math.abs(e.touches[0].clientX - touchStartX);
    if (dy > dx) isSwiping = true; // vertical swipe
  }, { passive: true });

  shortsPageEl.addEventListener("touchend", (e) => {
    if (!isSwiping) return;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const threshold = 60;
    if (dy < -threshold) goNext();       // swipe up → next
    else if (dy > threshold) goPrev();   // swipe down → prev
  }, { passive: true });

  // Mouse wheel / trackpad support
  let wheelCooldown = false;
  shortsPageEl.addEventListener("wheel", (e) => {
    if (wheelCooldown) return;
    wheelCooldown = true;
    setTimeout(() => wheelCooldown = false, 600);
    if (e.deltaY > 0) goNext();
    else goPrev();
  }, { passive: true });

  // Keyboard arrow keys
  function shortsKeyHandler(e) {
    if (currentTab !== "shorts") return;
    if (e.key === "ArrowDown") goNext();
    if (e.key === "ArrowUp")   goPrev();
  }
  document.addEventListener("keydown", shortsKeyHandler);

  // Cleanup key listener when leaving shorts
  const origSetActive = setActiveTab;
  shortsPageEl._cleanup = () => document.removeEventListener("keydown", shortsKeyHandler);
});

async function startDeviceLogin(source) {
  showHUD("Requesting login code…");
  const codeEl = source === "playlists" ? playlistLoginCode : deviceUserCodeEl;
  const statusEl = source === "playlists" ? playlistLoginStatus : deviceLoginStatusEl;

  const res = await fetch("https://oauth2.googleapis.com/device/code", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: OAUTH_CLIENT_ID, scope: "https://www.googleapis.com/auth/youtube.readonly" })
  });
  const data = await res.json();
  codeEl.textContent = "Code: " + data.user_code;
  statusEl.textContent = "Go to: " + data.verification_url;
  pollForToken(data.device_code, data.interval || 5, source);
}

async function pollForToken(deviceCode, intervalSeconds, source) {
  const statusEl = source === "playlists" ? playlistLoginStatus : deviceLoginStatusEl;
  let authorized = false;
  while (!authorized) {
    await new Promise(r => setTimeout(r, intervalSeconds * 1000));
    const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ client_id: OAUTH_CLIENT_ID, client_secret: OAUTH_CLIENT_SECRET, device_code: deviceCode, grant_type: "urn:ietf:params:oauth:grant-type:device_code" })
    });
    const tokenData = await tokenRes.json();
    if (tokenData.error) {
      if (tokenData.error === "authorization_pending") { statusEl.textContent = "Waiting for authorization…"; continue; }
      else { statusEl.textContent = "Error: " + tokenData.error; showHUD("Login error"); break; }
    }
    authorized = true;
    localStorage.setItem("yt_access_token", tokenData.access_token);
    statusEl.textContent = "Logged in!";
    showHUD("YouTube logged in");
    if (source === "playlists") loadPlaylists();
    else loadSubscriptions();
  }
}

async function loadPlaylists() {
  const token = localStorage.getItem("yt_access_token");
  if (!token) return;

  playlistLoginPanel.style.display = "none";
  playlistGrid.style.display = "none";
  playlistItemsView.style.display = "none";

  try {
    const res = await fetch(

    );
    const data = await res.json();

    if (data.error) {
      playlistLoginPanel.style.display = "block";
      playlistLoginStatus.textContent = "Session expired. Please login again.";
      localStorage.removeItem("yt_access_token");
      return;
    }

    if (!data.items || !data.items.length) {
      playlistGrid.innerHTML = `<div style="font-size:12px;opacity:0.8;grid-column:1/-1;">No playlists found.</div>`;
      playlistGrid.style.display = "grid";
      return;
    }

    data.items.forEach(pl => {
      const snippet = pl.snippet;
      const count = pl.contentDetails?.itemCount || 0;
      const thumb = snippet.thumbnails?.medium?.url || snippet.thumbnails?.default?.url || "";
      const title = snippet.title;
      const desc = snippet.description || "";

      const card = document.createElement("div");
      card.className = "playlist-card";
      card.innerHTML = `
        <div class="playlist-thumb-wrap">
          ${thumb ? `<img src="${thumb}" alt="${title}">` : ""}
          <div class="playlist-count-badge">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><rect x="0" y="1" width="8" height="2" rx="1" fill="white" opacity="0.8"/><rect x="0" y="5" width="10" height="2" rx="1" fill="white" opacity="0.8"/><rect x="0" y="9" width="6" height="2" rx="1" fill="white" opacity="0.8"/></svg>
            ${count}
          </div>
        </div>
        <div class="playlist-info">
          <div class="playlist-title">${title}</div>
          <div class="playlist-sub">${count} video${count !== 1 ? "s" : ""}</div>
        </div>`;

      card.onclick = () => openPlaylist(pl.id, title);
      playlistGrid.appendChild(card);
    });

    playlistGrid.style.display = "grid";
    showHUD("Playlists loaded");

  } catch (e) {
    playlistGrid.innerHTML = `<div style="font-size:12px;opacity:0.8;grid-column:1/-1;">Error loading playlists.</div>`;
    playlistGrid.style.display = "grid";
    showHUD("Playlist error");

}

async function openPlaylist(playlistId, title) {

  playlistItemsTitle.textContent = title;
  playlistItemsList.innerHTML = `<div style="font-size:12px;opacity:0.6;padding:12px 0;">Loading…</div>`;
  showHUD("Loading playlist…");

  try {
    const token = localStorage.getItem("yt_access_token");
    let data;

    if (token) {
      // Use OAuth so private/personal playlist items are visible
      const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
      url.searchParams.set("part", "snippet,contentDetails");
      url.searchParams.set("playlistId", playlistId);
      url.searchParams.set("maxResults", "50");
      const res = await fetch(url.toString(), { headers: { Authorization: "Bearer " + token } });
      data = await res.json();
      // If token expired, fall back to API key
      if (data.error) data = await fetchYouTube("playlistItems", { part: "snippet,contentDetails", playlistId, maxResults: 50, _: Date.now() });
    } else {
      data = await fetchYouTube("playlistItems", { part: "snippet,contentDetails", playlistId, maxResults: 50, _: Date.now() });
    }

    playlistItemsList.innerHTML = "";

    if (!data.items || !data.items.length) {
      playlistItemsList.innerHTML = `<div style="font-size:12px;opacity:0.6;padding:8px 0;">This playlist is empty.</div>`;
      return;
    }

    let rendered = 0;
    data.items.forEach((item, i) => {
      const snippet = item.snippet;
      // videoId can live in resourceId OR contentDetails
      const videoId = snippet.resourceId?.videoId || item.contentDetails?.videoId;
      if (!videoId) return;

      const thumb = snippet.thumbnails?.medium?.url || snippet.thumbnails?.default?.url || "";

      const card = document.createElement("div");
      card.className = "video-card parallax";
      card.innerHTML = `
        <div class="video-thumb"><img src="${thumb}"></div>
        <div class="video-info">
          <div class="video-title">${snippet.title}</div>
          <div class="video-channel">${snippet.videoOwnerChannelTitle || snippet.channelTitle || ""}</div>
          <div class="video-meta">#${i + 1} in playlist</div>
        </div>`;

      card.onclick = () => {
        setPlayerVideo(videoId, snippet);
        showHUD("Playing: " + snippet.title);
      };

      playlistItemsList.appendChild(card);
      rendered++;
    });

    if (rendered === 0) {
      playlistItemsList.innerHTML = `<div style="font-size:12px;opacity:0.6;padding:8px 0;">This playlist is empty.</div>`;
    } else {
      showHUD(rendered + " videos");
    }

  } catch (e) {
    playlistItemsList.innerHTML = `<div style="font-size:12px;opacity:0.6;padding:8px 0;">Error loading playlist items.</div>`;
  }
}

playlistBackBtn.addEventListener("click", () => {
  playlistItemsView.style.display = "none";
  playlistGrid.style.display = "grid";
  showHUD("Playlists");
});

/* -----------------------------------------------------------
   INFINITE SCROLL
----------------------------------------------------------- */
let subsNextPageToken = null;

async function loadMoreVideos() {
  if (!nextPageToken) return;
  let data;
  if (currentTab === "home")     data = await fetchYouTube("videos",         { part: "snippet,statistics", chart: "mostPopular", regionCode: "US", maxResults: 20, pageToken: nextPageToken, _: Date.now() });
  // shorts handles its own infinite scroll inside the shorts page
  if (currentTab === "movies")   data = await fetchYouTube("search",         { part: "snippet", q: "full movie", type: "video", videoDuration: "long", videoEmbeddable: "true", maxResults: 20, pageToken: nextPageToken, _: Date.now() });
  if (currentTab === "trending") data = await fetchYouTube("videos",         { part: "snippet,statistics", chart: "mostPopular", regionCode: "US", maxResults: 20, pageToken: nextPageToken, _: Date.now() });
  if (currentTab === "search")   data = await fetchYouTube("search",         { part: "snippet", q: lastSearchQuery, type: "video", maxResults: 20, pageToken: nextPageToken, _: Date.now() });
  if (currentTab === "channel")  data = await fetchYouTube("playlistItems",  { part: "snippet", playlistId: channelUploadsId, maxResults: 20, pageToken: nextPageToken, _: Date.now() });
  if (!data) return;
  nextPageToken = data.nextPageToken || null;

  if (currentTab === "channel") {
    // append into channelPageEl
    (data.items || []).forEach(item => {
      const snippet = item.snippet;
      const videoId = snippet.resourceId?.videoId; if (!videoId) return;
      const card = document.createElement("div");
      card.className = "video-card parallax";
      card.innerHTML = `<div class="video-thumb"><img src="${snippet.thumbnails?.medium?.url || ""}" loading="lazy"></div><div class="video-info"><div class="video-title">${snippet.title}</div><div class="video-channel">${snippet.channelTitle || ""}</div></div>`;
      card.onclick = () => setPlayerVideo(videoId, snippet);
      channelPageEl.appendChild(card);
    });
  } else {
    appendFeed(data.items || []);
  }
}

async function loadMoreSubs() {
  if (!subsNextPageToken) return;
  const token = localStorage.getItem("yt_access_token");
  if (!token) return;
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20&pageToken=${subsNextPageToken}`,
    { headers: { Authorization: "Bearer " + token } }
  );
  const data = await res.json();
  subsNextPageToken = data.nextPageToken || null;
  (data.items || []).forEach(item => {
    const ch = item.snippet;
    const channelId = ch.resourceId.channelId;
    const card = document.createElement("div");
    card.className = "video-card parallax";
    card.innerHTML = `<div class="video-thumb"><img src="${ch.thumbnails?.medium?.url || ""}" loading="lazy"></div><div class="video-info"><div class="video-title">${ch.title}</div><div class="video-channel">${ch.channelTitle || "Channel"}</div><div class="video-meta">Tap to open channel</div></div>`;
    card.onclick = () => { currentChannelId = channelId; subsPageEl.style.display = "none"; setActiveTab("channel"); loadChannelPage(channelId); };
    subsFeedEl.appendChild(card);
  });
}

window.addEventListener("scroll", async () => {
  if (isLoadingMore) return;
  const scrollPos = window.innerHeight + window.scrollY;
  const bottom = document.body.offsetHeight - 500; // trigger 500px before end
  if (scrollPos < bottom) return;

  if (currentTab === "subs" && subsNextPageToken) {
    isLoadingMore = true; await loadMoreSubs(); isLoadingMore = false;
    return;
  }
  if (nextPageToken) {
    isLoadingMore = true; await loadMoreVideos(); isLoadingMore = false;
  }
});

/* -----------------------------------------------------------
   CHANNEL PAGE
----------------------------------------------------------- */
async function loadChannelPage(channelId) {
  setActiveTab("channel"); currentChannelId = channelId;
  const info = await fetchYouTube("channels", { part: "snippet,statistics,contentDetails", id: channelId });
  const channelInfo = info.items?.[0];
  if (!channelInfo) return;
  channelPageEl.innerHTML = `
    <div class="channel-banner parallax"><div class="banner-logo"></div><div class="banner-text">ViewTube</div></div>
    <div class="channel-header parallax">
      <img class="channel-pic" src="${channelInfo.snippet.thumbnails?.default?.url}">
      <div class="channel-meta"><div class="channel-name">${channelInfo.snippet.title}</div><div class="channel-subs">${channelInfo.statistics?.subscriberCount} subscribers</div></div>
    </div>`;
  channelUploadsId = channelInfo.contentDetails.relatedPlaylists.uploads;
  const uploads = await fetchYouTube("playlistItems", { part: "snippet", playlistId: channelUploadsId, maxResults: 20, _: Date.now() });
  channelNextPageToken = uploads.nextPageToken || null;
  nextPageToken = uploads.nextPageToken || null;
  uploads.items.forEach(item => {
    const snippet = item.snippet;
    const videoId = snippet.resourceId.videoId;
    const card = document.createElement("div");
    card.className = "video-card parallax";
    card.innerHTML = `<div class="video-thumb"><img src="${snippet.thumbnails.medium.url}"></div><div class="video-info"><div class="video-title">${snippet.title}</div><div class="video-channel">${snippet.channelTitle}</div></div>`;
    card.onclick = () => setPlayerVideo(videoId, snippet);
    channelPageEl.appendChild(card);
  });
  showHUD("Channel Loaded");
}

/* -----------------------------------------------------------
   SEARCH
----------------------------------------------------------- */
async function fetchSuggestions(q) {
  if (!q.trim()) return [];
  const data = await fetchYouTube("search", { part: "snippet", q, type: "video", maxResults: 20 });
  return data.items?.map(v => v.snippet.title) || [];
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (!list.length) { suggestionsEl.style.display = "none"; return; }
  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => { searchInput.value = text; triggerSearch(text); };
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.style.display = "block";
}

function openKeyboard() {
  searchPanelEl.style.display = "block"; keyboardEl.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex"; feedEl.style.display = "none";
}
function closeKeyboard() {
  keyboardEl.style.display = "none"; searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none"; feedEl.style.display = "block";
}

searchTabEl.addEventListener("click", openKeyboard);
searchBack.addEventListener("click", closeKeyboard);
searchGo.addEventListener("click", () => { const q = searchInput.value.trim() || "music"; triggerSearch(q); });
searchInput.addEventListener("input", async () => { const q = searchInput.value.trim(); showSuggestions(await fetchSuggestions(q)); });

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn"); if (!btn) return;
  const key = btn.dataset.key;
  if (key === "SPACE") searchInput.value += " ";
  else if (key === "DELETE") searchInput.value = searchInput.value.slice(0, -1);
  else if (key === "ENTER") { triggerSearch(searchInput.value.trim()); return; }
  else searchInput.value += key;
  showSuggestions(await fetchSuggestions(searchInput.value.trim()));
});

function triggerSearch(q) {
  lastSearchQuery = q;
  (async () => {
    const data = await fetchYouTube("search", { part: "snippet", q, type: "video", maxResults: 20, _: Date.now() });
    nextPageToken = data.nextPageToken || null; currentTab = "search";
    renderFeed(data.items || []); closeKeyboard(); showHUD("Search: " + q);
  })();
}

/* -----------------------------------------------------------
   HOLOGRAPHIC EFFECTS
----------------------------------------------------------- */
function applyChroma(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  playerSection.style.setProperty("--chroma-blur", `${4 + intensity * 12}px`);
  playerSection.style.setProperty("--chroma-opacity", 0.25 + intensity * 0.45);
}

let audioGlowActive = false;
function initAudioGlow() {
  if (audioGlowActive) return; audioGlowActive = true;
  function animateGlow() {
    if (!audioGlowActive) return;
    const isFS = playerSection.classList.contains("player-fullscreen");
    const basePulse = isFS ? 0.45 : 0.25;
    const range    = isFS ? 0.45 : 0.35;
    const baseBlur = isFS ? 50  : 20;
    const blurRange= isFS ? 50  : 25;
    playerSection.style.setProperty("--audio-glow-opacity", basePulse + Math.random() * range);
    playerSection.style.setProperty("--audio-glow-blur", `${baseBlur + Math.random() * blurRange}px`);
    requestAnimationFrame(animateGlow);
  }
  animateGlow();
}

function applyDepthGlow(x, y, isFullscreen) {
  const strength = isFullscreen ? 1.1 : 0.35;
  const blur = isFullscreen ? 90 : 22;
  playerSection.style.setProperty("--glow-strength", strength);
  playerSection.style.setProperty("--glow-blur", `${blur}px`);
  playerSection.style.setProperty("--glow-shift-x", `${x * (isFullscreen ? 40 : 12)}px`);
  playerSection.style.setProperty("--glow-shift-y", `${y * (isFullscreen ? 40 : 12)}px`);
}

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;
  document.querySelectorAll(".parallax").forEach(el => { el.style.transform = `translate(${x*8}px, ${y*8}px)`; });
  document.querySelectorAll(".parallax-tab").forEach(el => { el.style.transform = `translate(${x*4}px, ${y*4}px)`; });
  applyDepthGlow(x, y, playerSection.classList.contains("player-fullscreen"));
  document.querySelectorAll(".video-card").forEach(card => {
    const isHover = card.matches(":hover");
    const boost = isHover ? 1.6 : 1;
    card.style.transform = `perspective(1100px) rotateX(${y*-8*boost}deg) rotateY(${x*8*boost}deg) translateX(${x*12}px) translateY(${y*12}px) translateZ(${isHover?18:0}px)`;
    card.style.setProperty("--shadow-x", `${x*14}px`); card.style.setProperty("--shadow-y", `${y*14}px`);
    card.style.setProperty("--shadow-blur", `${isHover?28:18}px`); card.style.setProperty("--shadow-opacity", isHover?0.75:0.55);
    card.style.setProperty("--ao-opacity", isHover?0.22:0.35); card.style.setProperty("--ao-blur", `${isHover?32:22}px`);
  });
  applyChroma(x, y);
});

/* -----------------------------------------------------------
   THEME TOGGLE
----------------------------------------------------------- */
themeToggle.addEventListener("click", () => { isLight = !isLight; document.body.classList.toggle("light", isLight); showHUD(isLight ? "Light Mode" : "Dark Mode"); });

   INIT
----------------------------------------------------------- */
(async function init() {
  showSkeletons(8);
  const data = await fetchYouTube("videos", { part: "snippet,statistics", chart: "mostPopular", regionCode: "US", videoCategoryId: freshCategory(), maxResults: 20, _: Date.now() });
  nextPageToken = data.nextPageToken || null;
  renderFeed(data.items || []);
})();
</script>
