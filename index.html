<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

html, body {
  overflow: hidden;
}

body:not(.medium-active):not(.fullscreen-active) {
  overflow-y: auto;
}

body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}

/* layout */
.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

body.medium-active .app-shell {
  display: none !important;
}

/* topbar */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

#topbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

#topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

#themeToggle {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

#backBtn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

/* search bar */
#searchTab {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative;
  z-index: 18;
}

.search-input-bar {
  flex: 1;
  display: none;
  align-items: center;
  gap: 8px;
}

#searchInput {
  flex: 1;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(5,7,12,0.9);
  color: #f5f7ff;
  font-size: 12px;
}

#searchGo {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

.search-open-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

/* suggestions */
#suggestions {
  margin-top: 6px;
  padding: 8px 10px;
  border-radius: 12px;
  background: rgba(8,10,18,0.95);
  display: none;
}

.suggestion-item {
  padding: 4px 6px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: rgba(60,242,255,0.18);
}

/* tabs */
#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  position: relative;
  z-index: 16;
}

.tab-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
}

/* player */
#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;
}

#playerSection.player-medium {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 70vw;
  height: 40vh;
  max-width: 960px;
  max-height: 540px;
  z-index: 9990;
}

#playerSection.player-medium-inline {
  position: relative !important;
  width: 100% !important;
  height: 260px !important;
  transform: none !important;
  margin-top: 16px !important;
  z-index: 10 !important;
}

#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 9990;
}

#playerSection.player-fullscreen {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 99999;
}

body.medium-active #feed,
body.medium-active #tabs,
body.medium-active #topbar,
body.medium-active #searchTab,
body.medium-active #channelPage {
  display: none !important;
}

body.fullscreen-active .app-shell {
  display: none !important;
}

#playerFrame {
  width: 100%;
  height: 100%;
  border: 0;
}

/* player controls */
.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.player-controls button {
  padding: 5px 9px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  z-index: 12;
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

/* hud */
#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(60,242,255,0.22);
  color: #f5f7ff;
  font-size: 11px;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* feed */
#feed {
  margin-top: 16px;
  display: grid;
  gap: 12px;
  z-index: 10;
}

.video-card {
  position: relative;
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(10,12,20,0.95), rgba(20,24,40,0.95));
  cursor: pointer;
  box-shadow: var(--shadow-soft);
}

.video-thumb img {
  width: 160px;
  height: 90px;
  border-radius: 12px;
  object-fit: cover;
}

.video-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.video-title {
  font-size: 13px;
  font-weight: 600;
}

.video-channel {
  font-size: 11px;
  opacity: 0.8;
}

.video-meta {
  font-size: 10px;
  opacity: 0.6;
}

/* fullscreen back button */
.exit-full-btn {
  position: fixed;
  left: 20px;
  top: 20px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(60,242,255,0.35);
  color: #f5f7ff;
  border: 1px solid rgba(120,130,160,0.7);
  z-index: 999999999;
  display: none;
}

body.fullscreen-active .exit-full-btn {
  display: block;
}

/* keyboard */
#keyboard {
  margin-top: 10px;
  display: none;
}

.keyboard-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  background: rgba(8,10,18,0.9);
  color: #f5f7ff;
  font-size: 11px;
  cursor: pointer;
}

/* startup */
body.startup-hidden {
  opacity: 0;
  transform: scale(1.05);
  filter: blur(18px);
  transition: opacity 1s ease-out, transform 1s ease-out, filter 1s ease-out;
}

body.startup-visible {
  opacity: 1;
  transform: scale(1);
  filter: blur(0px);
}

.startup-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2);
  opacity: 0;
  z-index: 999999999;
  transition: opacity 1s ease-out, transform 1s ease-out;
}

.startup-logo.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.startup-logo.hide {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.85);
}

#cinematic-fade {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 1;
  z-index: 9999999999;
  transition: opacity 1.4s ease-out;
}

#cinematic-fade.hide {
  opacity: 0;
}

/* simple logo */
.logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: radial-gradient(circle at 30% 0%, #3cf2ff, #05060a);
  margin: 0 auto 8px;
}

.logo-text {
  text-align: center;
  font-weight: 600;
  letter-spacing: 0.08em;
}
</style>
</head>

let currentKeyIndex = 0;
function getApiKey() {
  const key = API_KEYS[currentKeyIndex];
  currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
  return key;
}

const playerSection = document.getElementById("playerSection");
const themeToggle = document.getElementById("themeToggle");
const feedEl = document.getElementById("feed");
const topbarEl = document.getElementById("topbar");
const tabsEl = document.getElementById("tabs");
const keyboardEl = document.getElementById("keyboard");
const searchInput = document.getElementById("searchInput");
const hudEl = document.getElementById("hud");
const searchOpenBtn = document.querySelector(".search-open-btn");
const searchInputBar = document.querySelector(".search-input-bar");
const searchGoBtn = document.getElementById("searchGo");
const exitFullBtn = document.getElementById("exitFullBtn");
const backMiniBtn = document.getElementById("backBtn");
const playPauseBtn = document.getElementById("playPauseBtn");
const rewindBtn = document.getElementById("rewindBtn");
const forwardBtn = document.getElementById("forwardBtn");
const fullBtn = document.getElementById("fullBtn");

let isLight = false;
let lastSearchQuery = "";
let nextPageToken = null;
let isPlaying = true;

// fetch wrapper
async function fetchYouTube(endpoint, params) {
  const key = getApiKey();
  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  Object.entries(params).forEach(([k, v]) => {
    if (k === "_") return;
    url.searchParams.set(k, v);
  });
  url.searchParams.set("key", key);

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error("YouTube API error");
  return res.json();
}

// feed
function renderFeed(items) {
  feedEl.innerHTML = "";
  items.forEach((item) => {
    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = item.snippet?.thumbnails?.medium?.url || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = item.snippet?.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = item.snippet?.channelTitle || "";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = item.snippet?.publishedAt || "";

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.addEventListener("click", () => {
      const videoId = item.id?.videoId || item.id;
      if (!videoId) return;
      openPlayer(videoId);
    });

    feedEl.appendChild(card);
  });
}

// HUD
function showHUD(text) {
  hudEl.textContent = text;
  hudEl.style.opacity = "1";
  setTimeout(() => {
    hudEl.style.opacity = "0";
  }, 1800);
}

// player modes
function openPlayer(videoId) {
  const frame = document.getElementById("playerFrame");
  frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1`;
  playerSection.style.display = "block";
  playerSection.classList.remove("player-mini", "player-fullscreen");
  playerSection.classList.add("player-medium-inline");
  document.body.classList.add("player-active");
}

function closePlayer() {
  const frame = document.getElementById("playerFrame");
  frame.src = "";
  playerSection.style.display = "none";
  playerSection.classList.remove("player-mini", "player-medium", "player-medium-inline", "player-fullscreen");
  document.body.classList.remove("player-active", "fullscreen-active", "medium-active");
}

document.getElementById("closeMini").addEventListener("click", closePlayer);

exitFullBtn.addEventListener("click", () => {
  document.body.classList.remove("fullscreen-active");
  playerSection.classList.remove("player-fullscreen");
  playerSection.classList.add("player-medium-inline");
});

backMiniBtn.addEventListener("click", () => {
  if (playerSection.style.display === "none") return;
  playerSection.classList.remove("player-medium-inline", "player-fullscreen");
  playerSection.classList.add("player-mini");
  document.body.classList.remove("fullscreen-active");
  document.body.classList.add("medium-active");
});

fullBtn.addEventListener("click", () => {
  if (playerSection.style.display === "none") return;
  playerSection.classList.remove("player-mini", "player-medium-inline");
  playerSection.classList.add("player-fullscreen");
  document.body.classList.add("fullscreen-active");
});

// keyboard
function buildKeyboard() {
  keyboardEl.innerHTML = "";
  const rows = [
    "Q W E R T Y U I O P",
    "A S D F G H J K L",
    "Z X C V B N M",
    "SPACE DELETE ENTER"
  ];

  rows.forEach((row) => {
    const rowEl = document.createElement("div");
    rowEl.className = "keyboard-row";
    row.split(" ").forEach((key) => {
      const btn = document.createElement("div");
      btn.className = "key-btn";
      btn.dataset.key = key;
      btn.textContent = key === "SPACE" ? "␣" : key;
      rowEl.appendChild(btn);
    });
    keyboardEl.appendChild(rowEl);
  });
}

async function fetchSuggestions(q) {
  if (!q) return [];
  return [q, q + " music", q + " clips"];
}

function showSuggestions(list) {
  const container = document.getElementById("suggestions");
  if (!list || !list.length) {
    container.style.display = "none";
    container.innerHTML = "";
    return;
  }
  container.style.display = "block";
  container.innerHTML = "";
  list.forEach((s) => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = s;
    item.addEventListener("click", () => {
      searchInput.value = s;
      triggerSearch(s);
    });
    container.appendChild(item);
  });
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchInputBar.style.display = "none";
  document.getElementById("suggestions").style.display = "none";
}

searchOpenBtn.addEventListener("click", () => {
  keyboardEl.style.display = "block";
  searchInputBar.style.display = "flex";
  showHUD("Search Panel");
});

searchGoBtn.addEventListener("click", () => {
  const q = searchInput.value.trim();
  if (!q) return;
  triggerSearch(q);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  const key = btn.dataset.key;

  if (key === "SPACE") searchInput.value += " ";
  else if (key === "DELETE") searchInput.value = searchInput.value.slice(0, -1);
  else if (key === "ENTER") {
    triggerSearch(searchInput.value.trim());
    return;
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  lastSearchQuery = q;

  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 50,
      _: Date.now()
    });

    nextPageToken = data.nextPageToken || null;

    renderFeed(data.items || []);
    closeKeyboard();
    setActiveTab("search");
    showHUD("Search: " + q);
  })();
}

// holographic / parallax
function applyChroma(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  const blur = 4 + intensity * 12;
  const opacity = 0.25 + intensity * 0.45;

  playerSection.style.setProperty("--chroma-blur", `${blur}px`);
  playerSection.style.setProperty("--chroma-opacity", opacity);
}

function applyDepthGlow(x, y, isFullscreen) {
  const strength = isFullscreen ? 0.75 : 0.35;
  const blur = isFullscreen ? 55 : 22;

  playerSection.style.setProperty("--glow-strength", strength);
  playerSection.style.setProperty("--glow-blur", `${blur}px`);
  playerSection.style.setProperty("--glow-shift-x", `${x * 12}px`);
  playerSection.style.setProperty("--glow-shift-y", `${y * 12}px`);
}

function applyBloom(x, y, isFullscreen) {
  const intensity = isFullscreen ? 0.85 : 0.35;
  const radius = isFullscreen ? 65 : 32;

  playerSection.style.setProperty("--bloom-intensity", intensity);
  playerSection.style.setProperty("--bloom-radius", `${radius}px`);
}

function applyVolumetricShadow(x, y, isFullscreen) {
  const blur = isFullscreen ? 85 : 55;
  const opacity = isFullscreen ? 0.55 : 0.35;

  playerSection.style.setProperty("--shadow-blur", `${blur}px`);
  playerSection.style.setProperty("--shadow-opacity", opacity);
}

function applyDepthFog(x, y, isFullscreen) {
  const fog = Math.min(1, Math.abs(x) + Math.abs(y));
  const opacity = isFullscreen ? fog * 0.55 : fog * 0.25;
  const blur = 85 + fog * 45;

  playerSection.style.setProperty("--fog-opacity", opacity);
  playerSection.style.setProperty("--fog-blur", `${blur}px`);
}

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;

  document.querySelectorAll(".parallax").forEach((el) => {
    const depth = 8;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  document.querySelectorAll(".parallax-tab").forEach((el) => {
    const depth = 4;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  const isFullscreen = playerSection.classList.contains("player-fullscreen");
  applyDepthGlow(x, y, isFullscreen);
  applyBloom(x, y, isFullscreen);
  applyVolumetricShadow(x, y, isFullscreen);
  applyDepthFog(x, y, isFullscreen);

  document.querySelectorAll(".video-card").forEach((card) => {
    const tiltX = y * -8;
    const tiltY = x * 8;
    const shiftX = x * 12;
    const shiftY = y * 12;

    const isHover = card.matches(":hover");
    const boost = isHover ? 1.6 : 1;
    const lift = isHover ? 18 : 0;

    card.style.transform = `
      perspective(1100px)
      rotateX(${tiltX * boost}deg)
      rotateY(${tiltY * boost}deg)
      translateX(${shiftX}px)
      translateY(${shiftY}px)
      translateZ(${lift}px)
    `;
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const shadowX = x * 14;
    const shadowY = y * 14;
    const isHover = card.matches(":hover");
    const blur = isHover ? 28 : 18;
    const opacity = isHover ? 0.75 : 0.55;

    card.style.setProperty("--shadow-x", `${shadowX}px`);
    card.style.setProperty("--shadow-y", `${shadowY}px`);
    card.style.setProperty("--shadow-blur", `${blur}px`);
    card.style.setProperty("--shadow-opacity", opacity);
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const isHover = card.matches(":hover");
    const aoOpacity = isHover ? 0.22 : 0.35;
    const aoBlur = isHover ? 32 : 22;

    card.style.setProperty("--ao-opacity", aoOpacity);
    card.style.setProperty("--ao-blur", `${aoBlur}px`);
  });

  applyChroma(x, y);
});

// theme toggle
themeToggle.addEventListener("click", () => {

// startup
function runStartupAnimation() {
  document.body.classList.add("startup-hidden");
  feedEl.classList.add("startup-slide");
  topbarEl.classList.add("startup-fade");
  tabsEl.classList.add("startup-fade");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.body.classList.remove("startup-hidden");
      document.body.classList.add("startup-visible");

      feedEl.classList.add("show");
      topbarEl.classList.add("show");
      tabsEl.classList.add("show");
    });
  });
}

function initPlayerLighting() {
  const isFullscreen = false;
  applyDepthGlow(0, 0, isFullscreen);
  applyBloom(0, 0, isFullscreen);
  applyVolumetricShadow(0, 0, isFullscreen);
  applyDepthFog(0, 0, isFullscreen);
  applyChroma(0, 0);
}

function initParallaxState() {
  const event = new MouseEvent("mousemove", {
    clientX: window.innerWidth / 2,
    clientY: window.innerHeight / 2
  });
  document.dispatchEvent(event);
}

function runStartupLogo() {
  const logo = document.getElementById("startup-logo");
  logo.classList.add("show");

  setTimeout(() => {
    logo.classList.add("hide");
  }, 2200);

  setTimeout(() => {
    logo.remove();
  }, 3200);
}

function playStartupSound() {
  const audio = document.getElementById("startup-sound");
  if (!audio) return;

  audio.volume = 0.65;
  audio.currentTime = 0;
  audio.play().catch(() => {});
}

function runParticleBurst() {
  const container = document.getElementById("particle-burst");
  if (!container) return;

  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = (Math.PI * 2 * i) / 18;
    const dist = 40 + Math.random() * 40;

    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;

    container.appendChild(p);

    requestAnimationFrame(() => {
      p.style.opacity = 1;
      p.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    });

    setTimeout(() => {
      p.style.opacity = 0;
      p.style.transform = `translate(${x}px, ${y}px) scale(0.6)`;
    }, 900);

    setTimeout(() => p.remove(), 1600);
  }
}

function runStartupRipple() {
  const ripple = document.getElementById("startup-ripple");
  if (!ripple) return;

  ripple.classList.add("show");
  setTimeout(() => ripple.classList.add("hide"), 900);
  setTimeout(() => ripple.remove(), 1600);
}

function runCinematicFade() {
  const fade = document.getElementById("cinematic-fade");
  if (!fade) return;

  setTimeout(() => fade.classList.add("hide"), 200);
  setTimeout(() => fade.remove(), 1800);
}

// init
(async function init() {
  runCinematicFade();
  runStartupLogo();
  playStartupSound();
  runParticleBurst();
  runStartupRipple();
  runStartupAnimation();
  buildKeyboard();

  setActiveTab("home");
  playerSection.style.display = "none";
  document.body.classList.remove("player-active", "fullscreen-active");

  const data = await fetchYouTube("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50,
    _: Date.now()
  });

  nextPageToken = data.nextPageToken || null;

  renderFeed(data.items || []);
  showHUD("Home");

  initPlayerLighting();
  initParallaxState();
})();
</script>
