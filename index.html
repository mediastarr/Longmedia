<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ViewTube AR OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* -----------------------------------------------------------
   GLOBAL THEME
----------------------------------------------------------- */
:root {
  --bg-dark: #05060a;
  --bg-light: #f4f5fb;
  --accent: #3cf2ff;
  --accent-soft: rgba(60, 242, 255, 0.35);
  --accent-strong: rgba(60, 242, 255, 0.85);
  --shadow-soft: 0 18px 40px rgba(0,0,0,0.45);
  --shadow-strong: 0 26px 70px rgba(0,0,0,0.75);
  --shadow-glow: 0 0 40px rgba(60,242,255,0.65);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: radial-gradient(circle at 10% 0%, #05060a 0%, #020308 40%, #000000 100%);
  color: #f5f7ff;
  overflow-x: hidden;
  min-height: 100vh;
}

body.light {
  background: radial-gradient(circle at 0% 0%, #fdfdff 0%, #e4e7ff 40%, #cfd3ff 100%);
  color: #05060a;
}

/* -----------------------------------------------------------
   LAYOUT
----------------------------------------------------------- */
.app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 16px 18px 24px;
}

/* -----------------------------------------------------------
   TOPBAR
----------------------------------------------------------- */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(10,12,20,0.9), rgba(20,24,40,0.9));
  color: #f5f7ff;
  position: relative;
  z-index: 20;
}

body.light #topbar {
  background: linear-gradient(135deg, rgba(240,242,255,0.95), rgba(220,224,255,0.95));
  color: #05060a;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-orb {
  width: 26px;
  height: 26px;
  border-radius: 999px;
  background: radial-gradient(circle, var(--accent-strong), transparent 70%);
  box-shadow: 0 0 24px rgba(60,242,255,0.9);
}

.topbar-title {
  font-weight: 600;
  letter-spacing: 0.04em;
  font-size: 14px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-btn {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

body.light .topbar-btn {
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(240,242,255,0.95));
  color: #05060a;
}

/* -----------------------------------------------------------
   SEARCH BAR
----------------------------------------------------------- */
#searchTab {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.9), rgba(16,20,32,0.9));
  position: relative;
  z-index: 18;
}

body.light #searchTab {
  background: linear-gradient(135deg, rgba(238,240,255,0.95), rgba(224,228,255,0.95));
}

.search-label {
  font-size: 12px;
  opacity: 0.8;
}

.search-open-btn {
  margin-left: auto;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  padding: 6px 10px;
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

/* -----------------------------------------------------------
   TABS
----------------------------------------------------------- */
#tabs {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 4px;
  position: relative;
  z-index: 16;
}

.tab-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.6);
  font-size: 12px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.12), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

.tab-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 18px rgba(60,242,255,0.7);
}

/* -----------------------------------------------------------
   PLAYER
----------------------------------------------------------- */
#playerSection {
  margin-top: 16px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(60,242,255,0.18), rgba(5,6,12,0.98));
  height: 260px;
  display: none;

  --glow-strength: 0.35;
  --glow-blur: 22px;
  --glow-shift-x: 0px;
  --glow-shift-y: 0px;

  --bloom-intensity: 0.35;
  --bloom-radius: 32px;

  --shadow-opacity: 0.45;
  --shadow-blur: 55px;

  --fog-opacity: 0.0;
  --fog-blur: 85px;
}

#playerSection.player-mini {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 260px;
  height: 150px;
  z-index: 40;
}

/* FULLSCREEN PLAYER + VisionOS transform */
#playerSection.player-fullscreen {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  max-height: 100vh;
  background: black;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;

  transform:
    perspective(1200px)
    translateZ(45px)
    scale(1.08)
    rotateX(4deg);

  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    filter 0.55s ease,
    box-shadow 0.55s ease;
}

#playerSection.player-fullscreen.settled {
  transform:
    perspective(1200px)
    translateZ(0px)
    scale(1)
    rotateX(0deg);
}

#playerSection.player-fullscreen iframe,
#playerSection.player-fullscreen #playerFrame {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* BLOOM / GLOW / SHADOW / FOG layers */
#playerSection::before {
  content: "";
  position: absolute;
  inset: -40px;
  pointer-events: none;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(60,242,255,0.85), transparent 70%);
  filter: blur(var(--bloom-radius));
  opacity: var(--bloom-intensity);
  z-index: -2;
}

#playerSection::after {
  content: "";
  position: absolute;
  inset: -20px;
  pointer-events: none;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(60,242,255,0.55), transparent 70%);
  filter: blur(var(--glow-blur));
  opacity: var(--glow-strength);
  transform: translate(var(--glow-shift-x), var(--glow-shift-y));
  z-index: -1;
}

#playerSection .fx-layers::before {
  content: "";
  position: absolute;
  inset: -60px;
  pointer-events: none;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(0,0,0,0.45), transparent 70%);
  filter: blur(var(--shadow-blur));
  opacity: var(--shadow-opacity);
  z-index: -3;
  transform: translateY(40px) scale(1.2);
}

#playerSection .fx-layers::after {
  content: "";
  position: absolute;
  inset: -80px;
  pointer-events: none;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 80%);
  filter: blur(var(--fog-blur));
  opacity: var(--fog-opacity);
  z-index: -4;
}

/* IFRAME FIX */
#playerFrame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  position: relative;
  z-index: 1;
}

/* PLAYER CONTROLS */
.player-controls {
  position: absolute;
  left: 12px;
  bottom: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.player-controls button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

#closeMini {
  position: absolute;
  right: 10px;
  top: 10px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 4px 8px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(255,80,80,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 12;
}

/* HUD */
#hud {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 12px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.22), rgba(10,12,20,0.95));
  color: #f5f7ff;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
}

/* FEED */
#feed {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  position: relative;
  z-index: 10;
}

.video-card {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.08), rgba(8,10,16,0.96));
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  perspective: 1100px;
  transition: transform 0.15s ease-out;
}

.video-card:hover {
  transform: translateZ(22px) scale(1.03);
  box-shadow: 0 0 28px rgba(60,242,255,0.35),
              0 0 55px rgba(60,242,255,0.18);
  transition: transform 0.15s ease-out, box-shadow 0.2s ease-out;
}

.video-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  z-index: -1;
  transform: translate(var(--shadow-x, 0px), var(--shadow-y, 0px));
  filter: blur(var(--shadow-blur, 18px));
  opacity: var(--shadow-opacity, 0.55);
  box-shadow:
    0 12px 28px rgba(0,0,0,0.45),
    0 0 22px rgba(60,242,255,0.12),
    0 0 40px rgba(120,60,255,0.10);
  transition:
    transform 0.15s ease-out,
    opacity 0.15s ease-out,
    filter 0.15s ease-out;
}

.video-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  z-index: -2;
  background: radial-gradient(circle at 50% 60%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 70%);
  opacity: var(--ao-opacity, 0.35);
  filter: blur(var(--ao-blur, 22px));
  transition:
    opacity 0.2s ease-out,
    filter 0.2s ease-out;
}

.video-thumb {
  flex: 0 0 140px;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  background: #11131c;
}

.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.video-title {
  font-size: 13px;
  font-weight: 500;
}

.video-channel {
  font-size: 11px;
  opacity: 0.8;
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
}

/* CHANNEL PAGE */
#channelPage {
  margin-top: 16px;
  display: none;
  position: relative;
  z-index: 10;
}

.channel-banner {
  height: 90px;
  border-radius: 18px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.25), rgba(8,10,16,0.96));
  display: flex;
  align-items: center;
  padding: 14px;
  gap: 10px;
}

.banner-logo {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(60,242,255,0.9), transparent 70%);
  box-shadow: 0 0 26px rgba(60,242,255,0.9);
}

.banner-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.channel-header {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.channel-pic {
  width: 46px;
  height: 46px;
  border-radius: 999px;
  object-fit: cover;
}

.channel-meta {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.channel-name {
  font-size: 14px;
  font-weight: 600;
}

.channel-subs {
  font-size: 11px;
  opacity: 0.8;
}

/* SEARCH PANEL + KEYBOARD */
#searchPanel {
  margin-top: 12px;
  display: none;
  position: relative;
  z-index: 30;
}

.search-input-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  overflow: hidden;
}

.search-input-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: #f5f7ff;
  font-size: 13px;
  padding-left: 6px;
  width: 100%;
  overflow-x: auto;
}

.search-input-bar button {
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 5px 9px;
  font-size: 11px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
}

/* KEYBOARD */
#keyboard {
  margin-top: 10px;
  display: none;
  padding: 10px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  width: 100%;
}

.keyboard-row {
  display: flex;
  width: 100%;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(120,130,160,0.7);
  font-size: 14px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.18), rgba(10,12,20,0.9));
  color: #f5f7ff;
  text-align: center;
  cursor: pointer;
  user-select: none;
}

.key-btn[data-key="SPACE"] {
  flex: 4;
}

.key-btn[data-key="DELETE"],
.key-btn[data-key="ENTER"] {
  flex: 2;
}

/* SUGGESTIONS */
#suggestions {
  margin-top: 8px;
  display: none;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(8,10,18,0.95), rgba(16,20,32,0.95));
  padding: 6px 8px;
}

.suggestion-item {
  padding: 5px 6px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 10px;
}

.suggestion-item:hover {
  background: rgba(60,242,255,0.16);
}

/* HOLOGRAPHIC EFFECTS (PLAYER ONLY) */
#playerSection.fx-bloom {
  box-shadow: 0 0 40px rgba(60,242,255,0.65), 0 26px 70px rgba(0,0,0,0.85);
}

#playerSection.fx-ambient {
  background:
    radial-gradient(circle at 50% 0%, rgba(60,242,255,0.25), transparent 60%),
    radial-gradient(circle at 0% 100%, rgba(120,80,255,0.18), transparent 70%),
    radial-gradient(circle at 100% 100%, rgba(0,255,180,0.18), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(5,6,12,0.98), rgba(2,3,8,1));
}

#playerSection.fx-glass {
  backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(120,130,160,0.7);
}

#playerSection.fx-chroma::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: var(--chroma-opacity, 0.25);
  filter: blur(var(--chroma-blur, 4px));
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,80,0.35), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,200,255,0.35), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(0,255,180,0.35), transparent 60%);
  transition: opacity 0.15s ease-out, filter 0.15s ease-out;
  z-index: -2;
}

#playerSection.fx-audio::after {
  content: "";
  position: absolute;
  inset: -40px;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  mix-blend-mode: screen;
  opacity: var(--audio-glow-opacity, 0.25);
  filter: blur(var(--audio-glow-blur, 20px));
  transition: opacity 0.12s ease-out, filter 0.12s ease-out;
  z-index: -3;
}

/* DEPTH MODE */
body.search-depth-mode #feed,
body.search-depth-mode #channelPage {
  filter: blur(4px) brightness(0.7);
  pointer-events: none;
}

/* CINEMA MODE OVERLAY */
body.cinema-mode::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  z-index: 9998;
  pointer-events: none;
}

/* CINEMA PLAYER */
#playerSection.player-fullscreen.cinema {
  border-radius: 40px;
  overflow: hidden;
  transform: perspective(900px) rotateX(6deg);
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
}

/* CINEMA GLOW BOOST */
body.cinema-mode #playerSection {
  --audio-glow-opacity: 0.55 !important;
  --audio-glow-blur: 55px !important;
  --chroma-opacity: 0.45 !important;
  --chroma-blur: 18px !important;
  box-shadow:
    0 0 120px rgba(60,242,255,0.55),
    0 0 180px rgba(0,200,255,0.45),
    0 0 260px rgba(0,255,180,0.35);
  transition: box-shadow 0.35s ease, filter 0.35s ease;
}

/* CINEMA TRANSITIONS */
#playerSection {
  transition:
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.45s ease,
    filter 0.45s ease;
}

body.cinema-mode::before {
  transition:
    background 0.45s ease,
    backdrop-filter 0.45s ease;
}

body.cinema-mode #playerSection {
  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    border-radius 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.55s ease,
    filter 0.55s ease;
}

/* CINEMA ZOOM INTRO */
@keyframes cinemaZoomIntro {
  0% {
    transform: scale(0.88) perspective(900px) rotateX(0deg);
    opacity: 0.6;
    filter: brightness(0.7);
  }
  60% {
    transform: scale(1.03) perspective(900px) rotateX(4deg);
    opacity: 1;
    filter: brightness(1);
  }
  100% {
    transform: scale(1) perspective(900px) rotateX(6deg);
    opacity: 1;
    filter: brightness(1);
  }
}

#playerSection.player-fullscreen.cinema.zoom-intro {
  animation: cinemaZoomIntro 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* FULLSCREEN BACK BUTTON */
.exit-full-btn {
  position: fixed;
  left: 20px;
  top: 20px;
  border-radius: 999px;
  border: 1px solid rgba(120,130,160,0.7);
  padding: 8px 14px;
  font-size: 14px;
  background: radial-gradient(circle at 0% 0%, rgba(60,242,255,0.35), rgba(10,12,20,0.9));
  color: #f5f7ff;
  cursor: pointer;
  z-index: 999999999 !important;
  pointer-events: auto;
  display: none;
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.exit-full-btn:hover {
  box-shadow: 0 0 18px rgba(60,242,255,0.9),
              0 0 30px rgba(60,242,255,0.5);
  transform: scale(1.08);
}

body.fullscreen-active .exit-full-btn {
  display: block;
}

/* STARTUP ANIMATION */
body.startup-hidden {
  opacity: 0;
  transform: scale(1.05);
  filter: blur(18px);
  transition: opacity 0.9s ease-out, transform 1.1s ease-out, filter 1.1s ease-out;
}

body.startup-visible {
  opacity: 1;
  transform: scale(1);
  filter: blur(0px);
}

#feed.startup-slide {
  opacity: 0;
  transform: translateY(35px);
  transition: opacity 0.9s ease-out 0.25s, transform 1s ease-out 0.25s;
}

#feed.startup-slide.show {
  opacity: 1;
  transform: translateY(0px);
}

#topbar.startup-fade,
#tabs.startup-fade {
  opacity: 0;
  transition: opacity 0.8s ease-out 0.45s;
}

#topbar.startup-fade.show,
#tabs.startup-fade.show {
  opacity: 1;
}

/* FLOATING STARTUP LOGO */
.startup-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2);
  opacity: 0;
  pointer-events: none;
  z-index: 999999999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  transition: opacity 0.8s ease-out, transform 1.2s ease-out;
}

.startup-logo.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.startup-logo.hide {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.85);
}

.startup-logo .logo-icon {
  width: 90px;
  height: 90px;
  border-radius: 22px;
  background: radial-gradient(circle at 30% 30%, #ff2d2d, #8b0000);
  box-shadow: 0 0 35px rgba(255, 60, 60, 0.55),
              0 0 65px rgba(255, 60, 60, 0.35);
}

.startup-logo .logo-text {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 1px;
  color: white;
  text-shadow: 0 0 18px rgba(255, 255, 255, 0.55);
}

/* PARTICLE BURST */
#particle-burst {
  position: fixed;
  top: 50%;

async function fetchYouTube(endpoint, params) {
  const key = API_KEYS[keyIndex];
  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set("key", key);

  const res = await fetch(url.toString());
  if (!res.ok) {
    keyIndex = (keyIndex + 1) % API_KEYS.length;
    throw new Error("YouTube API error");
  }
  return res.json();
}

      <div class="video-meta">${item.statistics?.viewCount || ""}</div>

  `;

  return card;
}

function renderFeed(items) {
  channelPageEl.style.display = "none";

   8. LOAD MORE (INFINITE SCROLL)
----------------------------------------------------------- */
async function loadMoreVideos() {
  if (!nextPageToken || isLoadingMore) return;
  isLoadingMore = true;

  let data;

  if (currentTab === "home" || currentTab === "trending") {
    data = await fetchYouTube("videos", {
      part: "snippet,statistics,contentDetails",
      chart: "mostPopular",
      regionCode: "US",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "shorts") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: "shorts",
      type: "video",
      videoDuration: "short",
      videoEmbeddable: "true",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "movies") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: "full movie",
      type: "video",
      videoDuration: "long",
      videoEmbeddable: "true",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "search") {
    data = await fetchYouTube("search", {
      part: "snippet",
      q: lastSearchQuery,
      type: "video",
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  } else if (currentTab === "channel") {
    data = await fetchYouTube("playlistItems", {
      part: "snippet",
      playlistId: channelUploadsId,
      maxResults: 50,
      pageToken: nextPageToken,
      _: Date.now()
    });
  }

  nextPageToken = data?.nextPageToken || null;
  appendFeed(data?.items || []);
  isLoadingMore = false;
}

window.addEventListener("scroll", async () => {
  if (isLoadingMore) return;
  if (!nextPageToken) return;

  const scrollPos = window.innerHeight + window.scrollY;
  const bottom = document.body.offsetHeight - 200;

  if (scrollPos >= bottom) {
    isLoadingMore = true;
    await loadMoreVideos();
    isLoadingMore = false;
  }
});

async function loadChannelPage(channelId) {
  setActiveTab("channel");
  currentChannelId = channelId;   // ⭐ FIXED

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics,contentDetails",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) return;

  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${channelInfo.snippet.thumbnails?.default?.url}">
      <div class="channel-meta">
        <div class="channel-name">${channelInfo.snippet.title}</div>
        <div class="channel-subs">${channelInfo.statistics?.subscriberCount} subscribers</div>
      </div>
    </div>
  `;

  channelUploadsId = channelInfo.contentDetails.relatedPlaylists.uploads;

  const uploads = await fetchYouTube("playlistItems", {
    part: "snippet",
    playlistId: channelUploadsId,
    maxResults: 50,
    _: Date.now()
  });

  nextPageToken = uploads.nextPageToken || null;

  channelPageEl.style.display = "block";
  feedEl.style.display = "none";

  uploads.items.forEach(item => {
    const snippet = item.snippet;
    const videoId = snippet.resourceId.videoId;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);   // ⭐ FIXED (removed duplicate history push)
    };

    channelPageEl.appendChild(card);
  });

  showHUD("Channel Loaded");
}

  return data.items?.map(v => v.snippet.title) || [];
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (!list.length) {
    suggestionsEl.style.display = "none";
    return;
  }

  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => {
      searchInput.value = text;
      triggerSearch(text);
    };
    suggestionsEl.appendChild(item);
  });

  suggestionsEl.style.display = "block";
}

function openKeyboard() {
  searchPanelEl.style.display = "block";
  keyboardEl.style.display = "block";
  document.querySelector(".search-input-bar").style.display = "flex";

  // hide mini player
  playerSection.classList.remove("player-mini");
  playerSection.style.display = "none";

  feedEl.style.display = "none";
  channelPageEl.style.display = "none";
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none";
  feedEl.style.display = "grid";
  document.body.classList.remove("search-depth-mode");
}

searchTabEl.addEventListener("click", openKeyboard);
document.querySelector(".search-open-btn").addEventListener("click", openKeyboard);
searchBack.addEventListener("click", closeKeyboard);

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  const key = btn.dataset.key;

  if (key === "SPACE") searchInput.value += " ";
  else if (key === "DELETE") searchInput.value = searchInput.value.slice(0, -1);
  else if (key === "ENTER") {
    triggerSearch(searchInput.value.trim());
    return;
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  lastSearchQuery = q;

  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 50,
      _: Date.now()
    });

    nextPageToken = data.nextPageToken || null;

    renderFeed(data.items || []);
    closeKeyboard();
    setActiveTab("search");
    showHUD("Search: " + q);
  })();
}


/* -----------------------------------------------------------
   11. HOLOGRAPHIC / PARALLAX / GLOW ENGINE
----------------------------------------------------------- */
function applyChroma(xTilt, yTilt) {
  const intensity = Math.min(1, Math.abs(xTilt) + Math.abs(yTilt));
  const blur = 4 + intensity * 12;
  const opacity = 0.25 + intensity * 0.45;

  playerSection.style.setProperty("--chroma-blur", `${blur}px`);
  playerSection.style.setProperty("--chroma-opacity", opacity);
}

function applyDepthGlow(x, y, isFullscreen) {
  const strength = isFullscreen ? 0.75 : 0.35;
  const blur = isFullscreen ? 55 : 22;

  playerSection.style.setProperty("--glow-strength", strength);
  playerSection.style.setProperty("--glow-blur", `${blur}px`);
  playerSection.style.setProperty("--glow-shift-x", `${x * 12}px`);
  playerSection.style.setProperty("--glow-shift-y", `${y * 12}px`);
}

function applyBloom(x, y, isFullscreen) {
  const intensity = isFullscreen ? 0.85 : 0.35;
  const radius = isFullscreen ? 65 : 32;

  playerSection.style.setProperty("--bloom-intensity", intensity);
  playerSection.style.setProperty("--bloom-radius", `${radius}px`);
}

function applyVolumetricShadow(x, y, isFullscreen) {
  const blur = isFullscreen ? 85 : 55;
  const opacity = isFullscreen ? 0.55 : 0.35;

  playerSection.style.setProperty("--shadow-blur", `${blur}px`);
  playerSection.style.setProperty("--shadow-opacity", opacity);
}

function applyDepthFog(x, y, isFullscreen) {
  const fog = Math.min(1, Math.abs(x) + Math.abs(y));
  const opacity = isFullscreen ? fog * 0.55 : fog * 0.25;
  const blur = 85 + fog * 45;

  playerSection.style.setProperty("--fog-opacity", opacity);
  playerSection.style.setProperty("--fog-blur", `${blur}px`);
}

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;

  document.querySelectorAll(".parallax").forEach((el) => {
    const depth = 8;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  document.querySelectorAll(".parallax-tab").forEach((el) => {
    const depth = 4;
    el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
  });

  const isFullscreen = playerSection.classList.contains("player-fullscreen");
  applyDepthGlow(x, y, isFullscreen);
  applyBloom(x, y, isFullscreen);
  applyVolumetricShadow(x, y, isFullscreen);
  applyDepthFog(x, y, isFullscreen);

  document.querySelectorAll(".video-card").forEach((card) => {
    const tiltX = y * -8;
    const tiltY = x * 8;
    const shiftX = x * 12;
    const shiftY = y * 12;

    const isHover = card.matches(":hover");
    const boost = isHover ? 1.6 : 1;
    const lift = isHover ? 18 : 0;

    card.style.transform = `
      perspective(1100px)
      rotateX(${tiltX * boost}deg)
      rotateY(${tiltY * boost}deg)
      translateX(${shiftX}px)
      translateY(${shiftY}px)
      translateZ(${lift}px)
    `;
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const shadowX = x * 14;
    const shadowY = y * 14;
    const isHover = card.matches(":hover");
    const blur = isHover ? 28 : 18;
    const opacity = isHover ? 0.75 : 0.55;

    card.style.setProperty("--shadow-x", `${shadowX}px`);
    card.style.setProperty("--shadow-y", `${shadowY}px`);
    card.style.setProperty("--shadow-blur", `${blur}px`);
    card.style.setProperty("--shadow-opacity", opacity);
  });

  document.querySelectorAll(".video-card").forEach((card) => {
    const isHover = card.matches(":hover");
    const aoOpacity = isHover ? 0.22 : 0.35;
    const aoBlur = isHover ? 32 : 22;

    card.style.setProperty("--ao-opacity", aoOpacity);
    card.style.setProperty("--ao-blur", `${aoBlur}px`);
  });

  applyChroma(x, y);
});

/* -----------------------------------------------------------
   12. THEME TOGGLE
----------------------------------------------------------- */
themeToggle.addEventListener("click", () => {
  isLight = !isLight;
  document.body.classList.toggle("light", isLight);
  showHUD(isLight ? "Light Mode" : "Dark Mode");
});

/* -----------------------------------------------------------
   13. STARTUP ENGINES
----------------------------------------------------------- */
function runStartupAnimation() {
  document.body.classList.add("startup-hidden");
  feedEl.classList.add("startup-slide");
  topbarEl.classList.add("startup-fade");
  tabsEl.classList.add("startup-fade");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.body.classList.remove("startup-hidden");
      document.body.classList.add("startup-visible");

      feedEl.classList.add("show");
      topbarEl.classList.add("show");
      tabsEl.classList.add("show");
    });
  });
}

function initPlayerLighting() {
  const isFullscreen = false;
  applyDepthGlow(0, 0, isFullscreen);
  applyBloom(0, 0, isFullscreen);
  applyVolumetricShadow(0, 0, isFullscreen);
  applyDepthFog(0, 0, isFullscreen);
  applyChroma(0, 0);
}

function initParallaxState() {
  const event = new MouseEvent("mousemove", {
    clientX: window.innerWidth / 2,
    clientY: window.innerHeight / 2
  });
  document.dispatchEvent(event);
}

function runStartupLogo() {
  const logo = document.getElementById("startup-logo");
  logo.classList.add("show");

  setTimeout(() => {
    logo.classList.add("hide");
  }, 2200);

  setTimeout(() => {
    logo.remove();
  }, 3200);
}

function playStartupSound() {
  const audio = document.getElementById("startup-sound");
  if (!audio) return;

  audio.volume = 0.65;
  audio.currentTime = 0;
  audio.play();

  let t = 0;
  const pulse = () => {
    t += 0.05;
    const glow = 0.25 + Math.sin(t * 6) * 0.35;
    const blur = 20 + Math.sin(t * 6) * 25;

    playerSection.style.setProperty("--audio-glow-opacity", glow);
    playerSection.style.setProperty("--audio-glow-blur", `${blur}px`);

    if (t < 1.2) requestAnimationFrame(pulse);
  };

  pulse();
}

function runParticleBurst() {
  const container = document.getElementById("particle-burst");
  if (!container) return;

  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const angle = (Math.PI * 2 * i) / 18;
    const dist = 40 + Math.random() * 40;

    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;

    container.appendChild(p);

    requestAnimationFrame(() => {
      p.style.opacity = 1;
      p.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    });

    setTimeout(() => {
      p.style.opacity = 0;
      p.style.transform = `translate(${x}px, ${y}px) scale(0.6)`;
    }, 900);

    setTimeout(() => p.remove(), 1600);
  }
}

function runStartupRipple() {
  const ripple = document.getElementById("startup-ripple");
  if (!ripple) return;

  ripple.classList.add("show");
  setTimeout(() => ripple.classList.add("hide"), 900);
  setTimeout(() => ripple.remove(), 1600);
}

function runCinematicFade() {
  const fade = document.getElementById("cinematic-fade");
  if (!fade) return;

  setTimeout(() => fade.classList.add("hide"), 200);
  setTimeout(() => fade.remove(), 1800);
}

/* -----------------------------------------------------------
   14. INITIAL LOAD (INIT MUST BE LAST)
----------------------------------------------------------- */
(async function init() {
  // Cinematic fade first
  runCinematicFade();

  // Logo + sound
  runStartupLogo();
  playStartupSound();

  // VisionOS effects
  runParticleBurst();
  runStartupRipple();

  // OS fade + feed slide
  runStartupAnimation();

  // Force UI into Home mode
  setActiveTab("home");
  showUIWithMiniPlayer();

  const data = await fetchYouTube("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "US",
    maxResults: 50,
    _: Date.now()
  });

  nextPageToken = data.nextPageToken || null;

  renderFeed(data.items || []);
  showHUD("Home");

  // Initialize holographic state
  initPlayerLighting();
  initParallaxState();
})();
</script>
