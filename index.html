<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewTube OS</title>
<style>
:root {
  --bg: rgba(0,0,0,0.75);
  --card: rgba(10,10,10,0.8);
  --text: #fff;
  --blur: 22px;

  /* AR depth shadows */
  --shadow-soft: 0 8px 24px rgba(0,0,0,0.6);
  --shadow-strong: 0 14px 40px rgba(0,0,0,0.85);
  --shadow-glow: 0 0 22px rgba(255,255,255,0.35);
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: var(--text);
}

/* Top bar */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-soft);
  margin: 8px;
  z-index: 60;
  transform-style: preserve-3d;
}

.app-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.youtube-logo {
  width: 28px;
  height: 20px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.youtube-logo::after {
  content: "";
  position: absolute;
  left: 10px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-style: solid;
  border-width: 6px 0 6px 12px;
  border-color: transparent transparent transparent white;
}

.app-title {
  font-weight: 600;
  letter-spacing: 0.5px;
}

.btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* Glassy search bar */

.search-tab {
  margin: 0 8px 8px;
  padding: 10px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(26px) saturate(1.3);
  -webkit-backdrop-filter: blur(26px) saturate(1.3);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  z-index: 55;
  transform-style: preserve-3d;
}

.search-icon {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.8);
  position: relative;
}

.search-icon::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 2px;
  background: rgba(255,255,255,0.8);
  border-radius: 999px;
  transform: rotate(45deg);
  right: -6px;
  bottom: -1px;
}

.search-label {
  font-size: 13px;
  opacity: 0.9;
}

/* Search panel + keyboard */

.search-panel {
  position: relative;
  margin: 0 8px 8px;
  display: none;
}

.search-input-bar {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  backdrop-filter: blur(26px) saturate(1.3);
  -webkit-backdrop-filter: blur(26px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.18);
  transform-style: preserve-3d;
  z-index: 9999;
  position: relative;
  padding-left: 14px;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  font-size: 13px;
  padding-left: 14px;
  position: relative;
  z-index: 9999;
}

.search-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.search-back-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.6);
  color: var(--text);
  cursor: pointer;
  margin-left: 6px;
}

/* Keyboard */

.keyboard {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 8px;
  display: none;
  z-index: 340;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);
  transform-style: preserve-3d;
}

.keyboard-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.key-btn {
  min-width: 32px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(40,40,40,0.9);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transform-style: preserve-3d;
}

/* Suggestions */

.suggestions {
  margin-top: 6px;
  background: rgba(20,20,20,0.85);
  border-radius: 16px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: none;
  max-height: 220px;
  overflow-y: auto;
  box-shadow: var(--shadow-soft);
  position: relative;
  z-index: 9999;
}

.suggestion-item {
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
  opacity: 0.9;
}

.suggestion-item:hover {
  background: rgba(255,255,255,0.12);
  opacity: 1;
}

/* Tabs */

.tabs {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  margin: 8px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-soft);
  z-index: 50;
  transform-style: preserve-3d;
}

.tab-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  opacity: 0.7;
}

.tab-btn.active {
  background: rgba(255,255,255,0.12);
  opacity: 1;
  transform-style: preserve-3d;
  position: relative;
}

.tab-btn.active::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  filter: blur(6px);
  transform-style: preserve-3d;
  pointer-events: none;
}

/* Player */

.player {
  margin: 8px;
  padding: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-strong);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, width 0.25s ease-out, height 0.25s ease-out, top 0.25s ease-out, left 0.25s ease-out;
  z-index: 30;
  position: relative;
  display: none;
  width: min(600px, 90vw);
  height: min(600px, 90vw);
}

.player-mini {
  box-shadow: var(--shadow-strong);
}

.player-fullscreen {
  box-shadow: var(--shadow-strong);
}

.player iframe {
  width: 100%;
  height: 100%;
  border-radius: 18px;
  border: none;
}

.player-controls {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  justify-content: space-between;
  gap: 6px;
  transform-style: preserve-3d;
}

.ctrl-btn {
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.5);
  color: var(--text);
  cursor: pointer;
  font-size: 11px;
}

/* Fullscreen */

.player-fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(600px, 90vw);
  height: min(600px, 90vw);
  margin: 0;
  border-radius: 22px;
  z-index: 50;
  display: block;
}

/* Mini-player */

.player-mini {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 220px;
  height: 220px;
  border-radius: 18px;
  overflow: hidden;
  z-index: 40;
  box-shadow: var(--shadow-strong);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  display: block;
}

/* Feed */

.feed {
  margin: 8px;
}

.video-card {
  position: relative;
  background: var(--card);
  border-radius: 22px;
  padding: 12px;
  margin-bottom: 8px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-soft);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 5;
  display: flex;
  gap: 8px;
  cursor: pointer;
}

.video-thumb img {
  width: 120px;
  height: 68px;
  border-radius: 12px;
  object-fit: cover;
}

.video-info {
  flex: 1;
}

.video-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text);
}

.video-channel {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 2px;
  color: var(--text);
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
  color: var(--text);
}

/* HUD */

.hud {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: 999px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 11px;
  box-shadow: var(--shadow-soft), var(--shadow-glow);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease-out;
  transform-style: preserve-3d;
}

/* Channel page */

.channel-page {
  padding: 12px;
  margin: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-soft);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
}

/* Banner */

.channel-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow-strong);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 11;
}

.banner-logo {
  width: 42px;
  height: 28px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.banner-logo::after {
  content: "";
  position: absolute;
  left: 14px;
  top: 7px;
  width: 14px;
  height: 14px;
  border-style: solid;
  border-width: 7px 0 7px 14px;
  border-color: transparent transparent transparent white;
}

.banner-text {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

/* Channel header */

.channel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  z-index: 10;
  transform-style: preserve-3d;
}

.channel-pic {
  width: 40px;
  height: 40px;
  border-radius: 999px;
}

.channel-meta {
  display: flex;
  flex-direction: column;
  transform-style: preserve-3d;
}

.channel-name {
  font-size: 15px;
  font-weight: 600;
}

.channel-subs {
  font-size: 12px;
  opacity: 0.7;
}

/* Parallax */

.parallax {
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out;
}

/* Search depth mode */

.search-depth-mode .video-card,
.search-depth-mode .tabs,
.search-depth-mode .topbar,
.search-depth-mode .channel-page,
.search-depth-mode .player {
  transform: translateZ(-120px) !important;
  opacity: 0.35;
  transition: transform 0.25s ease-out, opacity 0.25s ease-out;
}

/* Keep search input bar forward in depth mode */
.search-depth-mode .search-input-bar {
  transform: translateZ(140px) !important;
  opacity: 1 !important;
  z-index: 9999 !important;
}
</style>
</head>

<div id="topbar" class="topbar parallax">
  <div class="app-title-wrap">
    <div class="youtube-logo"></div>
    <div class="app-title">ViewTube</div>
  </div>
  <button id="themeToggle" class="btn">Mode</button>
</div>

<div id="searchTab" class="search-tab parallax">
  <div class="search-icon"></div>
  <div class="search-label">Search YouTube</div>
</div>

<div id="searchPanel" class="search-panel parallax">
  <div class="search-input-bar">
    <input id="searchInput" class="search-input" placeholder="Search..." />
    <button id="searchGo" class="search-btn">Go</button>
    <button id="searchBack" class="search-back-btn">Back</button>
  </div>
  <div id="keyboard" class="keyboard">
    <div class="keyboard-row">
      <button class="key-btn">A</button>
      <button class="key-btn">B</button>
      <button class="key-btn">C</button>
      <button class="key-btn">D</button>
      <button class="key-btn">E</button>
      <button class="key-btn">F</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">G</button>
      <button class="key-btn">H</button>
      <button class="key-btn">I</button>
      <button class="key-btn">J</button>
      <button class="key-btn">K</button>
      <button class="key-btn">L</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">M</button>
      <button class="key-btn">N</button>
      <button class="key-btn">O</button>
      <button class="key-btn">P</button>
      <button class="key-btn">Q</button>
      <button class="key-btn">R</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">S</button>
      <button class="key-btn">T</button>
      <button class="key-btn">U</button>
      <button class="key-btn">V</button>
      <button class="key-btn">W</button>
      <button class="key-btn">X</button>
    </div>
    <div class="keyboard-row">
      <button class="key-btn">Y</button>
      <button class="key-btn">Z</button>
      <button class="key-btn" data-key="SPACE">SPACE</button>
      <button class="key-btn" data-key="DELETE">DELETE</button>
      <button class="key-btn" data-key="ENTER">ENTER</button>
    </div>
  </div>
  <div id="suggestions" class="suggestions"></div>
</div>

<div id="tabs" class="tabs parallax">
  <button id="homeTab" class="tab-btn active parallax-tab">Home</button>
  <button id="shortsTab" class="tab-btn parallax-tab">Shorts</button>
  <button id="moviesTab" class="tab-btn parallax-tab">Movies</button>
  <button id="historyTab" class="tab-btn parallax-tab">History</button>
  <button id="trendingTab" class="tab-btn parallax-tab">Trending</button>
  <button id="channelTab" class="tab-btn parallax-tab">Channel</button>
</div>

<div class="player parallax" id="playerSection">
  <iframe id="playerFrame" src="" allowfullscreen></iframe>
  <button id="closeMini" class="ctrl-btn" style="position:absolute; top:6px; right:6px;">X</button>
  <div class="player-controls">
    <button id="backBtn" class="ctrl-btn">Back</button>
    <div>
      <button id="rewindBtn" class="ctrl-btn">⏪ 10s</button>
      <button id="playPauseBtn" class="ctrl-btn">Pause</button>
      <button id="forwardBtn" class="ctrl-btn">⏩ 10s</button>
      <button id="fullBtn" class="ctrl-btn">Full</button>
    </div>
  </div>
</div>

<div id="feed" class="feed"></div>

<div id="channelPage" class="channel-page" style="display:none;"></div>

<div id="hud" class="hud"></div>

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) {
      url.searchParams.append(k, v);
    }
  });

  url.searchParams.append("_", Date.now());

  try {
    const res = await fetch(url.toString(), { cache: "no-store" });
    if (!res.ok) {
      console.warn("Key failed, switching to next key:", key);
      return fetchYouTube(endpoint, params);
    }
    return await res.json();
  } catch (err) {
    console.error("Network error, retrying with next key:", err);
    return fetchYouTube(endpoint, params);
  }
}

// Depth shadow helper
function setDepthShadow(el, depth) {
  if (!el) return;
  if (depth >= 40) {
    el.style.boxShadow = "var(--shadow-strong), var(--shadow-glow)";
  } else if (depth >= 10) {
    el.style.boxShadow = "var(--shadow-strong)";
  } else if (depth >= -10) {
    el.style.boxShadow = "var(--shadow-soft)";
  } else {
    el.style.boxShadow = "0 4px 12px rgba(0,0,0,0.4)";
  }
}

// Feed renderer
function renderFeed(items) {
  feedEl.innerHTML = "";

  items.forEach((item, i) => {
    const snippet = item.snippet || {};
    const stats = item.statistics || {};
    const videoId = item.id?.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.high?.url
           || snippet.thumbnails?.medium?.url
           || snippet.thumbnails?.default?.url
           || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = snippet.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = snippet.channelTitle || "Unknown channel";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = `${stats.viewCount || 0} views`;

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    img.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    title.onclick = (e) => {
      e.stopPropagation();
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channel.onclick = (e) => {
      e.stopPropagation();
      const channelId = snippet.channelId || currentChannelId;
      loadChannelPage(channelId);
    };

    feedEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// 3D stacking
function apply3DStacking() {
  const cards = document.querySelectorAll('.video-card');

  cards.forEach((card, i) => {
    const depth = -40 * i + Math.sin(i * 0.6) * 12;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
    `;
    setDepthShadow(card, depth);
  });
}

// Micro-parallax
document.addEventListener("pointermove", (e) => {
  const tiltX = e.movementX * 0.06;
  const tiltY = e.movementY * 0.04;

  document.querySelectorAll('.parallax').forEach(el => {
    el.style.transform = `
      perspective(900px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = -40 * i + Math.sin(i * 0.6) * 12;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
    setDepthShadow(card, depth);
  });

  const tabs = document.querySelectorAll('.parallax-tab');
  tabs.forEach((tab, index) => {
    const baseDepth = -20;
    const step = -12;
    const depth = baseDepth + step * index;
    tab.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
    setDepthShadow(tab, depth);
  });

  applyPlayerDepth();
  applyChannelBannerDepth();
  applyChannelHeaderDepth();
  applySearchBarDepthFull();
  applySearchInputDepthFull();
  applyKeyboardPanelDepthFull();
  applyKeyboardKeyDepthFull();
  applyHUDDepthFull();
  applyTopbarDepth();
  applyMiniControlsDepth();
  applyKeyboardDepth();
  applyTabHighlightDepth();
});

// Channel page

async function loadChannelPage(channelId) {
  currentChannelId = channelId;
  setActiveTab("channel");

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics,contentDetails",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) {
    showHUD("Channel not found");
    return;
  }

  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${channelInfo.snippet.thumbnails?.default?.url || ""}">
      <div class="channel-meta">
        <div class="channel-name">${channelInfo.snippet.title}</div>
        <div class="channel-subs">${channelInfo.statistics?.subscriberCount || 0} subscribers</div>
      </div>
    </div>
  `;
  applyChannelBannerDepth();
  applyChannelHeaderDepth();

  channelUploadsId = channelInfo.contentDetails.relatedPlaylists.uploads;

  const uploads = await fetchYouTube("playlistItems", {
    part: "snippet",
    playlistId: channelUploadsId,
    maxResults: 20
  });

  channelNextPageToken = uploads.nextPageToken || null;

  uploads.items.forEach(item => {
    const snippet = item.snippet;
    const videoId = snippet.resourceId.videoId;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channelPageEl.appendChild(card);
  });

  showHUD("Channel: " + channelInfo.snippet.title);
}

// Infinite scroll for channel
window.addEventListener("scroll", async () => {
  if (currentTab !== "channel") return;
  if (!channelNextPageToken) return;
  if (!channelUploadsId) return;

  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    const more = await fetchYouTube("playlistItems", {
      part: "snippet",
      playlistId: channelUploadsId,
      maxResults: 20,
      pageToken: channelNextPageToken
    });

    channelNextPageToken = more.nextPageToken || null;

    more.items.forEach(item => {

// Suggestions

async function fetchSuggestions(query) {
  if (!query.trim()) return [];
  const data = await fetchYouTube("search", {
    part: "snippet",
    q: query,
    type: "video",
    maxResults: 8
  });
  if (!data.items) return [];
  return data.items.map(v => v.snippet.title);
}

function showSuggestions(list) {
  suggestionsEl.innerHTML = "";
  if (list.length === 0) {
    suggestionsEl.style.display = "none";
    return;
  }
  list.forEach(text => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.textContent = text;
    item.onclick = () => {
      searchInput.value = text;
      triggerSearch(text);
      suggestionsEl.style.display = "none";
    };
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.style.display = "block";
}

function closeKeyboard() {
  keyboardEl.style.display = "none";
  searchPanelEl.style.display = "none";
  suggestionsEl.style.display = "none";

  feedEl.style.display = "block";

  tabsEl.style.pointerEvents = "auto";
  feedEl.style.pointerEvents = "auto";
  playerSection.style.pointerEvents = "auto";

  exitSearchDepthMode();
}

searchTabEl.addEventListener("click", () => {
  openKeyboard();
});

searchBack.addEventListener("click", () => {
  searchInput.value = "";
  closeKeyboard();
});

searchGo.addEventListener("click", () => {
  const q = searchInput.value.trim() || "music";
  triggerSearch(q);
});

keyboardEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".key-btn");
  if (!btn) return;

  document.querySelector(".search-input-bar").style.display = "flex";
  applySearchInputDepthFull();

  const key = btn.dataset.key || btn.textContent;

  if (key === "SPACE") {
    searchInput.value += " ";
  } else if (key === "DELETE") {
    searchInput.value = searchInput.value.slice(0, -1);
  } else if (key === "ENTER") {
    const q = searchInput.value.trim() || "music";
    triggerSearch(q);
    suggestionsEl.style.display = "none";
    return;
  } else {
    searchInput.value += key;
  }

  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  const suggestions = await fetchSuggestions(q);
  showSuggestions(suggestions);
});

function triggerSearch(q) {
  (async () => {
    const data = await fetchYouTube("search", {
      part: "snippet",
      q,
      type: "video",
      maxResults: 25
    });
    clearFeed();
    setActiveTab("home");
    renderFeed(data.items || []);
    showHUD("Search: " + q);
    closeKeyboard();
  })();
}

// Shorts swipe navigation
let touchStartY = null;
let pointerStartY = null;

function playShortAt(index) {
  if (!shortsItems[index]) return;
  const item = shortsItems[index];
  const snippet = item.snippet || {};
  const videoId = item.id;
  setPlayerVideo(videoId, snippet);
  showHUD("Short " + (index + 1));
}

function nextShort() {
  if (shortsIndex < shortsItems.length - 1) {
    shortsIndex++;
    playShortAt(shortsIndex);
  }
}

function prevShort() {
  if (shortsIndex > 0) {
    shortsIndex--;
    playShortAt(shortsIndex);
  }
}

document.addEventListener("touchstart", (e) => {
  if (currentTab !== "shorts") return;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener("touchend", (e) => {
  if (currentTab !== "shorts" || touchStartY === null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  touchStartY = null;
});

document.addEventListener("pointerdown", (e) => {
  if (currentTab !== "shorts") return;
  pointerStartY = e.clientY;
});

document.addEventListener("pointerup", (e) => {
  if (currentTab !== "shorts" || pointerStartY === null) return;
  const dy = e.clientY - pointerStartY;
  if (Math.abs(dy) > 50) {
    if (dy < 0) nextShort();
    else prevShort();
  }
  pointerStartY = null;
});

// Direction-aware pointer routing for mini-player
let scrollStartX = null;
let scrollStartY = null;

document.addEventListener("pointerdown", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  scrollStartX = e.clientX;
  scrollStartY = e.clientY;
});

document.addEventListener("pointermove", (e) => {
  if (!playerSection.classList.contains("player-mini")) return;
  if (scrollStartX === null || scrollStartY === null) return;

  const dx = e.clientX - scrollStartX;
  const dy = e.clientY - scrollStartY;

  if (Math.abs(dx) > Math.abs(dy)) {
    feedEl.style.pointerEvents = "auto";
    tabsEl.style.pointerEvents = "auto";
    playerSection.style.pointerEvents = "none";
  } else {
    feedEl.style.pointerEvents = "none";
    tabsEl.style.pointerEvents = "none";
    playerSection.style.pointerEvents = "auto";
  }
});

document.addEventListener("pointerup", () => {
  scrollStartX = null;
  scrollStartY = null;
});

// Initial depth setup
applyTopbarDepth();
applySearchBarDepth();
applyTabDepthStacking();
applyHUDDepthFull();

// Initial load
(async () => {
  const data = await fetchYouTube("videos", {
    part: "snippet,statistics",
    chart: "mostPopular",
    maxResults: 25
  });
  renderFeed(data.items || []);
})();
</script>
</body>
</html>
