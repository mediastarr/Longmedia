<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewTube</title>
<style>
:root {
  --bg: rgba(0,0,0,0.35);
  --card: rgba(20,20,20,0.35);
  --text: #fff;
  --blur: 18px;
}

.light {
  --bg: rgba(255,255,255,0.25);
  --card: rgba(255,255,255,0.35);
  --text: #000;
  --blur: 22px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: transparent;
  color: var(--text);
}

/* Top bar + tabs */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  margin: 8px;
  z-index: 10;
}

.app-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.youtube-logo {
  width: 28px;
  height: 20px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.youtube-logo::after {
  content: "";
  position: absolute;
  left: 10px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-style: solid;
  border-width: 6px 0 6px 12px;
  border-color: transparent transparent transparent white;
}

.app-title {
  font-weight: 600;
  letter-spacing: 0.5px;
}

.btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.tabs {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  margin: 8px;
  background: var(--bg);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  z-index: 9;
}

.tab-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  opacity: 0.7;
}

.tab-btn.active {
  background: rgba(255,255,255,0.12);
  opacity: 1;
}

/* Search bar */

.search-bar {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  margin: 0 8px 8px;
  background: var(--bg);
  border-radius: 18px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  font-size: 13px;
}

.search-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* Player */

.player {
  margin: 8px;
  padding: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, width 0.25s ease-out, height 0.25s ease-out, top 0.25s ease-out, left 0.25s ease-out;
  z-index: 12;
  position: relative;
}

.player iframe {
  width: 100%;
  height: 220px;
  border-radius: 18px;
  border: none;
}

.player-controls {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  margin-top: 6px;
}

.ctrl-btn {
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

/* Fullscreen */

.player-fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  margin: 0;
  border-radius: 0;
  z-index: 50;
}

.player-fullscreen iframe {
  width: 100%;
  height: calc(100vh - 40px);
  border-radius: 0;
}

/* Mini-player */

.player-mini {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  height: 150px;
  border-radius: 18px;
  overflow: hidden;
  z-index: 30;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.18);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
}

/* Feed */

.feed {
  margin: 8px;
}

.video-card {
  position: relative;
  background: var(--card);
  border-radius: 22px;
  padding: 12px;
  margin-bottom: 8px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 5;
  display: flex;
  gap: 8px;
  cursor: pointer;
}

.video-thumb img {
  width: 120px;
  height: 68px;
  border-radius: 12px;
  object-fit: cover;
}

.video-info {
  flex: 1;
}

.video-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text);
}

.video-channel {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 2px;
  color: var(--text);
}

.video-meta {
  font-size: 11px;
  opacity: 0.7;
  color: var(--text);
}

/* HUD */

.hud {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: 999px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 11px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease-out;
}

/* Channel page */

.channel-page {
  padding: 12px;
  margin: 8px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
}

/* Banner */

.channel-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
  background: var(--card);
  border-radius: 22px;
  backdrop-filter: blur(var(--blur)) saturate(1.2);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.15);
  transform-style: preserve-3d;
  transition: transform 0.25s ease-out;
  z-index: 11;
}

.banner-logo {
  width: 42px;
  height: 28px;
  background: #FF0000;
  border-radius: 6px;
  position: relative;
}

.banner-logo::after {
  content: "";
  position: absolute;
  left: 14px;
  top: 7px;
  width: 14px;
  height: 14px;
  border-style: solid;
  border-width: 7px 0 7px 14px;
  border-color: transparent transparent transparent white;
}

.banner-text {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

/* Channel header */

.channel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  z-index: 10;
}

.channel-pic {
  width: 40px;
  height: 40px;
  border-radius: 999px;
}

.channel-meta {
  display: flex;
  flex-direction: column;
}

.channel-name {
  font-size: 15px;
  font-weight: 600;
}

.channel-subs {
  font-size: 12px;
  opacity: 0.7;
}

/* Parallax */

.parallax {
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out;
}
</style>
</head>
<body>

<div class="topbar parallax">
  <div class="app-title-wrap">
    <div class="youtube-logo"></div>
    <div class="app-title">ViewTube</div>
  </div>
  <button id="themeToggle" class="btn">Mode</button>
</div>

<div class="tabs parallax">
  <button id="homeTab" class="tab-btn active">Home</button>
  <button id="shortsTab" class="tab-btn">Shorts</button>
  <button id="searchTab" class="tab-btn">Search</button>
  <button id="relatedTab" class="tab-btn">Related</button>
  <button id="historyTab" class="tab-btn">History</button>
  <button id="trendingTab" class="tab-btn">Trending</button>
  <button id="channelTab" class="tab-btn">Channel</button>
</div>

<div class="search-bar parallax">
  <input id="searchInput" class="search-input" placeholder="Search YouTube..." />
  <button id="searchGo" class="search-btn">Go</button>
</div>

<div class="player parallax" id="playerSection">
  <iframe id="playerFrame" src="" allowfullscreen></iframe>
  <div class="player-controls">
    <button id="backBtn" class="ctrl-btn">Back</button>
    <button id="fullBtn" class="ctrl-btn">Full</button>
  </div>
</div>

<div id="feed" class="feed"></div>

<div id="channelPage" class="channel-page" style="display:none;"></div>

<div id="hud" class="hud"></div>

<script>
// Rotating YouTube API keys (replace with your real keys locally)
const API_KEYS = [
  "AIzaSyBkaog-TrCWGhT2pe9cVQ3aVNwyxvO-vpc",
  "AIzaSyA2aSVuBFCbNdraBsX07qMGmEzmLLrgKD0",
  "AIzaSyA_lsaX7dRjRsaYb2cwxD2mB7U5t6iYdM0",

  "AIzaSyA72atzyYdbE7bMVGkKW3TVYJkOxo4zqGY",
  "AIzaSyDqKaX9dypHZOky60_wNba3sLO0Gm6rs5Q",
  "AIzaSyAb1msw18FjkWQ9eTC1FLBCOCshTT2biY0",
  "AIzaSyDBH0yil9RS4rLg3H2gVUOoxnojdEy9NYk",
  "AIzaSyDRA6Tij7ZdMAOGbK8bn6X3JEtTTKgO2ik",
  "AIzaSyBO717pJHi6l3x1fMxvjoV9Qi1yNYTqJ5M",

  "AIzaSyCn1W60JG2bBLhfcmdf_4IO4DwbPcSUamw",
  "AIzaSyD-fHmIX5xWWBhimAAppT0MjpSj7kZeL3k",
  "AIzaSyAFbQeij52ZNdw71_3YM29JbVBzdA6j2bk",
  "AIzaSyDNz0FwRrW1aJyNsJCuyDBtHABf5PJB4NA",
  "AIzaSyDJk296nOcAkhbcTDAaj1AcfkJLrADXO8A",
  "AIzaSyDTbRmYLb0BZ95XSexmvviM9movGqQdnpM",
  "AIzaSyC8iihsKNeQbeCm_IMJzc7nu1RyhZeRLC8",
  "AIzaSyAnonwBzHe_B1ZQENw_h_tTe1mc8028lN0",
  "AIzaSyD-l8BkA618b_s-gdA7PdGicX4_7m381Nw",
  "AIzaSyAzClMaJKl0IYwmI6gcAA9JU82T9CKpkIY",
  "AIzaSyDwC5M_sI5GFU28amUzoMH6LADOczhjtnU",
  "AIzaSyDtbk2O00EOh3wcZL3zI-2xHw_B4cz4kU0",
  "AIzaSyCTBtxW_yAJod-az7pGyWEvjLOBEZoyKTk",
  "AIzaSyB8MwIt7xiBXFpyj2AUjPE7VRB0MqqY8G8"
];

let keyIndex = 0;

async function fetchYouTube(endpoint, params = {}) {
  const key = API_KEYS[keyIndex];
  keyIndex = (keyIndex + 1) % API_KEYS.length;

  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = key;

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) {
      url.searchParams.append(k, v);
    }
  });

  try {
    const res = await fetch(url);

    if (!res.ok) {
      console.warn("Key failed, switching to next key:", key);
      return fetchYouTube(endpoint, params);
    }

    return await res.json();
  } catch (err) {
    console.error("Network error, retrying with next key:", err);
    return fetchYouTube(endpoint, params);
  }
}

// Basic state
let currentTab = "home";
let currentVideoId = null;
let miniActive = false;
let isLight = false;
let currentChannelId = "UC123456"; // replace with a real channel ID if you want
let channelNextPageToken = null;
let historyList = [];

// Elements
const feedEl = document.getElementById("feed");
const playerFrame = document.getElementById("playerFrame");
const playerSection = document.getElementById("playerSection");
const hudEl = document.getElementById("hud");
const channelPageEl = document.getElementById("channelPage");

const homeTab = document.getElementById("homeTab");
const shortsTab = document.getElementById("shortsTab");
const searchTab = document.getElementById("searchTab");
const relatedTab = document.getElementById("relatedTab");
const historyTab = document.getElementById("historyTab");
const trendingTab = document.getElementById("trendingTab");
const channelTab = document.getElementById("channelTab");
const themeToggle = document.getElementById("themeToggle");
const fullBtn = document.getElementById("fullBtn");
const backBtn = document.getElementById("backBtn");
const searchInput = document.getElementById("searchInput");
const searchGo = document.getElementById("searchGo");

// HUD
function showHUD(text) {
  hudEl.textContent = text;
  hudEl.style.opacity = 1;
  setTimeout(() => {
    hudEl.style.opacity = 0;
  }, 1200);
}

// Player
function setPlayerVideo(videoId, snippet) {
  currentVideoId = videoId;
  playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  // add to local history
  historyList.unshift({ id: videoId, snippet });
  if (historyList.length > 50) historyList.pop();
}

// Tabs
function setActiveTab(tab) {
  currentTab = tab;
  [homeTab, shortsTab, searchTab, relatedTab, historyTab, trendingTab, channelTab]
    .forEach(btn => btn.classList.remove("active"));
  if (tab === "home") homeTab.classList.add("active");
  if (tab === "shorts") shortsTab.classList.add("active");
  if (tab === "search") searchTab.classList.add("active");
  if (tab === "related") relatedTab.classList.add("active");
  if (tab === "history") historyTab.classList.add("active");
  if (tab === "trending") trendingTab.classList.add("active");
  if (tab === "channel") channelTab.classList.add("active");

  if (tab === "channel") {
    feedEl.style.display = "none";
    channelPageEl.style.display = "block";
  } else {
    feedEl.style.display = "block";
    channelPageEl.style.display = "none";
  }
}

// Feed renderer with 3D stacking
function renderFeed(items) {
  feedEl.innerHTML = "";

  items.forEach((item, i) => {
    const snippet = item.snippet || {};
    const stats = item.statistics || {};
    const videoId = item.id?.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    const thumb = document.createElement("div");
    thumb.className = "video-thumb";
    const img = document.createElement("img");
    img.src = snippet.thumbnails?.medium?.url || "";
    thumb.appendChild(img);

    const info = document.createElement("div");
    info.className = "video-info";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = snippet.title || "Untitled";

    const channel = document.createElement("div");
    channel.className = "video-channel";
    channel.textContent = snippet.channelTitle || "Unknown channel";

    const meta = document.createElement("div");
    meta.className = "video-meta";
    meta.textContent = `${stats.viewCount || 0} views`;

    info.appendChild(title);
    info.appendChild(channel);
    info.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channel.onclick = (e) => {
      e.stopPropagation();
      const channelId = snippet.channelId || currentChannelId;
      loadChannelPage(channelId);
    };

    feedEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// 3D stacking
function apply3DStacking() {
  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = i * -40;
    card.style.transform = `translateZ(${depth}px)`;
  });
}

// Micro-parallax
document.addEventListener("pointermove", (e) => {
  const tiltX = e.movementX * 0.06;
  const tiltY = e.movementY * 0.04;

  document.querySelectorAll('.parallax').forEach(el => {
    el.style.transform = `
      perspective(900px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });

  const cards = document.querySelectorAll('.video-card');
  cards.forEach((card, i) => {
    const depth = i * -40;
    card.style.transform = `
      perspective(900px)
      translateZ(${depth}px)
      rotateX(${tiltY}deg)
      rotateY(${tiltX}deg)
    `;
  });
});

// Theme toggle
themeToggle.addEventListener("click", () => {
  isLight = !isLight;
  document.body.classList.toggle("light", isLight);
  showHUD(isLight ? "Light Mode" : "Dark Mode");
});

// Fullscreen / mini behavior
fullBtn.addEventListener("click", () => {
  playerSection.classList.add("player-fullscreen");
  playerSection.classList.remove("player-mini");
  miniActive = false;
  showHUD("Fullscreen");
});

backBtn.addEventListener("click", () => {
  // exit fullscreen and go mini bottom-right
  playerSection.classList.remove("player-fullscreen");
  playerSection.classList.add("player-mini");
  miniActive = true;
  showHUD("Mini-player");
});

// Channel page

async function loadChannelPage(channelId) {
  currentChannelId = channelId;
  setActiveTab("channel");

  const info = await fetchYouTube("channels", {
    part: "snippet,statistics",
    id: channelId
  });

  const channelInfo = info.items?.[0];
  if (!channelInfo) {
    showHUD("Channel not found");
    return;
  }

  renderChannelHeader(channelInfo);

  const uploads = await fetchYouTube("search", {
    part: "snippet",
    channelId,
    type: "video",
    order: "date",
    maxResults: 20
  });

  channelNextPageToken = uploads.nextPageToken || null;
  renderChannelFeed(uploads.items || []);

  showHUD("Channel: " + channelInfo.snippet.title);
}

function renderChannelHeader(info) {
  channelPageEl.innerHTML = `
    <div class="channel-banner parallax">
      <div class="banner-logo"></div>
      <div class="banner-text">ViewTube</div>
    </div>

    <div class="channel-header parallax">
      <img class="channel-pic" src="${info.snippet.thumbnails?.default?.url || ""}">
      <div class="channel-meta">
        <div class="channel-name">${info.snippet.title}</div>
        <div class="channel-subs">${info.statistics?.subscriberCount || 0} subscribers</div>
      </div>
    </div>
  `;
}

function renderChannelFeed(items) {
  items.forEach((item, i) => {
    const snippet = item.snippet;
    const videoId = item.id.videoId || item.id;

    const card = document.createElement("div");
    card.className = "video-card parallax";

    card.innerHTML = `
      <div class="video-thumb">
        <img src="${snippet.thumbnails.medium.url}">
      </div>
      <div class="video-info">
        <div class="video-title">${snippet.title}</div>
        <div class="video-channel">${snippet.channelTitle}</div>
      </div>
    `;

    card.onclick = () => {
      setPlayerVideo(videoId, snippet);
      showHUD("Playing: " + snippet.title);
    };

    channelPageEl.appendChild(card);
  });

  setTimeout(apply3DStacking, 10);
}

// Infinite scroll for channel
window.addEventListener("scroll", async () => {
  if (currentTab === "channel" && channelNextPageToken && window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    const more = await fetchYouTube("search", {
      part: "snippet",
      channelId: currentChannelId,
      type: "video",
      order: "date",
      maxResults: 20,
      pageToken: channelNextPageToken
    });

    channelNextPageToken = more.nextPageToken || null;
    renderChannelFeed(more.items || []);
    showHUD("More channel videos");
  }
});

// Tab handlers

homeTab.addEventListener("click", async () => {
  setActiveTab("home");
  const data = await fetchYouTube("videos", { part: "snippet,statistics", chart: "mostPopular", maxResults: 20 });
  renderFeed(data.items || []);
  showHUD("Home");
});

trendingTab.addEventListener("click", async () => {
  setActiveTab("trending");
  const data = await fetchYouTube("videos", { part: "snippet,statistics", chart: "mostPopular", regionCode: "US", maxResults: 20 });
  renderFeed(data.items || []);
  showHUD("Trending US");
});

shortsTab.addEventListener("click", async () => {
  setActiveTab("shorts");
  const data = await fetchYouTube("search", {
    part: "snippet",
    type: "video",
    videoDuration: "short",
    maxResults: 20,
    order: "date"
  });
  renderFeed(data.items || []);
  showHUD("Shorts");
});

searchTab.addEventListener("click", async () => {
  setActiveTab("search");
  const q = searchInput.value.trim() || "music";
  const data = await fetchYouTube("search", { part: "snippet", q, type: "video", maxResults: 20 });
  renderFeed(data.items || []);
  showHUD("Search: " + q);
});

searchGo.addEventListener("click", async () => {
  setActiveTab("search");
  const q = searchInput.value.trim() || "music";
  const data = await fetchYouTube("search", { part: "snippet", q, type: "video", maxResults: 20 });
  renderFeed(data.items || []);
  showHUD("Search: " + q);
});

relatedTab.addEventListener("click", async () => {
  setActiveTab("related");
  if (!currentVideoId) {
    showHUD("Play a video first");
    return;
  }
  const data = await fetchYouTube("search", {
    part: "snippet",
    relatedToVideoId: currentVideoId,
    type: "video",
    maxResults: 20
  });
  renderFeed(data.items || []);
  showHUD("Related");
});

historyTab.addEventListener("click", async () => {
  setActiveTab("history");
  // render local history
  const items = historyList.map(h => ({
    id: h.id,
    snippet: h.snippet,
    statistics: { viewCount: "watched" }
  }));
  renderFeed(items);
  showHUD("History");
});

channelTab.addEventListener("click", async () => {
  loadChannelPage(currentChannelId);
});

// Initial load
(async () => {
  const data = await fetchYouTube("videos", { part: "snippet,statistics", chart: "mostPopular", maxResults: 20 });
  renderFeed(data.items || []);
})();
</script>
</body>
</html>
